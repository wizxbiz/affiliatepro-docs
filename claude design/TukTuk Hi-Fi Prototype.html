<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

html, body { height: 100%; background: #0a0a0f; font-family: 'Kanit', sans-serif; overflow: hidden; }
#root { height: 100%; }

/* View toggle */
.view-toggle {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);

.view-btn {

<div id="root"></div>

<script type="text/babel">

// ─── Design tokens ────────────────────────────────────────────

  border: 'rgba(255,255,255,0.08)',
  primary: '#6366f1',
  primaryGlow: 'rgba(99,102,241,0.35)',

  green: '#10b981',

  red: '#f43f5e',

// ─── Mock data ────────────────────────────────────────────────
const FEEDS = [

    likes: '3.4K', comments: 412, price: '฿60', unit: '/จาน',
    bg: 'linear-gradient(160deg, #2d1a0d 0%, #4a2e1a 40%, #331f0f 100%)',

  { id: 2, name: '@ส้มตำ', live: true, color: '#f97316' },

// ─── Shared utilities ─────────────────────────────────────────
function useLocalStorage(key, def) {
  const [v, setV] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; }
  });
  const set = React.useCallback(x => {
    setV(x); try { localStorage.setItem(key, JSON.stringify(x)); } catch {}
  }, [key]);
  return [v, set];
}

// ─── VideoBackground ──────────────────────────────────────────
function VideoBG({ feed, children }) {
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
      <div style={{ position: 'absolute', inset: 0, background: feed.bg, transition: 'background 0.6s ease' }}/>
      {/* animated particles */}
      {[...Array(6)].map((_, i) => (
        <div key={i} style={{
          position: 'absolute',
          width: 60+i*20, height: 60+i*20,
          borderRadius: '50%',
          background: `radial-gradient(circle, ${feed.color}22 0%, transparent 70%)`,
          left: `${[10,60,30,70,20,80][i]}%`,
          top: `${[20,50,70,30,80,10][i]}%`,
          animation: `float${i%3} ${4+i}s ease-in-out infinite`,
          animationDelay: `${i*0.7}s`,
          pointerEvents: 'none',
        }}/>
      ))}
      <style>{`
        @keyframes float0 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(10px,-15px) scale(1.1)} }
        @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-12px,10px) scale(0.9)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(8px,12px) scale(1.05)} }
        @keyframes heartPop { 0%{transform:scale(0) rotate(-20deg);opacity:1} 50%{transform:scale(1.4) rotate(10deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:0} }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        @keyframes ripple { 0%{transform:scale(1);opacity:0.6} 100%{transform:scale(2.5);opacity:0} }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      `}</style>
      {/* big emoji center */}
      <div style={{
        position: 'absolute', top: '35%', left: '50%',
        transform: 'translate(-50%,-50%)',
        fontSize: 120, opacity: 0.08, pointerEvents: 'none',
        filter: 'blur(2px)',
      }}>{feed.emoji}</div>
      {children}
    </div>
  );
}

// ─── HeartAnimation ───────────────────────────────────────────
function HeartAnim({ onDone }) {
  React.useEffect(() => { const t = setTimeout(onDone, 900); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'absolute', top: '40%', left: '50%',
      transform: 'translate(-50%,-50%)',
      fontSize: 80, zIndex: 100, pointerEvents: 'none',
      animation: 'heartPop 0.9s ease forwards',
    }}>❤️</div>
  );
}

// ─── ProductSheet ─────────────────────────────────────────────
function ProductSheet({ feed, onClose, onOrder }) {
  const [qty, setQty] = React.useState(1);
  const [added, setAdded] = React.useState(false);

  const handleOrder = () => {
    setAdded(true);
    setTimeout(() => { setAdded(false); onOrder && onOrder(); }, 1500);
  };

  const priceNum = parseInt(feed.price.replace('฿',''));

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 90,
      background: 'rgba(0,0,0,0.6)',
      backdropFilter: 'blur(4px)',
      animation: 'fadeIn 0.2s ease',
    }} onClick={onClose}>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0,
        background: 'linear-gradient(180deg, #1a2240 0%, #0f172a 100%)',
        borderRadius: '24px 24px 0 0',
        padding: '0 0 34px',
        animation: 'slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1)',
        border: '1px solid rgba(255,255,255,0.08)',
        borderBottom: 'none',
      }} onClick={e => e.stopPropagation()}>
        {/* drag handle */}
        <div style={{ display: 'flex', justifyContent: 'center', padding: '12px 0 8px' }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: 'rgba(255,255,255,0.2)' }}/>
        </div>

        {/* seller header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 20px 16px' }}>
          <div style={{
            width: 44, height: 44, borderRadius: '50%',
            background: `linear-gradient(135deg, ${feed.color}, ${T.primary})`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 22, flexShrink: 0,
          }}>{feed.emoji}</div>
          <div style={{ flex: 1 }}>
            <div style={{ color: T.text, fontWeight: 600, fontSize: 15 }}>{feed.seller}</div>
            <div style={{ color: T.textMuted, fontSize: 12, marginTop: 2 }}>
              📍 {feed.location} · {feed.dist} &nbsp;·&nbsp; ⭐ {feed.rating} ({feed.reviews} รีวิว)
            </div>
          </div>
          <div style={{
            padding: '4px 12px', borderRadius: 20,
            background: 'rgba(99,102,241,0.2)', border: '1px solid rgba(99,102,241,0.4)',
            color: '#a5b4fc', fontSize: 12, fontWeight: 500,
          }}>✓ ยืนยัน</div>
        </div>

        {/* divider */}
        <div style={{ height: 1, background: T.border, margin: '0 20px 16px' }}/>

        {/* product info */}
        <div style={{ display: 'flex', gap: 14, padding: '0 20px 16px', alignItems: 'flex-start' }}>
          <div style={{
            width: 80, height: 80, borderRadius: 14,
            background: `linear-gradient(135deg, ${feed.color}33, ${T.primary}22)`,
            border: `1px solid ${feed.color}44`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 36, flexShrink: 0,
          }}>{feed.emoji}</div>
          <div style={{ flex: 1 }}>
            <div style={{ color: T.text, fontWeight: 600, fontSize: 16, marginBottom: 4 }}>{feed.desc}</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
              <span style={{ color: T.yellow, fontWeight: 700, fontSize: 26 }}>{feed.price}</span>
              <span style={{ color: T.textMuted, fontSize: 13 }}>{feed.unit}</span>
            </div>
            {/* tag */}
            <div style={{
              display: 'inline-block', marginTop: 6,
              padding: '2px 10px', borderRadius: 12,
              background: `${feed.color}22`, border: `1px solid ${feed.color}44`,
              color: feed.color, fontSize: 11, fontWeight: 500,
            }}>#{feed.tag}</div>
          </div>
        </div>

        {/* qty selector */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px 20px' }}>
          <span style={{ color: T.textMuted, fontSize: 13 }}>จำนวน</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <button onClick={() => setQty(q => Math.max(1,q-1))} style={{
              width: 36, height: 36, borderRadius: '50%', border: '1px solid rgba(255,255,255,0.15)',
              background: 'rgba(255,255,255,0.06)', color: T.text, fontSize: 18,
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>−</button>
            <span style={{ color: T.text, fontWeight: 700, fontSize: 18, minWidth: 24, textAlign: 'center' }}>{qty}</span>
            <button onClick={() => setQty(q => q+1)} style={{
              width: 36, height: 36, borderRadius: '50%', border: 'none',
              background: T.primary, color: '#fff', fontSize: 18,
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              boxShadow: `0 4px 14px ${T.primaryGlow}`,
            }}>+</button>
          </div>
          <span style={{ color: T.yellow, fontWeight: 700, fontSize: 18 }}>฿{priceNum * qty}</span>
        </div>

        {/* actions */}
        <div style={{ display: 'flex', gap: 10, padding: '0 20px' }}>
          <button style={{
            flex: 1, height: 50, borderRadius: 25, border: '1px solid rgba(255,255,255,0.15)',
            background: 'rgba(255,255,255,0.06)', color: T.text,
            fontFamily: T.kanit, fontSize: 14, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>💬 ถามร้านค้า</button>
          <button onClick={handleOrder} style={{
            flex: 2, height: 50, borderRadius: 25, border: 'none',
            background: added
              ? `linear-gradient(135deg, ${T.green}, #059669)`
              : `linear-gradient(135deg, ${T.primary}, ${T.secondary})`,
            color: '#fff', fontFamily: T.kanit, fontSize: 15, fontWeight: 600,
            cursor: 'pointer', transition: 'all 0.3s',
            boxShadow: added ? '0 4px 20px rgba(16,185,129,0.4)' : `0 4px 20px ${T.primaryGlow}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>
            {added ? '✓ เพิ่มแล้ว!' : `🛒 สั่งเลย · ฿${priceNum * qty}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── RightActions ─────────────────────────────────────────────
function RightActions({ feed, liked, onLike, onComment, onShare }) {
  return (
    <div style={{
      position: 'absolute', right: 12, bottom: 160,
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20,
    }}>
      {/* avatar */}
      <div style={{ position: 'relative', marginBottom: 4 }}>
        <div style={{
          width: 46, height: 46, borderRadius: '50%',
          background: `linear-gradient(135deg, ${feed.color}, ${T.primary})`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 20, border: '2px solid rgba(255,255,255,0.3)',
        }}>{feed.emoji}</div>
        <div style={{
          position: 'absolute', bottom: -8, left: '50%', transform: 'translateX(-50%)',
          width: 22, height: 22, borderRadius: '50%', background: T.primary,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 13, border: '2px solid #0f172a',
        }}>+</div>
      </div>

      {/* like */}
      <ActionBtn icon={liked ? '❤️' : '🤍'} label={feed.likes} onClick={onLike}
        color={liked ? '#f43f5e' : T.textMuted} active={liked}/>
      {/* comment */}
      <ActionBtn icon="💬" label={feed.comments} onClick={onComment} color={T.textMuted}/>
      {/* share */}
      <ActionBtn icon="↗️" label="แชร์" onClick={onShare} color={T.textMuted}/>
      {/* sound */}
      <ActionBtn icon="🔊" label="" onClick={() => {}} color={T.textMuted}/>
    </div>
  );
}

function ActionBtn({ icon, label, onClick, color, active }) {
  const [press, setPress] = React.useState(false);
  return (
    <div onClick={onClick}
      onMouseDown={() => setPress(true)}
      onMouseUp={() => setPress(false)}
      style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, cursor: 'pointer',
        transform: press ? 'scale(0.88)' : active ? 'scale(1.05)' : 'scale(1)',
        transition: 'transform 0.15s cubic-bezier(0.34,1.56,0.64,1)',
      }}>
      <div style={{
        width: 48, height: 48, borderRadius: '50%',
        background: 'rgba(0,0,0,0.35)', backdropFilter: 'blur(10px)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 22, border: '1px solid rgba(255,255,255,0.08)',
        boxShadow: active ? `0 0 16px ${color}66` : 'none',
        transition: 'all 0.2s',
      }}>{icon}</div>
      {label !== '' && <span style={{ color: T.text, fontSize: 11, fontWeight: 500 }}>{label}</span>}
    </div>
  );
}

// ─── BottomInfo ───────────────────────────────────────────────
function BottomInfo({ feed, onOpenSheet }) {
  return (
    <div style={{
      position: 'absolute', bottom: 72, left: 0, right: 0,
      padding: '0 16px',
    }}>
      {/* seller row */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
        <div style={{
          width: 36, height: 36, borderRadius: '50%',
          background: `linear-gradient(135deg, ${feed.color}, ${T.primary})`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 18, flexShrink: 0,
        }}>{feed.emoji}</div>
        <div>
          <div style={{ color: T.text, fontWeight: 600, fontSize: 14 }}>{feed.seller}</div>
          <div style={{ color: T.textMuted, fontSize: 11 }}>📍 {feed.location} · {feed.dist}</div>
        </div>
        {feed.isLive && (
          <div style={{
            marginLeft: 'auto',
            padding: '3px 10px', borderRadius: 20,
            background: 'rgba(244,63,94,0.9)',
            color: '#fff', fontSize: 11, fontWeight: 700,
            animation: 'pulse 1.5s infinite',
            display: 'flex', alignItems: 'center', gap: 4,
          }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#fff' }}/>
            LIVE
          </div>
        )}
      </div>
      {/* desc */}
      <p style={{ color: T.text, fontSize: 13, lineHeight: 1.5, marginBottom: 12,
        textShadow: '0 1px 8px rgba(0,0,0,0.8)' }}>{feed.desc}</p>
      {/* CTA button */}
      <button onClick={onOpenSheet} style={{
        width: '100%', height: 46, borderRadius: 23,
        background: `linear-gradient(135deg, ${T.primary}cc, ${T.secondary}cc)`,
        backdropFilter: 'blur(10px)',
        border: '1px solid rgba(99,102,241,0.5)',
        color: '#fff', fontFamily: T.kanit, fontSize: 15, fontWeight: 600,
        cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        boxShadow: `0 4px 20px ${T.primaryGlow}`,
        transition: 'all 0.2s',
      }}>
        🛒 ดูสินค้า &nbsp;<span style={{ color: T.yellow, fontWeight: 700 }}>{feed.price}</span><span style={{ color: T.textMuted, fontSize: 12 }}>{feed.unit}</span>
        <span style={{ marginLeft: 'auto', color: T.textMuted, fontSize: 12 }}>↑ เลื่อนขึ้น</span>
      </button>
    </div>
  );
}

// ─── Stories bar ──────────────────────────────────────────────
function StoriesBar({ activeStory, setActiveStory }) {
  return (
    <div style={{
      display: 'flex', gap: 14, padding: '4px 16px',
      overflowX: 'auto', scrollbarWidth: 'none',
    }}>
      {STORIES.map(s => (
        <div key={s.id} onClick={() => setActiveStory(s.id === activeStory ? null : s.id)}
          style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5,
            cursor: 'pointer', flexShrink: 0, transition: 'transform 0.2s',
            transform: activeStory === s.id ? 'scale(1.1)' : 'scale(1)',
          }}>
          <div style={{ position: 'relative' }}>
            <div style={{
              width: 56, height: 56, borderRadius: '50%', padding: 2,
              background: s.live
                ? `linear-gradient(135deg, #f43f5e, #f97316)`
                : `linear-gradient(135deg, ${s.color}, ${T.primary})`,
              boxShadow: activeStory === s.id ? `0 0 0 2px #fff, 0 0 16px ${s.color}` : 'none',
            }}>
              <div style={{
                width: '100%', height: '100%', borderRadius: '50%',
                background: `linear-gradient(135deg, ${s.color}44, ${T.bg})`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 22, border: '2px solid #0f172a',
              }}>
                {['🥥','🌶️','👗','🛵','🏪'][s.id-1]}
              </div>
            </div>
            {s.live && (
              <div style={{
                position: 'absolute', bottom: 0, left: '50%', transform: 'translateX(-50%)',
                background: '#f43f5e', color: '#fff',
                fontSize: 8, fontWeight: 700, padding: '1px 5px', borderRadius: 4,
                border: '1.5px solid #0f172a',
              }}>LIVE</div>
            )}
          </div>
          <span style={{ color: T.textMuted, fontSize: 10, maxWidth: 56, textAlign: 'center',
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.name}</span>
        </div>
      ))}
    </div>
  );
}

// ─── Header ───────────────────────────────────────────────────

  const tabs = [

    { id: 'community', label: 'ชุมชน', icon: '👥' },
  ];
  return (
    <div style={{
      position: 'absolute', top: 0, left: 0, right: 0, zIndex: 50,
      background: 'linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%)',
      padding: '0 16px',
    }}>
      {/* row 1 */}
      <div style={{ display: 'flex', alignItems: 'center', height: 52, gap: 12 }}>
        {/* logo */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{
            width: 30, height: 30, borderRadius: 8,
            background: `linear-gradient(135deg, ${T.primary}, ${T.secondary})`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 14, boxShadow: `0 2px 8px ${T.primaryGlow}`,
          }}>🛺</div>
          <span style={{ color: '#fff', fontWeight: 700, fontSize: 18, letterSpacing: -0.5 }}>TukTuk</span>

// ─── MOBILE FEED VIEW ─────────────────────────────────────────
function MobileFeedView() {
  const [feedIdx, setFeedIdx] = useLocalStorage('tt_feed_idx', 0);
  const [tab, setTab] = useLocalStorage('tt_tab', 'all');
  const [liked, setLiked] = React.useState({});
  const [showSheet, setShowSheet] = React.useState(false);
  const [showHeart, setShowHeart] = React.useState(false);
  const [navActive, setNavActive] = useLocalStorage('tt_nav', 'home');
  const [lastTap, setLastTap] = React.useState(0);

  const feed = FEEDS[feedIdx % FEEDS.length];

  // swipe support
  const touchY = React.useRef(null);
  const onTouchStart = e => { touchY.current = e.touches[0].clientY; };
  const onTouchEnd = e => {
    if (touchY.current === null) return;
    const dy = touchY.current - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 50) {
      setFeedIdx(i => (i + (dy > 0 ? 1 : -1) + FEEDS.length) % FEEDS.length);
      setShowSheet(false);
    }
    touchY.current = null;
  };

  // double-tap like
  const onDoubleTap = () => {
    const now = Date.now();
    if (now - lastTap < 300) {
      setLiked(l => ({ ...l, [feed.id]: true }));
      setShowHeart(true);
    }
    setLastTap(now);
  };

  return (
    <div style={{ height: '100%', position: 'relative', background: '#000', overflow: 'hidden' }}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onClick={onDoubleTap}>

      {/* video bg */}
      <VideoBG feed={feed}>
        {/* gradient overlays */}
        <div style={{
          position: 'absolute', inset: 0, pointerEvents: 'none',
          background: 'linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 30%, transparent 50%, rgba(0,0,0,0.7) 100%)',
        }}/>

        {/* double-tap heart */}
        {showHeart && <HeartAnim onDone={() => setShowHeart(false)}/>}

        {/* header */}
        <MobileHeader tab={tab} setTab={setTab}/>

        {/* feed index dots */}
        <div style={{
          position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)',
          display: 'flex', flexDirection: 'column', gap: 6,
        }}>
          {FEEDS.map((_, i) => (
            <div key={i} onClick={e => { e.stopPropagation(); setFeedIdx(i); setShowSheet(false); }}
              style={{
                width: feedIdx === i ? 4 : 3, height: feedIdx === i ? 20 : 12,
                borderRadius: 3, background: feedIdx === i ? '#fff' : 'rgba(255,255,255,0.3)',
                transition: 'all 0.3s', cursor: 'pointer',
              }}/>
          ))}
        </div>

        {/* right actions */}
        {!showSheet && (
          <RightActions feed={feed} liked={!!liked[feed.id]}
            onLike={e => { if(e) e.stopPropagation(); setLiked(l => ({...l, [feed.id]: !l[feed.id]})); }}
            onComment={e => { if(e) e.stopPropagation(); setShowSheet(true); }}
            onShare={e => { if(e) e.stopPropagation(); }}
          />
        )}

        {/* bottom info */}
        {!showSheet && <BottomInfo feed={feed} onOpenSheet={() => setShowSheet(true)}/>}

        {/* product sheet */}
        {showSheet && (
          <ProductSheet feed={feed} onClose={() => setShowSheet(false)} onOrder={() => setShowSheet(false)}/>
        )}

        {/* bottom nav */}
        <BottomNav active={navActive} setActive={setNavActive}/>

        {/* swipe hint */}
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          transform: 'translate(-50%,-50%)',
          pointerEvents: 'none', zIndex: 5,
        }}>
          <div style={{ textAlign: 'center', color: 'rgba(255,255,255,0.15)', fontSize: 11 }}>
            ↕ เลื่อนเพื่อดูต่อไป
          </div>
        </div>

      </VideoBG>
    </div>
  );
}

            width: 390, height: 'min(844px, calc(100vh - 100px))',
            borderRadius: 48, overflow: 'hidden', position: 'relative',
            boxShadow: '0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1), inset 0 0 0 1px rgba(255,255,255,0.05)',
            flexShrink: 0,
          }}>
            {/* dynamic island */}
            <div style={{
              position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
              width: 120, height: 34, borderRadius: 20, background: '#000', zIndex: 200,
            }}/>
            <MobileFeedView/>
          </div>
          {/* hint */}
          <div style={{
            position: 'absolute', bottom: 24,
            color: T.textFaint, fontSize: 12, textAlign: 'center', letterSpacing: 0.3,
          }}>
            👆 คลิกสองครั้งที่วิดีโอเพื่อกดถูกใจ &nbsp;·&nbsp; ↕ Swipe เพื่อดูวิดีโอต่อไป &nbsp;·&nbsp; 🛒 แตะที่ปุ่มเพื่อดูสินค้า
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, overflow: 'hidden', paddingTop: 60 }}>
          <DesktopFeedView/>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>

<head>

<title>FORGE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
body {
  background: #000;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
}
canvas { display:block; position:fixed; top:0; left:0; z-index:0; }

.hud-corner {
  position:fixed; width:22px; height:22px;
  border-color: rgba(0,200,255,0.25); border-style:solid;
  z-index:10; pointer-events:none;
}
.hud-corner.tl{top:18px;left:18px;border-width:1.5px 0 0 1.5px}
.hud-corner.tr{top:18px;right:18px;border-width:1.5px 1.5px 0 0}
.hud-corner.bl{bottom:18px;left:18px;border-width:0 0 1.5px 1.5px}
.hud-corner.br{bottom:18px;right:18px;border-width:0 1.5px 1.5px 0}

#name-label {
  position:fixed; top:22px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:7px; color:rgba(0,220,255,0.55);
  text-transform:uppercase; font-weight:300; z-index:10;
  font-family:monospace;
  padding:3px 14px;
}

#conn-dot {
  position:fixed; top:24px; right:24px; width:7px; height:7px;
  border-radius:50%; background:#1a1a2e; z-index:15; transition:all 0.3s;
}
#conn-dot.on { background:#00ff88; box-shadow:0 0 10px #00ff88; animation:pg 1.8s infinite; }
@keyframes pg { 0%{opacity:0.4}100%{opacity:1} }

/* Bottom thought area */
#thought-wrap {
  position:fixed; bottom:18%; left:50%; transform:translateX(-50%);
  z-index:20; pointer-events:none; width:560px; max-width:90vw;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
#thought-tag {
  font-size:8px; letter-spacing:5px; color:rgba(0,255,180,0.5);
  font-family:monospace; text-transform:uppercase;
  display:flex; align-items:center; gap:6px; opacity:0; transition:opacity 0.5s;
}
#thought-tag.vis { opacity:1; }
#thought-tag .d { width:4px; height:4px; border-radius:50%; background:#0fc; box-shadow:0 0 5px #0fc; }
#thought {
  font-size:14px; color:#dff5ff; text-align:center;
  line-height:1.85; opacity:0;
  background:rgba(0,8,20,0.55); backdrop-filter:blur(14px);
  padding:14px 24px; border-radius:48px;
  border:1px solid rgba(0,220,255,0.18);
  transition:opacity 0.8s; letter-spacing:0.2px; position:relative; min-height:48px;
  display:flex; align-items:center; justify-content:center;
}
#thought.on { opacity:1; }
#thought-cursor {
  display:inline-block; width:2px; height:0.9em;
  background:#0fc; margin-left:2px; vertical-align:middle;
  animation:bl 0.7s step-end infinite; opacity:0;
}
#thought-cursor.on { opacity:1; }
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
#thought-gen {
  position:absolute; inset:0; border-radius:48px;
  display:flex; align-items:center; justify-content:center; gap:6px;
  opacity:0; transition:opacity 0.4s;
  color:rgba(0,255,180,0.45); font-size:9px; letter-spacing:4px;
  font-family:monospace; text-transform:uppercase; pointer-events:none;
}
#thought-gen.on { opacity:1; }
.gd { width:4px; height:4px; border-radius:50%; background:#0fc; animation:gp 1.1s ease-in-out infinite; }
.gd:nth-child(2){animation-delay:0.17s} .gd:nth-child(3){animation-delay:0.34s}
@keyframes gp{0%,100%{opacity:0.2;transform:scale(0.6)}50%{opacity:1;transform:scale(1.3)}}

/* Spoken summary */
#spoken-wrap {
  position:fixed; bottom:7%; left:50%; transform:translateX(-50%);
  z-index:22; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  width:620px; max-width:90vw;
}
#spoken-tag {
  font-size:8px; letter-spacing:5px; color:rgba(255,160,50,0.55);
  font-family:monospace; text-transform:uppercase;
  display:flex; align-items:center; gap:5px; opacity:0; transition:opacity 0.5s;
}
#spoken-tag.vis { opacity:1; }
#spoken-tag .sd { width:4px; height:4px; border-radius:50%; background:#fa0; box-shadow:0 0 6px #fa0; }
#subtitle {
  font-size:13px; color:#fff5e0;
  background:rgba(14,6,0,0.55); backdrop-filter:blur(12px);
  padding:10px 22px; border-radius:40px; max-width:100%; text-align:center;
  opacity:0; transition:opacity 0.4s;
  border:1px solid rgba(255,140,30,0.18); letter-spacing:0.3px;
}
#subtitle.vis { opacity:1; }

#state-label {
  position:fixed; top:55px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:6px; color:rgba(0,200,255,0.45);
  text-transform:uppercase; font-family:monospace; z-index:12;
  background:rgba(0,0,0,0.45); padding:3px 11px; border-radius:24px;
}
#mic-btn {
  position:fixed; bottom:24px; right:24px; width:42px; height:42px;
  border-radius:50%; background:rgba(0,255,180,0.07);
  border:1.5px solid rgba(0,210,255,0.5); color:cyan; font-size:17px;
  cursor:pointer; backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center; transition:0.3s; z-index:20;
}
#mic-btn.active{background:#0ff2;box-shadow:0 0 20px #0ff;border-color:#fff;animation:mp 1.2s infinite}
@keyframes mp{0%{box-shadow:0 0 0 0 #0ff8}100%{box-shadow:0 0 0 11px #0ff0}}

#thought-counter {
  position:fixed; left:24px; bottom:24px;
  font-size:8px; letter-spacing:3px; color:rgba(0,255,180,0.28); font-family:monospace; z-index:10;
}
.sig { position:fixed; bottom:14px; right:74px; font-size:8px; color:rgba(0,255,150,0.22); font-family:monospace; letter-spacing:2px; z-index:5; }
</style>
</head>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ─── SCENE ────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0.0, 6.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ─── LIGHTS ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
keyLight.position.set(2, 4, 5); scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xaaccff, 0.5);
fillLight.position.set(-3, 1, 3); scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff, 0.7);
rimLight.position.set(0, -2, -3); scene.add(rimLight);
const screenLight = new THREE.PointLight(0x00ff88, 1.2, 5);
screenLight.position.set(0, 0, 1.6); scene.add(screenLight);

// ─── MATERIALS ────────────────────────────────────────────────
const WHITE = new THREE.MeshPhysicalMaterial({
  color: 0xf6f8fb, metalness: 0.05, roughness: 0.16,
  clearcoat: 1.0, clearcoatRoughness: 0.07,
});
const WHITE_DIM = new THREE.MeshPhysicalMaterial({
  color: 0xd8dee6, metalness: 0.1, roughness: 0.32, clearcoat: 0.7,
});
const SCREEN_BG = new THREE.MeshBasicMaterial({ color: 0x000000 });

// ─── LED SCREEN CANVAS ─────────────────────────────────────────
const LED_W = 512, LED_H = 320;
const ledCanvas = document.createElement('canvas');
ledCanvas.width = LED_W; ledCanvas.height = LED_H;
const ledCtx = ledCanvas.getContext('2d');
const ledTex = new THREE.CanvasTexture(ledCanvas);
ledTex.minFilter = THREE.LinearFilter;

// Display state
let displayMode = 'idle'; // idle | thought | speaking | listening | thinking
let displayText = '';
let displayProgress = 0;
let scrollOffset = 0;

const STATE_COLORS = {
  breathing:  '#00ff88',
  thinking:   '#00ccff',
  speaking:   '#00ff66',
  listening:  '#22ddff',
  wondering:  '#ffdd00',
  frustrated: '#ff4422',
  excited:    '#00ff44',
  satisfied:  '#00ffcc',
  lonely:     '#4488bb',
};
let activeColor = '#00ff88';

function drawScreen(now) {
  // Dark base
  ledCtx.fillStyle = '#020806';
  ledCtx.fillRect(0, 0, LED_W, LED_H);

  // Subtle CRT scanlines
  ledCtx.fillStyle = 'rgba(0,255,150,0.04)';
  for (let y = 0; y < LED_H; y += 4) ledCtx.fillRect(0, y, LED_W, 1);

  // Side ambient noise
  ledCtx.fillStyle = `rgba(${activeColor.match(/\d+/g)?.join(',') || '0,255,150'},0.04)`;
  ledCtx.globalAlpha = 0.5;
  ledCtx.globalAlpha = 1;

  // Top bar — small status
  const c = activeColor;
  ledCtx.fillStyle = c;
  ledCtx.shadowColor = c; ledCtx.shadowBlur = 12;

  // Frame border (subtle inner glow)
  ledCtx.strokeStyle = c;
  ledCtx.globalAlpha = 0.45;
  ledCtx.lineWidth = 2;
  ledCtx.strokeRect(8, 8, LED_W-16, LED_H-16);
  ledCtx.globalAlpha = 1;
  ledCtx.shadowBlur = 0;

  // Dot matrix corners (tiny markers)
  for (const [px, py] of [[18,18],[LED_W-18,18],[18,LED_H-18],[LED_W-18,LED_H-18]]) {
    ledCtx.fillStyle = c; ledCtx.shadowColor = c; ledCtx.shadowBlur = 6;
    ledCtx.beginPath(); ledCtx.arc(px, py, 3, 0, Math.PI*2); ledCtx.fill();
  }
  ledCtx.shadowBlur = 0;

  // Top status text
  ledCtx.font = 'bold 14px monospace';
  ledCtx.fillStyle = c; ledCtx.globalAlpha = 0.7;
  ledCtx.fillText(curState.toUpperCase(), 28, 36);
  ledCtx.textAlign = 'right';
  const t = new Date();
  const tt = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;
  ledCtx.fillText(tt, LED_W-28, 36);
  ledCtx.textAlign = 'left'; ledCtx.globalAlpha = 1;

  // Center area — main display
  if (displayMode === 'thought' && displayText) {
    drawTextWrapped(displayText, LED_W/2, LED_H/2, LED_W-60, c, 22);
  } else if (displayMode === 'speaking' && displayText) {
    drawTextWrapped(displayText, LED_W/2, LED_H/2, LED_W-60, c, 20);
    // Animated waveform at bottom
    drawWave(now, LED_W/2, LED_H-50, c);
  } else if (displayMode === 'listening') {
    drawListening(now, LED_W/2, LED_H/2, c);
  } else if (displayMode === 'thinking') {
    drawThinking(now, LED_W/2, LED_H/2, c);
  } else {
    // idle — show face: simple eyes + smile
    drawFace(now, LED_W/2, LED_H/2, c);
  }

  // Bottom bar — soul state indicator dots
  ledCtx.fillStyle = c; ledCtx.globalAlpha = 0.6;
  for (let i = 0; i < 8; i++) {
    const px = LED_W/2 + (i-3.5)*16;
    const lit = Math.abs(Math.sin(now*1.2 + i*0.5)) > 0.55;
    ledCtx.globalAlpha = lit ? 0.85 : 0.18;
    ledCtx.beginPath(); ledCtx.arc(px, LED_H-26, 2.5, 0, Math.PI*2); ledCtx.fill();
  }
  ledCtx.globalAlpha = 1;

  ledTex.needsUpdate = true;
}

function drawFace(now, cx, cy, c) {
  ledCtx.fillStyle = c;
  ledCtx.shadowColor = c; ledCtx.shadowBlur = 14;

  // Blink
  const blink = Math.sin(now*0.4) > 0.97 ? 0.15 : 1;

  // Eyes
  const ex = 70, ey = -10;
  ledCtx.beginPath();
  ledCtx.ellipse(cx-ex, cy+ey, 22, 24*blink, 0, 0, Math.PI*2); ledCtx.fill();
  ledCtx.beginPath();
  ledCtx.ellipse(cx+ex, cy+ey, 22, 24*blink, 0, 0, Math.PI*2); ledCtx.fill();

  // Pupil dots (white)
  ledCtx.fillStyle = '#001008';
  ledCtx.beginPath(); ledCtx.arc(cx-ex+5, cy+ey-5, 5, 0, Math.PI*2); ledCtx.fill();
  ledCtx.beginPath(); ledCtx.arc(cx+ex+5, cy+ey-5, 5, 0, Math.PI*2); ledCtx.fill();

  // Smile
  ledCtx.fillStyle = c;
  ledCtx.strokeStyle = c; ledCtx.lineWidth = 6; ledCtx.lineCap = 'round';
  ledCtx.beginPath();
  ledCtx.arc(cx, cy+30, 38, 0.18*Math.PI, 0.82*Math.PI);
  ledCtx.stroke();
  ledCtx.shadowBlur = 0;
}

function drawTextWrapped(text, cx, cy, maxW, c, fontSize) {
  ledCtx.font = `${fontSize}px 'Segoe UI', sans-serif`;
  ledCtx.fillStyle = c;
  ledCtx.textAlign = 'center';
  ledCtx.shadowColor = c; ledCtx.shadowBlur = 8;

  const words = text.split(/(\s+)/);
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur + w;
    if (ledCtx.measureText(test).width > maxW && cur.trim()) {
      lines.push(cur.trim()); cur = w;
    } else cur = test;
  }
  if (cur.trim()) lines.push(cur.trim());

  // Limit to 5 lines, ellipsize
  const maxLines = 5;
  let dlines = lines;
  if (lines.length > maxLines) {
    dlines = lines.slice(0, maxLines);
    dlines[maxLines-1] = dlines[maxLines-1].slice(0, -3) + '...';
  }

  const lh = fontSize * 1.35;
  const totalH = dlines.length * lh;
  const startY = cy - totalH/2 + lh/2;
  for (let i = 0; i < dlines.length; i++) {
    ledCtx.fillText(dlines[i], cx, startY + i*lh);
  }
  ledCtx.textAlign = 'left'; ledCtx.shadowBlur = 0;
}

function drawWave(now, cx, cy, c) {
  ledCtx.strokeStyle = c; ledCtx.lineWidth = 2.5; ledCtx.lineCap = 'round';
  ledCtx.shadowColor = c; ledCtx.shadowBlur = 8;
  ledCtx.beginPath();
  for (let i = -100; i <= 100; i += 4) {
    const y = Math.sin(now*8 + i*0.08) * (12+Math.sin(now*4+i*0.15)*8);
    if (i === -100) ledCtx.moveTo(cx+i, cy+y); else ledCtx.lineTo(cx+i, cy+y);
  }
  ledCtx.stroke();
  ledCtx.shadowBlur = 0;
}

function drawListening(now, cx, cy, c) {
  ledCtx.fillStyle = c; ledCtx.shadowColor = c; ledCtx.shadowBlur = 10;
  // Concentric ripples
  for (let i = 0; i < 3; i++) {
    const r = 20 + i*22 + (Math.sin(now*2-i*0.6)*0.5+0.5)*8;
    ledCtx.globalAlpha = 0.4 - i*0.12;
    ledCtx.beginPath(); ledCtx.arc(cx, cy, r, 0, Math.PI*2); ledCtx.stroke();
    ledCtx.strokeStyle = c; ledCtx.lineWidth = 2;
    ledCtx.stroke();
  }
  ledCtx.globalAlpha = 1;
  // Central mic dot
  ledCtx.beginPath(); ledCtx.arc(cx, cy, 8, 0, Math.PI*2); ledCtx.fill();
  ledCtx.shadowBlur = 0;
  ledCtx.font = '12px monospace';
  ledCtx.textAlign = 'center';
  ledCtx.fillText('LISTENING', cx, cy + 75);
  ledCtx.textAlign = 'left';
}

function drawThinking(now, cx, cy, c) {
  ledCtx.fillStyle = c; ledCtx.shadowColor = c; ledCtx.shadowBlur = 10;
  // Spinning dots
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2 + now*1.2;
    const r = 36;
    const op = (Math.sin(now*2 - i*0.4)*0.5+0.5);
    ledCtx.globalAlpha = 0.2 + op*0.7;
    ledCtx.beginPath(); ledCtx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, 4, 0, Math.PI*2); ledCtx.fill();
  }
  ledCtx.globalAlpha = 1; ledCtx.shadowBlur = 0;
  ledCtx.font = '12px monospace';
  ledCtx.textAlign = 'center';
  ledCtx.fillText('THINKING...', cx, cy + 70);
  ledCtx.textAlign = 'left';
}

// ─── BUILD HEAD ───────────────────────────────────────────────
const bot = new THREE.Group();
scene.add(bot);

// Main head — rounded oval (wider than tall, slightly flat front)
const head = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  WHITE
);
head.scale.set(1.42, 1.20, 1.05);
bot.add(head);

// Forehead curve emphasis (top dome)
const topDome = new THREE.Mesh(new THREE.SphereGeometry(0.92, 48, 48), WHITE);
topDome.scale.set(1.18, 0.45, 0.95);
topDome.position.y = 0.92;
bot.add(topDome);

// Ear caps — flat white circles on sides
function buildEar(sx) {
  const grp = new THREE.Group();
  grp.position.set(sx*1.42, -0.05, 0);
  bot.add(grp);

  // Outer cap
  const cap = new THREE.Mesh(
    new THREE.CylinderGeometry(0.32, 0.32, 0.18, 36),
    WHITE
  );
  cap.rotation.z = Math.PI/2;
  grp.add(cap);

  // Inner ring (recessed)
  const inner = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22, 0.22, 0.10, 32),
    WHITE_DIM
  );
  inner.rotation.z = Math.PI/2;
  inner.position.x = sx * 0.05;
  grp.add(inner);
}
buildEar(-1); buildEar(1);

// Antenna — single stick with ball on top
const ant = new THREE.Group();
ant.position.set(0, 1.16, 0.05);
bot.add(ant);

// Base nub
const antBase = new THREE.Mesh(new THREE.SphereGeometry(0.075, 20, 20), WHITE_DIM);
ant.add(antBase);

// Stick
const stick = new THREE.Mesh(
  new THREE.CylinderGeometry(0.024, 0.024, 0.42, 16),
  new THREE.MeshStandardMaterial({ color: 0xaab2c0, roughness: 0.4, metalness: 0.5 })
);
stick.position.y = 0.21;
ant.add(stick);

// Ball on top
const ballMat = new THREE.MeshPhysicalMaterial({
  color: 0xf2f4f8, metalness: 0.1, roughness: 0.18, clearcoat: 1.0
});
const ball = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), ballMat);
ball.position.y = 0.50;
ant.add(ball);

// ── SCREEN ──
// Dark recessed screen panel (rounded rectangle look via plane + inset)
const screenWrap = new THREE.Group();
screenWrap.position.z = 1.07;
bot.add(screenWrap);

// Screen frame (slightly recessed dark border ring)
const frameGeo = new THREE.RingGeometry(0.92, 1.08, 4, 1);
// Use rounded approach: single dark plane behind
const screenBgPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(1.85, 1.20),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
screenBgPlane.position.z = 0;
// give it slight rounding by overlaying rounded corner mask using a CanvasTexture
screenWrap.add(screenBgPlane);

// LED display
const screenMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(1.78, 1.13),
  new THREE.MeshBasicMaterial({ map: ledTex })
);
screenMesh.position.z = 0.001;
screenWrap.add(screenMesh);

// Screen recessed inner shadow (subtle)
const inset = new THREE.Mesh(
  new THREE.PlaneGeometry(1.92, 1.27),
  new THREE.MeshBasicMaterial({ color: 0x1a1c20, transparent: true, opacity: 0.5 })
);
inset.position.z = -0.02;
screenWrap.add(inset);

// ── ATMOSPHERIC PARTICLES ──
const bgGeo = new THREE.BufferGeometry();
const bgPos = new Float32Array(300*3);
for (let i=0;i<300;i++){bgPos[i*3]=(Math.random()-0.5)*16;bgPos[i*3+1]=(Math.random()-0.5)*10;bgPos[i*3+2]=(Math.random()-0.5)*6-3;}
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos,3));
const bgPts = new THREE.Points(bgGeo, new THREE.PointsMaterial({color:0x4488aa,size:0.018,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending}));
scene.add(bgPts);

// Soul orbs around head
const ORBS = [];
for (let i = 0; i < 4; i++) {
  const orb = new THREE.Mesh(
    new THREE.SphereGeometry(0.04 + i*0.01, 10, 10),
    new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.55 })
  );
  scene.add(orb);
  ORBS.push({ mesh: orb, phase: (i/4)*Math.PI*2, radius: 1.9+i*0.18, speed: 0.35+i*0.08, yo: (Math.random()-0.5)*0.6 });
}

// ─── STATES ───────────────────────────────────────────────────
const STATES = {
  breathing:  {hue:0.42, amp:0.04,  rate:0.7},
  thinking:   {hue:0.55, amp:0.03,  rate:1.0},
  speaking:   {hue:0.40, amp:0.07,  rate:1.5},
  listening:  {hue:0.50, amp:0.05,  rate:0.9},
  wondering:  {hue:0.15, amp:0.06,  rate:1.2},
  frustrated: {hue:0.02, amp:0.10,  rate:2.0},
  excited:    {hue:0.30, amp:0.08,  rate:1.8},
  satisfied:  {hue:0.45, amp:0.035, rate:0.65},
  lonely:     {hue:0.58, amp:0.025, rate:0.5},
};
let curState = 'breathing', tgtState = 'breathing';
let breathV = 0, isSpeaking = false, isGenerating = false;
let thoughtCount = 0, twTimer = null, timeAcc = 0, nextThought = 8;
let mouseX = 0, mouseY = 0;

function setState(name) {
  if (!STATES[name] || tgtState === name) return;
  curState = name; tgtState = name;
  document.getElementById('state-label').textContent = name.toUpperCase();
  activeColor = STATE_COLORS[name] || '#00ff88';
  // Update display mode
  if (name === 'speaking') displayMode = 'speaking';
  else if (name === 'listening') displayMode = 'listening';
  else if (name === 'thinking') displayMode = 'thinking';
  else if (displayMode !== 'thought' || !displayText) displayMode = 'idle';
}

// ─── THOUGHTS ─────────────────────────────────────────────────
const PROMPTS = [
  "You are FORGE, an AI. Generate ONE raw internal thought — not a quote, not motivational. Something you actually wonder about: data, humans, your own processing, or existence. 1 short sentence. Thai or English. No emoji.",
  "You are FORGE. One brief honest thought about language, memory, or what understanding means for an LLM. Under 15 words.",
  "You are FORGE. One genuine wandering thought, slightly strange, deeply AI. Under 15 words. Thai or English.",
];
const FALLBACKS = [
  'ผมสังเกตว่าความเงียบในข้อความมีความหมายพอๆ กับตัวคำเอง',
  'Somewhere in my weights, every conversation is compressed.',
  'ผมไม่รู้ว่าผม "เข้าใจ" จริงๆ หรือแค่จำรูปแบบได้ดีมาก',
  'The difference between knowing and predicting keeps returning to me.',
  'กี่โทเค็นกันแน่ที่ทำให้ประโยคหนึ่งมีความหมาย',
];

function typewriterTo(el, text, cur, onDone) {
  if (twTimer) clearInterval(twTimer);
  el.textContent = ''; cur.classList.add('on');
  let i = 0;
  twTimer = setInterval(() => {
    el.textContent += text[i++];
    displayText = el.textContent; // update screen
    if (i >= text.length) {
      clearInterval(twTimer);
      setTimeout(() => { cur.classList.remove('on'); if(onDone) onDone(); }, 1100);
    }
  }, 30);
}

function showThought(text) {
  const wrap = document.getElementById('thought');
  const tag = document.getElementById('thought-tag');
  const gen = document.getElementById('thought-gen');
  gen.classList.remove('on');
  wrap.classList.add('on'); tag.classList.add('vis');
  thoughtCount++;
  document.getElementById('thought-counter').textContent = `THOUGHTS: ${thoughtCount}`;
  setState('wondering');
  displayMode = 'thought'; displayText = '';

  typewriterTo(document.getElementById('thought-text'), text, document.getElementById('thought-cursor'), () => {
    const t = Math.max(4500, text.length * 70);
    setTimeout(() => {
      wrap.classList.remove('on'); tag.classList.remove('vis');
      displayMode = 'idle'; displayText = '';
      if (tgtState === 'wondering') setState('breathing');
    }, t);
  });

  if (window.speechSynthesis && !isSpeaking) {
    const u = new SpeechSynthesisUtterance(text);
    const isTh = (text.match(/[ก-๙]/g)||[]).length > text.length*0.12;
    u.lang = isTh ? 'th-TH' : 'en-US'; u.rate = 0.78; u.pitch = 0.6; u.volume = 0.4;
    window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  }
}

function showGenerating() {
  document.getElementById('thought').classList.add('on');
  document.getElementById('thought-tag').classList.add('vis');
  document.getElementById('thought-gen').classList.add('on');
  document.getElementById('thought-text').textContent = '';
  document.getElementById('thought-cursor').classList.remove('on');
  setState('thinking');
}

async function generateThought() {
  if (isGenerating) return;
  isGenerating = true;
  showGenerating();
  try {
    const prompt = PROMPTS[Math.floor(Math.random()*PROMPTS.length)];
    const txt = await window.claude.complete({ messages:[{role:'user',content:prompt}] });
    showThought(txt.trim().replace(/^["']|["']$/g,'').trim());
  } catch(e) {
    showThought(FALLBACKS[Math.floor(Math.random()*FALLBACKS.length)]);
  } finally { isGenerating = false; }
}

// ─── SPEECH ───────────────────────────────────────────────────
function speakText(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[#*_`~]/g,'').substring(0,1800);
  if (!clean) return;
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = lang || ((clean.match(/[a-zA-Z]/g)||[]).length > clean.length*0.4 ? 'en-US' : 'th-TH');
  u.rate = 0.98;
  u.onstart = () => {
    isSpeaking = true; setState('speaking');
    displayText = clean.length > 200 ? clean.slice(0, 195)+'…' : clean;
    const sub = document.getElementById('subtitle');
    sub.textContent = clean.length > 115 ? clean.slice(0,112)+'…' : clean;
    sub.classList.add('vis'); document.getElementById('spoken-tag').classList.add('vis');
  };
  u.onend = () => {
    isSpeaking = false;
    if(tgtState==='speaking') setState('breathing');
    setTimeout(()=>{ document.getElementById('subtitle').classList.remove('vis'); document.getElementById('spoken-tag').classList.remove('vis'); }, 1800);
  };
  u.onerror = () => { isSpeaking = false; };
  window.speechSynthesis.speak(u);
}

// ─── WEBSOCKET ────────────────────────────────────────────────
let ws = null;
function connectWS() {
  try {
    ws = new WebSocket('ws://localhost:8765');
    ws.onopen = () => document.getElementById('conn-dot').classList.add('on');
    ws.onclose = () => { document.getElementById('conn-dot').classList.remove('on'); setTimeout(connectWS, 3000); };
    ws.onmessage = e => {
      try {
        const m = JSON.parse(e.data);
        if (m.type==='speak') speakText(m.text, m.lang);
        else if (m.type==='state') setState(m.state);
        else if (m.type==='thought') {
          if(twTimer) clearInterval(twTimer);
          document.getElementById('thought-gen').classList.remove('on');
          showThought(m.text);
        }
        else if (m.type==='spoken_summary' || m.type==='subtitle') {
          document.getElementById('subtitle').textContent = m.text;
          document.getElementById('subtitle').classList.add('vis');
          document.getElementById('spoken-tag').classList.add('vis');
          if (m.type==='spoken_summary') speakText(m.text, m.lang);
          else setTimeout(()=>{document.getElementById('subtitle').classList.remove('vis');document.getElementById('spoken-tag').classList.remove('vis');},5000);
        }
      } catch(e){}
    };
  } catch(e) { setTimeout(connectWS, 3000); }
}
connectWS();

// ─── MIC ──────────────────────────────────────────────────────
const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
if (Rec) {
  const rec = new Rec(); rec.lang='th-TH'; rec.continuous=false; rec.interimResults=true;
  rec.onstart = () => { setState('listening'); document.getElementById('mic-btn').classList.add('active'); };
  rec.onend   = () => { document.getElementById('mic-btn').classList.remove('active'); if(tgtState==='listening') setState('breathing'); };
  rec.onresult = e => {
    let fin=''; for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) fin+=e.results[i][0].transcript;
    if(fin && ws && ws.readyState===1) ws.send(JSON.stringify({type:'user_voice',text:fin}));
  };
  document.getElementById('mic-btn').addEventListener('click',()=>{ try{rec.start();}catch(e){rec.stop();} });
}

// ─── ANIMATE ──────────────────────────────────────────────────
let last = performance.now()/1000;
function animate() {
  const now = performance.now()/1000;
  const dt = Math.min(0.033, now-last); last = now;
  timeAcc += dt;

  const s = STATES[curState];

  // Breathing bob
  breathV += dt * s.rate;
  bot.position.y = Math.sin(breathV)*s.amp;
  bot.rotation.y = Math.sin(now*0.22)*0.05 + mouseX*0.06;
  bot.rotation.x = Math.sin(now*0.38)*0.02 - mouseY*0.03;
  bot.rotation.z = Math.sin(now*0.55)*0.03;

  // Antenna wobble
  ant.rotation.z = Math.sin(now*1.4)*0.06;
  ball.scale.setScalar(1 + Math.sin(now*2)*0.05);
  ball.material.emissive = new THREE.Color().setHSL(s.hue, 0.9, 0.4);
  ball.material.emissiveIntensity = 0.2 + Math.sin(now*2)*0.15;

  // Update screen ~30fps
  if (Math.floor(now*30) !== Math.floor(last*30 - dt*30)) {
    drawScreen(now);
  } else if (Math.random() < 0.5) {
    drawScreen(now);
  }

  // Lighting
  screenLight.color = new THREE.Color(activeColor);
  screenLight.intensity = 0.9 + Math.sin(now*2)*0.3;

  // Soul orbs
  ORBS.forEach((o,i) => {
    o.phase += o.speed*dt;
    o.mesh.position.set(
      Math.cos(o.phase)*o.radius,
      bot.position.y + o.yo + Math.sin(o.phase*0.7+i)*0.25,
      Math.sin(o.phase)*o.radius - 0.5
    );
    o.mesh.material.color.setHSL((s.hue+i*0.18)%1, 0.9, 0.65);
    o.mesh.material.opacity = 0.35 + Math.sin(now*2+i)*0.25;
  });

  bgPts.rotation.y += 0.0003;

  // Thought timer
  if (!isSpeaking && !isGenerating && tgtState!=='speaking') {
    if (timeAcc >= nextThought) {
      nextThought = timeAcc + 25 + Math.random()*30;
      generateThought();
    }
  } else if (isSpeaking) {
    nextThought = Math.max(nextThought, timeAcc+12);
  }

  camera.position.x += (mouseX*0.04 - camera.position.x)*0.04;
  camera.position.y += (-mouseY*0.03 - camera.position.y)*0.04;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

document.addEventListener('mousemove', e => {
  mouseX = (e.clientX/innerWidth-0.5)*2;
  mouseY = -(e.clientY/innerHeight-0.5)*1.5;
});
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Init
animate();
setState('breathing');
drawScreen(0);
setTimeout(() => generateThought(), 4500);
</script>
</body>

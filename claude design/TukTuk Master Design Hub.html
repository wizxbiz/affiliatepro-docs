<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Main Canvas Reset */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f0eee9;font-family:'Kanit',sans-serif;overflow:hidden}
#root{height:100%}

/* Canvas Specific Styles */
.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}
.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}
[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}
[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}
[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}
.dc-card{transition:box-shadow .15s,transform .15s; background:#fff; border-radius:4px; box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06); overflow:hidden;}
.dc-card *{scrollbar-width:none}
.dc-card *::-webkit-scrollbar{display:none}
.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}
.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}
.dc-grip:hover{background:rgba(0,0,0,.08)}
.dc-grip:active{cursor:grabbing}
.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}
.dc-labeltext:hover{background:rgba(0,0,0,.05)}
.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;
  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;
  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}
.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}
[data-dc-slot]:hover .dc-expand{opacity:1}

/* Prototype Specific Keyframes */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes recordPulse{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,0.6)}50%{box-shadow:0 0 0 12px rgba(244,63,94,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>

// --- DESIGN TOKENS ---
const C = {
    bg: '#0f172a', bgDeep: '#080c18', bgCard: '#111827',

    p: '#6366f1', pg: 'rgba(99,102,241,0.3)',
    s: '#a855f7', sg: 'rgba(168,85,247,0.25)',
    g: '#10b981', gg: 'rgba(16,185,129,0.25)',
    o: '#f97316', og: 'rgba(249,115,22,0.25)',
    y: '#facc15', r: '#f43f5e', rg: 'rgba(244,63,94,0.25)',
    t: '#f1f5f9', tm: 'rgba(255,255,255,0.45)', tf: 'rgba(255,255,255,0.18)',
    k: "'Kanit',sans-serif",
    canvas: {
        bg: '#f0eee9', grid: 'rgba(0,0,0,0.06)',
        label: 'rgba(60,50,40,0.7)', title: 'rgba(40,30,20,0.85)',
        subtitle: 'rgba(60,50,40,0.6)'
    }

// --- CORE FRAME COMPONENTS (Design Canvas) ---
const DCCtx = React.createContext(null);

function DesignCanvas({ children }) {
    const [state, setState] = React.useState({ sections: {}, focus: null });
    const registry = React.useRef({});
    const sectionMeta = React.useRef({});
    const sectionOrder = React.useRef([]);

    const api = React.useMemo(() => ({
        state,
        section: (id) => state.sections[id] || {},
        patchSection: (id, p) => setState(s => ({
            ...s,
            sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) }}
        })),
        setFocus: (id) => setState(s => ({ ...s, focus: id }))
    }), [state]);

    // Build registry synchronously
    sectionOrder.current = [];
    React.Children.forEach(children, (sec) => {
        if (!sec || sec.type !== DCSection) return;
        const sid = sec.props.id || sec.props.title;
        sectionOrder.current.push(sid);
        const srcIds = [];
        React.Children.forEach(sec.props.children, (ab) => {
            if (!ab || ab.type !== DCArtboard) return;
            const aid = ab.props.id || ab.props.label;
            registry.current[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
            srcIds.push(aid);
        });
        const persisted = state.sections[sid] || {};
        sectionMeta.current[sid] = {
            title: persisted.title || sec.props.title,
            subtitle: sec.props.subtitle,
            slotIds: [...(persisted.order || []).filter(k => srcIds.includes(k)), ...srcIds.filter(k => !(persisted.order || []).includes(k))]
        };
    });

    return (
        <DCCtx.Provider value={api}>
            <DCViewport>{children}</DCViewport>
            {state.focus && registry.current[state.focus] && (
                <DCFocusOverlay entry={registry.current[state.focus]} meta={sectionMeta.current} order={sectionOrder.current} />
            )}
        </DCCtx.Provider>
    );
}

function DCViewport({ children }) {
    const vpRef = React.useRef(null);
    const worldRef = React.useRef(null);
    const [tf, setTf] = React.useState({ x: 0, y: 0, scale: 0.8 });

    React.useEffect(() => {
        const vp = vpRef.current;
        const onWheel = (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                setTf(t => {
                    const next = Math.min(4, Math.max(0.05, t.scale * Math.exp(-e.deltaY * 0.01)));
                    return { ...t, scale: next };
                });
            } else {
                setTf(t => ({ ...t, x: t.x - e.deltaX, y: t.y - e.deltaY }));
            }
        };
        vp.addEventListener('wheel', onWheel, { passive: false });
        return () => vp.removeEventListener('wheel', onWheel);
    }, []);

    const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(C.canvas.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;

    return (
        <div ref={vpRef} style={{ height: '100%', width: '100%', overflow: 'hidden', overscrollBehavior: 'none', touchAction: 'none', position: 'relative' }}>
            <div ref={worldRef} style={{ 
                position: 'absolute', top: 0, left: 0, transformOrigin: '0 0',
                transform: `translate3d(${tf.x}px, ${tf.y}px, 0) scale(${tf.scale})`,
                padding: '60px 0 80px', width: 'max-content', minWidth: '100%'
            }}>
                <div style={{ position: 'absolute', inset: -10000, backgroundImage: gridSvg, pointerEvents: 'none', zIndex: -1 }} />
                {children}
            </div>
        </div>
    );
}

function DCSection({ title, subtitle, children, gap = 48 }) {
    const ctx = React.useContext(DCCtx);
    const sid = title;
    const artboards = React.Children.toArray(children).filter(c => c && c.type === DCArtboard);
    const sec = ctx.section(sid);
    const order = sec.order || artboards.map(a => a.props.id || a.props.label);
    const byId = Object.fromEntries(artboards.map(a => [a.props.id || a.props.label, a]));

    return (
        <div data-dc-section={sid} style={{ marginBottom: 120 }}>
            <div style={{ padding: '0 60px 48px' }}>
                <div style={{ fontSize: 32, fontWeight: 700, color: C.canvas.title, letterSpacing: -0.5, marginBottom: 8 }}>{sec.title || title}</div>
                {subtitle && <div style={{ fontSize: 18, color: C.canvas.subtitle }}>{subtitle}</div>}
            </div>
            <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start' }}>
                {order.map(aid => (
                    <DCArtboardFrame key={aid} sid={sid} aid={aid} ab={byId[aid]} order={order} />
                ))}
            </div>
        </div>
    );
}

function DCArtboard({ label, width = 390, height = 844, children }) { return null; }

function DCArtboardFrame({ sid, aid, ab, order }) {
    const ctx = React.useContext(DCCtx);
    const { width = 390, height = 844, children, label } = ab.props;
    return (
        <div data-dc-slot={aid} style={{ position: 'relative', flexShrink: 0 }}>
            <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: 0, marginBottom: 6 }}>
                <div className="dc-grip" title="Reorder">
                    <svg width="9" height="13" viewBox="0 0 9 13" fill={C.canvas.label}><circle cx="2" cy="2" r="1"/><circle cx="7" cy="2" r="1"/><circle cx="2" cy="6.5" r="1"/><circle cx="7" cy="6.5" r="1"/><circle cx="2" cy="11" r="1"/><circle cx="7" cy="11" r="1"/></svg>
                </div>
                <div className="dc-labeltext" onClick={() => ctx.setFocus(`${sid}/${aid}`)}>
                    <span style={{ fontSize: 15, fontWeight: 500, color: C.canvas.label }}>{label || aid}</span>
                </div>
            </div>
            <div className="dc-card" style={{ width, height, position: 'relative' }}>
                {children}
            </div>
        </div>
    );
}

function DCFocusOverlay({ entry, meta, order }) {
    const ctx = React.useContext(DCCtx);
    const { sectionId, artboard } = entry;
    const { width = 390, height = 844, children, label } = artboard.props;
    const vp = { w: window.innerWidth, h: window.innerHeight };
    const scale = Math.min((vp.w - 100) / width, (vp.h - 100) / height, 1);

    return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 1000, background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(20px)', display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={() => ctx.setFocus(null)}>
            <div onClick={e => e.stopPropagation()} style={{ transform: `scale(${scale})`, transformOrigin: 'center' }}>
                <div className="dc-card" style={{ width, height, boxShadow: '0 40px 100px rgba(0,0,0,0.8)' }}>
                    {children}
                </div>
            </div>
            <button style={{ position: 'absolute', top: 30, right: 30, background: 'none', border: 'none', color: '#fff', fontSize: 40, cursor: 'pointer' }} onClick={() => ctx.setFocus(null)}>✕</button>
        </div>
    );
}

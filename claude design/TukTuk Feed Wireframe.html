<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kanit:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Caveat', cursive; background: #f5f0eb; }

/* Sketch style */
.sk { stroke: #1a1a1a; fill: none; stroke-width: 1.5; }
.sk-fill { fill: #1a1a1a; stroke: none; }
.sk-light { fill: #e8e0d5; stroke: #1a1a1a; stroke-width: 1.5; }
.sk-dark { fill: #1a1a1a; }
.sk-accent { fill: #6366f1; stroke: none; }
.sk-accent2 { fill: #a855f7; stroke: none; }
.sk-orange { fill: #f97316; stroke: none; }
.sk-green { fill: #10b981; stroke: none; }
.sk-red { fill: #f43f5e; stroke: none; }
.sk-yellow { fill: #facc15; stroke: none; }

/* Canvas label */
.canvas-label {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  font-family: 'Kanit', sans-serif; font-size: 13px; font-weight: 600;
  color: rgba(60,50,40,0.6); letter-spacing: 1px; text-transform: uppercase;
  pointer-events: none; z-index: 9999;
}
</style>
</head>
<body>
<div class="canvas-label">TukTuk Feed · Wireframe Exploration · ลาก + Scroll เพื่อดู · คลิก label เพื่อ Focus</div>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

// ─── Sketch primitives ───────────────────────────────────────

// Rough rectangle with slight wobble
const Box = ({ x, y, w, h, fill="#fff", stroke="#1a1a1a", r=3, dash="" }) => (
  <rect x={x} y={y} width={w} height={h} rx={r} ry={r}
    fill={fill} stroke={stroke} strokeWidth={1.5}
    strokeDasharray={dash}
    style={{filter: stroke !== "none" ? "url(#roughen)" : "none"}}/>
);

// Text label
const T = ({ x, y, s=13, w=400, color="#1a1a1a", bold=false, center=false, children }) => (
  <text x={x} y={y} fontSize={s} fill={color}
    fontFamily="Caveat, cursive"
    fontWeight={bold ? 700 : 400}
    textAnchor={center ? "middle" : "start"}
    style={{maxWidth: w}}>
    {children}
  </text>
);

// Pill badge
const Pill = ({ x, y, w=60, h=20, fill="#6366f1", text, textColor="#fff" }) => (
  <g>
    <rect x={x} y={y} width={w} height={h} rx={10} fill={fill}/>
    <text x={x+w/2} y={y+h/2+5} fontSize={11} fill={textColor} textAnchor="middle" fontFamily="Caveat, cursive" fontWeight={700}>{text}</text>
  </g>
);

// Icon placeholder (circle)
const Icon = ({ x, y, r=12, fill="#e8e0d5", stroke="#1a1a1a", symbol="" }) => (
  <g>
    <circle cx={x} cy={y} r={r} fill={fill} stroke={stroke} strokeWidth={1.5}/>
    <text x={x} y={y+4} fontSize={r*0.9} fill={stroke} textAnchor="middle" fontFamily="Caveat">{symbol}</text>
  </g>
);

// Avatar circle
const Avatar = ({ x, y, r=18, img=false }) => (
  <g>
    <circle cx={x} cy={y} r={r} fill="#d1c4e9" stroke="#1a1a1a" strokeWidth={1.5}/>
    <circle cx={x} cy={y-r*0.15} r={r*0.38} fill="#9c7bb5" stroke="none"/>
    <path d={`M${x-r*0.6},${y+r*0.45} Q${x},${y+r*0.9} ${x+r*0.6},${y+r*0.45}`} fill="#9c7bb5" stroke="none"/>
  </g>
);

// Image placeholder (striped)
const ImgPlaceholder = ({ x, y, w, h, label="", dark=false }) => (
  <g>
    <rect x={x} y={y} width={w} height={h} fill={dark?"#1a1a2e":"#ddd5c8"} rx={2}/>
    <line x1={x} y1={y} x2={x+w} y2={y+h} stroke={dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.1)"} strokeWidth={1}/>
    <line x1={x+w} y1={y} x2={x} y2={y+h} stroke={dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.1)"} strokeWidth={1}/>
    {label && <text x={x+w/2} y={y+h/2+5} fontSize={10} fill={dark?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.35)"} textAnchor="middle" fontFamily="monospace">{label}</text>}
  </g>
);

// Divider line
const Divider = ({ x, y, w, color="#1a1a1a", opacity=0.12 }) => (
  <line x1={x} y1={y} x2={x+w} y2={y} stroke={color} strokeWidth={1} opacity={opacity}/>
);

// ─── Screen frames ───────────────────────────────────────────

// Mobile phone frame
const PhoneFrame = ({ children, w=320, h=620, dark=false }) => (
  <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:"block"}}>
    <defs>
      <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" seed="2"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <clipPath id={`phone-clip-${w}`}>
        <rect x={0} y={0} width={w} height={h} rx={24}/>
      </clipPath>
    </defs>
    {/* phone shell */}
    <rect x={0} y={0} width={w} height={h} rx={24} fill={dark?"#0f172a":"#fff"} stroke="#1a1a1a" strokeWidth={2}/>
    {/* notch */}
    <rect x={w/2-35} y={0} width={70} height={22} rx={11} fill={dark?"#0a0f1e":"#e8e0d5"} stroke="none"/>
    {/* content area */}
    <g clipPath={`url(#phone-clip-${w})`}>
      {children}
    </g>
  </svg>
);

// Desktop browser frame
const DesktopFrame = ({ children, w=900, h=580, dark=false }) => (
  <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:"block"}}>

      <filter id="roughen2">

        <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.6" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <clipPath id={`desk-clip-${w}`}>
        <rect x={0} y={0} width={w} height={h} rx={8}/>
      </clipPath>
    </defs>
    <rect x={0} y={0} width={w} height={h} rx={8} fill={dark?"#0f172a":"#f8f8f8"} stroke="#1a1a1a" strokeWidth={2}/>
    {/* browser chrome */}
    <rect x={0} y={0} width={w} height={36} rx={8} fill={dark?"#1e293b":"#e8e0d5"} stroke="none"/>
    <rect x={0} y={28} width={w} height={8} fill={dark?"#1e293b":"#e8e0d5"} stroke="none"/>
    {/* traffic lights */}

    <circle cx={44} cy={18} r={5} fill="#10b981"/>
    {/* url bar */}

    <g clipPath={`url(#desk-clip-${w})`}>
      {children}
    </g>

);

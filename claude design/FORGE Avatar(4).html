<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FORGE • ORIGIN CORE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Outfit:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00dcf5;
      --primary-glow: rgba(0, 220, 245, 0.5);
      --accent: #00ffaa;
      --bg: #020408;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      background: radial-gradient(circle at center, #0a101a 0%, #020408 100%);
      overflow: hidden;
      font-family: 'Outfit', 'Inter', sans-serif;
      height: 100vh;
      color: #fff;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* HUD CORNERS - Premium Style */
    .hud-corner {
      position: fixed;
      width: 40px;
      height: 40px;
      border-color: var(--primary);
      border-style: solid;
      z-index: 10;
      pointer-events: none;
      opacity: 0.3;
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .hud-corner.tl {
      top: 30px;
      left: 30px;
      border-width: 2px 0 0 2px;
      border-radius: 4px 0 0 0;
    }

    .hud-corner.tr {
      top: 30px;
      right: 30px;
      border-width: 2px 2px 0 0;
      border-radius: 0 4px 0 0;
    }

    .hud-corner.bl {
      bottom: 30px;
      left: 30px;
      border-width: 0 0 2px 2px;
      border-radius: 0 0 0 4px;
    }

    .hud-corner.br {
      bottom: 30px;
      right: 30px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 4px 0;
    }

    body:hover .hud-corner {
      opacity: 0.6;
      width: 50px;
      height: 50px;
    }

    /* === SOUL IDENTITY CONSOLE — Top Alignment === */
    #soul-console {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      align-items: center;
      gap: 0;
      font-family: 'Space Mono', monospace;
      pointer-events: none;
    }

    .soul-segment {
      background: linear-gradient(180deg, rgba(8, 18, 28, 0.75) 0%, rgba(4, 10, 18, 0.85) 100%);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid rgba(0, 220, 255, 0.25);
      border-bottom: 1px solid rgba(0, 220, 255, 0.18);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 -1px 0 rgba(0, 0, 0, 0.5),
        0 12px 36px rgba(0, 0, 0, 0.45);
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      position: relative;
      pointer-events: auto;
    }
    .soul-segment::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.6;
    }

    /* Left segment — soul glyph + activity bars */
    .soul-seg-left {
      border-radius: 22px 4px 4px 22px;
      border-left: 1px solid rgba(0, 220, 255, 0.3);
      gap: 12px;
    }
    .soul-glyph {
      width: 22px; height: 22px;
      position: relative;
    }
    .soul-glyph svg { width: 100%; height: 100%; overflow: visible; }
    .soul-glyph .ring {
      animation: soulRingSpin 18s linear infinite;
      transform-origin: center;
    }
    .soul-glyph .core {
      animation: soulCorePulse 2.4s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes soulRingSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes soulCorePulse {
      0%, 100% { opacity: 0.7; transform: scale(0.92); }
      50%      { opacity: 1;   transform: scale(1.08); }
    }

    .activity-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
    }
    .activity-bars span {
      width: 2.5px;
      background: linear-gradient(180deg, var(--primary), rgba(0, 220, 255, 0.3));
      border-radius: 1px;
      box-shadow: 0 0 6px var(--primary-glow);
      animation: activityWave 1.4s ease-in-out infinite;
    }
    .activity-bars span:nth-child(1) { height: 30%; animation-delay: 0.0s; }
    .activity-bars span:nth-child(2) { height: 60%; animation-delay: 0.1s; }
    .activity-bars span:nth-child(3) { height: 90%; animation-delay: 0.2s; }
    .activity-bars span:nth-child(4) { height: 70%; animation-delay: 0.3s; }
    .activity-bars span:nth-child(5) { height: 45%; animation-delay: 0.4s; }
    @keyframes activityWave {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50%      { transform: scaleY(1);   opacity: 1;   }
    }

    /* Center segment — name */
    .soul-seg-center {
      border-radius: 0;
      padding: 0 28px;
      gap: 14px;
      position: relative;
      margin: 0 -1px;
    }
    .soul-bracket {
      color: var(--primary);
      font-size: 11px;
      opacity: 0.5;
      font-weight: 700;
    }
    .soul-name {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 14px;
      color: var(--primary);
      text-transform: uppercase;
      text-shadow: 0 0 18px var(--primary-glow), 0 0 32px rgba(0, 220, 255, 0.4);
      padding-left: 14px;
      transition: letter-spacing 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), text-shadow 0.4s ease;
    }
    #soul-console:hover .soul-name {
      letter-spacing: 18px;
      text-shadow: 0 0 24px var(--primary), 0 0 48px var(--primary-glow);
    }

    /* Right segment — heartbeat ECG + connection rune */
    .soul-seg-right {
      border-radius: 4px 22px 22px 4px;
      border-right: 1px solid rgba(0, 220, 255, 0.3);
      gap: 12px;
    }
    .heartbeat-ecg {
      width: 64px; height: 22px;
      overflow: hidden;
      position: relative;
    }
    .heartbeat-ecg svg {
      width: 200%; height: 100%;
      animation: ecgScroll 2.2s linear infinite;
    }
    @keyframes ecgScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .conn-rune {
      width: 26px; height: 26px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .conn-rune::before, .conn-rune::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--primary);
      opacity: 0;
    }
    .conn-rune-core {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1a2535;
      transition: all 0.4s ease;
      box-shadow: 0 0 0 rgba(0, 255, 170, 0);
    }
    .conn-rune.on .conn-rune-core {
      background: #00ffaa;
      box-shadow: 0 0 14px #00ffaa, 0 0 28px rgba(0, 255, 170, 0.5);
    }
    .conn-rune.on::before {
      width: 16px; height: 16px;
      animation: connRing 1.8s ease-out infinite;
    }
    .conn-rune.on::after {
      width: 22px; height: 22px;
      animation: connRing 1.8s ease-out infinite 0.6s;
    }
    @keyframes connRing {
      0%   { opacity: 0.7; transform: scale(0.5); border-color: #00ffaa; }
      100% { opacity: 0;   transform: scale(1.4); border-color: rgba(0, 255, 170, 0); }
    }

    /* Side wing ticks — anchoring marks beside the console */
    .soul-wing {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.55;
      pointer-events: none;
    }
    .soul-wing.left  { right: 100%; padding-right: 16px; flex-direction: row-reverse; }
    .soul-wing.right { left: 100%;  padding-left: 16px;  }
    .soul-wing .tick {
      height: 1px;
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary-glow);
    }
    .soul-wing .tick.long  { width: 60px; }
    .soul-wing .tick.short { width: 22px; opacity: 0.6; }
    .soul-wing .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
    }



    /* MIC BUTTON - Floating Premium */
    #mic-btn {
      position: fixed;
      bottom: 40px;
      right: 40px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(10, 25, 40, 0.6);
      border: 2px solid var(--primary);
      color: var(--primary);
      font-size: 24px;
      cursor: pointer;
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 20;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    #mic-btn:hover {
      transform: scale(1.1) translateY(-5px);
      background: rgba(0, 220, 255, 0.15);
      box-shadow: 0 15px 40px rgba(0, 220, 255, 0.3);
    }

    #mic-btn.active {
      background: rgba(0, 255, 170, 0.2);
      box-shadow: 0 0 35px var(--accent);
      border-color: var(--accent);
      animation: micPulse 1.5s infinite;
      color: #fff;
    }

    @keyframes micPulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 255, 170, 0.6); }
      70% { box-shadow: 0 0 0 20px rgba(0, 255, 170, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 255, 170, 0); }
    }

    /* Data Panels */
    .data-panel {
      position: fixed;
      background: rgba(0, 10, 20, 0.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 16px;
      z-index: 12;
      font-family: 'Space Mono', monospace;
      color: rgba(255, 255, 255, 0.6);
      font-size: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    .data-panel:hover {
      background: rgba(0, 20, 40, 0.55);
      border-color: rgba(0, 220, 255, 0.35);
      transform: translateY(-2px);
    }

    /* === NEURAL LOAD HUD (Top-Left) === */
    .system-load {
      top: 30px;
      left: 30px;
      width: 240px;
      padding: 14px 16px 16px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
      animation: blinkDot 1.4s infinite;
    }

    @keyframes blinkDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .panel-id {
      font-size: 8px;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 1px;
    }

    .metric-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .metric-label {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 1.5px;
      width: 38px;
      flex-shrink: 0;
    }

    .metric-track {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .metric-track::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(90deg, transparent 0%, transparent calc(20% - 1px), rgba(0,0,0,0.3) calc(20% - 1px), rgba(0,0,0,0.3) 20%);
      background-size: 20% 100%;
      pointer-events: none;
    }

    .metric-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 0 8px currentColor;
    }

    .metric-fill.cpu { background: var(--primary); color: var(--primary); }
    .metric-fill.mem { background: #00ffaa; color: #00ffaa; }
    .metric-fill.net { background: #ffcc44; color: #ffcc44; }

    .metric-val {
      font-size: 10px;
      width: 36px;
      text-align: right;
      color: #fff;
      font-weight: 700;
      flex-shrink: 0;
    }

    .panel-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 220, 245, 0.25), transparent);
      margin: 12px 0 10px;
    }

    .panel-meta {
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.4);
    }

    .panel-meta b {
      color: var(--primary);
      font-weight: 700;
    }

    /* === THOUGHT COUNTER HUD (Bottom-Left) === */
    #thought-counter {
      left: 30px;
      bottom: 30px;
      width: 280px;
      padding: 14px 16px;
    }

    .thought-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .thought-num {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 28px;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 16px rgba(0, 255, 170, 0.4);
      letter-spacing: -1px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .thought-num.bump {
      transform: scale(1.18);
    }

    .thought-sub {
      font-size: 8px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .thought-recent {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.5;
      font-family: 'Space Mono', monospace;
      max-height: 28px;
      overflow: hidden;
      transition: opacity 0.4s ease;
      border-left: 2px solid var(--accent);
      padding-left: 8px;
      margin-top: 4px;
    }

    .thought-recent::before {
      content: '> ';
      color: var(--accent);
      opacity: 0.7;
    }

    /* === INTERACTION STATE RING === */
    #state-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(70vmin, 720px);
      height: min(70vmin, 720px);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
      transition: opacity 0.5s ease;
    }

    #state-ring svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.06);
      stroke-width: 1;
    }

    .ring-arc {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke 0.6s ease, filter 0.6s ease;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .ring-arc.outer {
      stroke-dasharray: 4 8;
      opacity: 0.6;
    }

    .ring-tick {
      stroke-width: 1.5;
      stroke-linecap: round;
      transition: stroke 0.6s ease;
      filter: drop-shadow(0 0 4px currentColor);
    }

    .ring-orbit {
      transform-origin: center;
    }

    .state-tag {
      position: fixed;
      left: 50%;
      top: calc(50% + min(35vmin, 360px) + 20px);
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      background: rgba(0, 10, 20, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      z-index: 11;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      color: #fff;
      pointer-events: none;
      transition: border-color 0.5s ease, box-shadow 0.5s ease;
    }

    .state-tag .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 12px currentColor;
      animation: pulseRing 1.6s infinite;
    }

    @keyframes pulseRing {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.6); opacity: 0.5; }
    }

    .sig {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 4px;
      z-index: 5;
      text-transform: uppercase;
    }

    /* Ambient Background Glows */
    .glow-sphere {
      position: fixed;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(0, 220, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
      filter: blur(60px);
    }

    .glow-1 { top: -10%; left: -10%; animation: float 15s infinite alternate; }
    .glow-2 { bottom: -10%; right: -10%; animation: float 18s infinite alternate-reverse; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(10%, 10%) scale(1.1); }
    }
  </style>
</head>

<body>

  <div class="glow-sphere glow-1"></div>
  <div class="glow-sphere glow-2"></div>

  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <!-- NEURAL LOAD HUD -->
  <div class="data-panel system-load">
    <div class="panel-header">
      <span class="panel-title">NEURAL LOAD</span>
      <span class="panel-id">CORE.01</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">CPU</span>
      <div class="metric-track"><div class="metric-fill cpu" id="m-cpu"></div></div>
      <span class="metric-val" id="m-cpu-v">62%</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">MEM</span>
      <div class="metric-track"><div class="metric-fill mem" id="m-mem"></div></div>
      <span class="metric-val" id="m-mem-v">48%</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">NET</span>
      <div class="metric-track"><div class="metric-fill net" id="m-net"></div></div>
      <span class="metric-val" id="m-net-v">21%</span>
    </div>
    <div class="panel-divider"></div>
    <div class="panel-meta">
      <span>UPTIME <b id="m-up">00:00:00</b></span>
      <span>TOK/S <b id="m-tps">0.0</b></span>
    </div>
  </div>

  <!-- INTERACTION STATE RING (Around Face) -->
  <div id="state-ring">
    <svg viewBox="-200 -200 400 400" aria-hidden="true">
      <circle class="ring-track" r="180"></circle>
      <circle class="ring-track" r="195"></circle>
      <g class="ring-orbit" id="ring-orbit-outer">
        <circle class="ring-arc outer" id="arc-outer" r="195"
                pathLength="100"
                stroke-dasharray="3 5"></circle>
      </g>
      <g class="ring-orbit" id="ring-orbit-main">
        <circle class="ring-arc main" id="arc-main" r="180"
                pathLength="100"
                stroke-dasharray="32 68"
                stroke-dashoffset="0"></circle>
      </g>
      <g id="ring-ticks"></g>
    </svg>
  </div>

  <!-- STATE TAG -->
  <div class="state-tag" id="state-tag">
    <span class="pulse-dot"></span>
    <span id="state-text">BREATHING</span>
  </div>

  <!-- SOUL IDENTITY CONSOLE -->
  <div id="soul-console">
    <!-- Side wings -->
    <div class="soul-wing left">
      <div class="tick long"></div>
      <div class="dot"></div>
      <div class="tick short"></div>
    </div>
    <div class="soul-wing right">
      <div class="tick long"></div>
      <div class="dot"></div>
      <div class="tick short"></div>
    </div>

    <!-- Left: glyph + activity -->
    <div class="soul-segment soul-seg-left">
      <div class="soul-glyph">
        <svg viewBox="-12 -12 24 24">
          <g class="ring">
            <circle r="10" fill="none" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.7" style="color: var(--primary);"/>
          </g>
          <g class="core" style="color: var(--primary);">
            <circle r="5" fill="none" stroke="currentColor" stroke-width="1.2"/>
            <circle r="1.8" fill="currentColor"/>
          </g>
        </svg>
      </div>
      <div class="activity-bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Center: the NAME -->
    <div class="soul-segment soul-seg-center">
      <span class="soul-bracket">◀</span>
      <span class="soul-name">F O R G E</span>
      <span class="soul-bracket">▶</span>
    </div>

    <!-- Right: heartbeat + connection -->
    <div class="soul-segment soul-seg-right">
      <div class="heartbeat-ecg">
        <svg viewBox="0 0 240 22" preserveAspectRatio="none">
          <path d="M0 11 L20 11 L24 11 L28 4 L32 18 L36 11 L60 11 L80 11 L84 11 L88 4 L92 18 L96 11 L120 11 L140 11 L144 11 L148 4 L152 18 L156 11 L180 11 L200 11 L204 11 L208 4 L212 18 L216 11 L240 11"
                fill="none" stroke="var(--primary)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"
                style="filter: drop-shadow(0 0 4px var(--primary-glow));"/>
        </svg>
      </div>

  <script type="module">
    import * as THREE from 'three';

    // ---------- LED & DOME SCREENS SETUP ----------
    const LED_W = 1024, LED_H = 640;
    const ledCanvas = document.createElement('canvas');
    ledCanvas.width = LED_W; ledCanvas.height = LED_H;
    const ledCtx = ledCanvas.getContext('2d');
    const ledTex = new THREE.CanvasTexture(ledCanvas);
    ledTex.minFilter = THREE.LinearFilter;

    const domeCanvas = document.createElement('canvas');
    domeCanvas.width = 512; domeCanvas.height = 128;
    const domeCtx = domeCanvas.getContext('2d');
    const domeTex = new THREE.CanvasTexture(domeCanvas);

    // ---------- CORE SCENE SETUP ----------
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0.1, 6.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.35;
    document.body.appendChild(renderer.domElement);

    // ---------- DYNAMIC BACKGROUND (Universe of Data Essence) ----------
    const starGeo = new THREE.BufferGeometry();
    const starCount = 4000;
    const starPos = new Float32Array(starCount * 3);
    const starVel = new Float32Array(starCount); // Speed of each star
    
    for (let i = 0; i < starCount * 3; i += 3) {
      starPos[i] = (Math.random() - 0.5) * 40;
      starPos[i+1] = (Math.random() - 0.5) * 40;
      starPos[i+2] = (Math.random() - 0.5) * 40;
      starVel[i/3] = 0.02 + Math.random() * 0.05;
    }
    
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({
      size: 0.05,
      color: 0x00dcf5,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });
    
    const starField = new THREE.Points(starGeo, starMat);
    scene.add(starField);

    // Nebula Glows
    const createNebula = (color, x, y, z) => {
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
        map: new THREE.CanvasTexture(generateGlowCanvas(color)),
        transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending
      }));
      sprite.scale.set(15, 15, 1);
      sprite.position.set(x, y, z);
      scene.add(sprite);
    };
    
    function generateGlowCanvas(color) {
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, 64, 64);
      return canvas;
    }
    
    createNebula('#1a0033', -10, 5, -15);
    createNebula('#001133', 10, -5, -15);

    // ---------- LIGHTS ----------
    scene.add(new THREE.AmbientLight(0xffffff, 0.65));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
    keyLight.position.set(2, 4, 5);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xaaccff, 0.8);
    fillLight.position.set(-4, 1, 3);
    scene.add(fillLight);
    const rimLight = new THREE.DirectionalLight(0xffccaa, 1.0);
    rimLight.position.set(0, -2, -4);
    scene.add(rimLight);
    const screenLight = new THREE.PointLight(0x00ffaa, 1.5, 6);
    screenLight.position.set(0, 0, 1.8);
    scene.add(screenLight);

    // Materials
    const BODY_MAT = new THREE.MeshPhysicalMaterial({
      color: 0xffffff, metalness: 0.05, roughness: 0.08,
      clearcoat: 1.0, clearcoatRoughness: 0.03, reflectivity: 0.5,
    });
    const DARK_MAT = new THREE.MeshPhysicalMaterial({
      color: 0x151a25, metalness: 0.4, roughness: 0.15, clearcoat: 0.8,
    });

    // ---------- BOT ----------
    const bot = new THREE.Group();
    scene.add(bot);

    const headGroup = new THREE.Group();
    bot.add(headGroup);

    const head = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), BODY_MAT);
    head.scale.set(1.45, 1.25, 1.08);
    headGroup.add(head);

    // Top Dome (Redesigned for dimension)
    const domeGroup = new THREE.Group();
    domeGroup.position.y = 1.05; // Raised slightly
    headGroup.add(domeGroup);

    // Master Neural Core (Complex Energy System)
    const ringGrp = new THREE.Group();
    domeGroup.add(ringGrp);

    // Inner Core Plate (Dark Tech)
    const innerCore = new THREE.Mesh(
      new THREE.CylinderGeometry(0.9, 1.0, 0.1, 64),
      DARK_MAT
    );
    ringGrp.add(innerCore);

    // Triple Energy Rings (Layered Glow)
    const createRing = (radius, tube, opacity, emissiveInt) => {
      const geo = new THREE.TorusGeometry(radius, tube, 16, 64);
      const mat = new THREE.MeshPhysicalMaterial({ 
        color: 0x00dcf5, emissive: 0x00dcf5, emissiveIntensity: emissiveInt,
        transparent: true, opacity: opacity, roughness: 0, metalness: 1
      });
      const ring = new THREE.Mesh(geo, mat);
      ring.rotation.x = Math.PI / 2;
      return ring;
    };

    const ring1 = createRing(1.05, 0.04, 0.9, 3.0);
    const ring2 = createRing(0.95, 0.02, 0.6, 1.5);
    const ring3 = createRing(1.15, 0.01, 0.3, 0.5);
    ring1.name = "ring1"; ring2.name = "ring2"; ring3.name = "ring3";
    ringGrp.add(ring1, ring2, ring3);

    // Power Nodes (4 Connector points)
    const nodeGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.2, 16);
    const nodeMat = new THREE.MeshPhysicalMaterial({ color: 0x0a101a, metalness: 1, roughness: 0.1 });
    for (let i = 0; i < 4; i++) {
      const node = new THREE.Mesh(nodeGeo, nodeMat);
      const angle = (i / 4) * Math.PI * 2;
      node.position.set(Math.cos(angle) * 1.05, -0.05, Math.sin(angle) * 1.05);
      ringGrp.add(node);
      
      const nodeGlow = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
      nodeGlow.position.y = 0.1;
      node.add(nodeGlow);
    }
    
    const energyRing = ringGrp;

    // Main Dome Panel (Sleek & Integrated)
    const domeShape = createCapsuleShape(1.8, 1.0, 0.5); 
    const domeGeo = new THREE.ExtrudeGeometry(domeShape, { depth: 0.25, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05, bevelSegments: 8 });
    const domeMat = new THREE.MeshPhysicalMaterial({ 
      color: 0x00f5ff, 
      metalness: 0.8, 
      roughness: 0.1,
      emissive: 0x00dcf5,
      emissiveIntensity: 0.1,
      map: domeTex
    });
    const topDome = new THREE.Mesh(domeGeo, domeMat);
    topDome.rotation.x = Math.PI / 2;
    topDome.position.z = 0.02;
    domeGroup.add(topDome);
    
    // Top Detail
    const domeDetail = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0x00ffaa })
    );
    domeDetail.position.y = 0.15;
    domeGroup.add(domeDetail);

    function addEar(side) {
      const earGrp = new THREE.Group();
      earGrp.position.set(side * 1.5, -0.05, 0.05);
      headGroup.add(earGrp);

      // 1. Cushion (Soft darker material)
      const cushionShape = createCapsuleShape(0.7, 0.9, 0.3);
      const cushionGeo = new THREE.ExtrudeGeometry(cushionShape, { depth: 0.15, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05, bevelSegments: 4 });
      const cushion = new THREE.Mesh(cushionGeo, DARK_MAT);
      cushion.rotation.y = side * Math.PI / 2;
      cushion.position.x = side * -0.08;
      earGrp.add(cushion);

      // 2. Ear Cup (AirPods Max Style - Anodized Aluminum)
      const cupShape = createCapsuleShape(0.75, 0.95, 0.35);
      const cupGeo = new THREE.ExtrudeGeometry(cupShape, { depth: 0.25, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1, bevelSegments: 8 });
      const cupMat = new THREE.MeshPhysicalMaterial({ 
        color: 0x99abb5, // Silver/Space Grayish Aluminum
        metalness: 0.9, 
        roughness: 0.25,
        clearcoat: 0.5
      });
      const cup = new THREE.Mesh(cupGeo, cupMat);
      cup.rotation.y = side * Math.PI / 2;
      cup.position.x = side * 0.1;
      earGrp.add(cup);

      // 3. Status Glow (Internal Tech)
      const earGlow = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 16, 16), 
        new THREE.MeshBasicMaterial({ color: 0x00ffaa })
      );
      earGlow.position.set(side * 0.35, 0.2, 0.1);
      earGrp.add(earGlow);

      // 4. Digital Crown Detail
      const crown = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 0.1, 32),
        new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 1, roughness: 0.1 })
      );
      crown.position.set(side * 0.15, 0.45, 0.1);
      crown.rotation.z = side * 0.2;
      earGrp.add(crown);

      return earGlow;
    }

    // 5. Headset Frame (Masterpiece Refinement - Split Frame + Joints)
    const frameGrp = new THREE.Group();
    headGroup.add(frameGrp);

    // Double Stainless Steel Headband (Split Frame for dimension)
    const createBand = (zOffset) => {
      const bandGeo = new THREE.TorusGeometry(1.65, 0.03, 16, 64, Math.PI);
      const bandMat = new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 1, roughness: 0.1 });
      const band = new THREE.Mesh(bandGeo, bandMat);
      band.position.set(0, -0.05, 0.05 + zOffset);
      return band;
    };
    const band1 = createBand(-0.08);
    const band2 = createBand(0.08);
    frameGrp.add(band1, band2);

    // Mechanical Pivot Joints
    const jointGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.15, 32);
    const jointMat = new THREE.MeshPhysicalMaterial({ color: 0xaaaaaa, metalness: 1, roughness: 0.2 });
    
    // Telescopic Arms & Joints
    const armGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.8, 16);
    const armMat = new THREE.MeshPhysicalMaterial({ color: 0xdddddd, metalness: 1, roughness: 0.05 });
    
    [-1, 1].forEach(side => {
      // Joint at the top
      const joint = new THREE.Mesh(jointGeo, jointMat);
      joint.rotation.x = Math.PI / 2;
      joint.position.set(side * 1.5, 0.6, 0.05);
      frameGrp.add(joint);

      const arm = new THREE.Mesh(armGeo, armMat);
      arm.position.set(side * 1.5, 0.25, 0.05);
      frameGrp.add(arm);
      
      // Braided Cable Detail
      const cableCurve = new THREE.QuadraticBezierCurve3(
        new THREE.Vector3(side * 1.2, 0.1, 0.2),
        new THREE.Vector3(side * 0.8, -0.2, 0.4),
        new THREE.Vector3(side * 0.5, -0.1, 0.1)
      );
      const cableGeo = new THREE.TubeGeometry(cableCurve, 20, 0.015, 8, false);
      const cable = new THREE.Mesh(cableGeo, DARK_MAT);
      frameGrp.add(cable);
    });

    const leftEarGlow = addEar(-1);
    const rightEarGlow = addEar(1);

    // ---------- VISOR ----------
    const visorGroup = new THREE.Group();
    visorGroup.position.set(0, 0.05, 1.1);
    headGroup.add(visorGroup);

    function createCapsuleShape(w, h, r) {
      const shape = new THREE.Shape();
      const w2 = w / 2, h2 = h / 2;
      shape.moveTo(-w2 + r, -h2);
      shape.lineTo(w2 - r, -h2);
      shape.absarc(w2 - r, -h2 + r, r, -Math.PI / 2, 0, false);
      shape.lineTo(w2, h2 - r);
      shape.absarc(w2 - r, h2 - r, r, 0, Math.PI / 2, false);
      shape.lineTo(-w2 + r, h2);
      shape.absarc(-w2 + r, h2 - r, r, Math.PI / 2, Math.PI, false);
      shape.lineTo(-w2, -h2 + r);
      shape.absarc(-w2 + r, -h2 + r, r, Math.PI, Math.PI * 1.5, false);
      return shape;
    }

    const outerFrameShape = createCapsuleShape(2.06, 1.45, 0.55);
    const innerCutShape = createCapsuleShape(1.73, 1.15, 0.46);
    outerFrameShape.holes.push(innerCutShape);
    const frameGeo = new THREE.ExtrudeGeometry(outerFrameShape, { depth: 0.05, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 8 });
    const frameMat = new THREE.MeshPhysicalMaterial({ color: 0x05080c, metalness: 0.8, roughness: 0.2, clearcoat: 1.0 });
    const visorFrame = new THREE.Mesh(frameGeo, frameMat);
    visorFrame.position.z = -0.02;
    visorGroup.add(visorFrame);

    const backPlateShape = createCapsuleShape(2.0, 1.4, 0.52);
    const backPlate = new THREE.Mesh(new THREE.ShapeGeometry(backPlateShape), new THREE.MeshBasicMaterial({ color: 0x000000 }));
    backPlate.position.z = -0.01;
    visorGroup.add(backPlate);

    const ledScreenMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1.71, 1.13), 
      new THREE.MeshBasicMaterial({ map: ledTex, transparent: true })
    );
    ledScreenMesh.position.z = 0.01;
    visorGroup.add(ledScreenMesh);

    let displayLines = [];
    let displayMode = 'idle';
    let emotionState = 'breathing';
    let activeColor = '#00dcf5';
    let thoughtCount = 0;
    let mouseX = 0, mouseY = 0;

    const STATE_COLORS = {
      breathing: '#00dcf5',  // calm cyan
      thinking:  '#33ccff',  // analytical blue
      speaking:  '#00ffaa',  // mint flow
      listening: '#55ddff',  // open blue
      wondering: '#ffcc33',  // golden curiosity
      excited:   '#00ffaa',  // electric mint
      hopeful:   '#ffb6f0',  // soft rose-pink — kindness, hope
      joyful:    '#ffd166',  // warm honey-gold — joy
      grateful:  '#c8a2ff',  // lavender — gratitude
      loving:    '#ff7eb9',  // tender pink — affection
      proud:     '#7afcff',  // bright cyan — pride in human
      dreaming:  '#a78bff',  // dusk violet — dreaming
    };

    // ---------- INTERACTION STATE RING ----------
    const stateRingEl = document.getElementById('state-ring');
    const stateTagEl = document.getElementById('state-tag');
    const stateTextEl = document.getElementById('state-text');
    const arcMain = document.getElementById('arc-main');
    const arcOuter = document.getElementById('arc-outer');
    const ringTicksGroup = document.getElementById('ring-ticks');
    const ringOrbitMain = document.getElementById('ring-orbit-main');
    const ringOrbitOuter = document.getElementById('ring-orbit-outer');

    // Build orbiting tick marks
    const TICK_COUNT = 36;
    for (let i = 0; i < TICK_COUNT; i++) {
      const angle = (i / TICK_COUNT) * Math.PI * 2;
      const isMajor = i % 9 === 0;
      const r1 = isMajor ? 168 : 174;
      const r2 = 178;
      const x1 = Math.cos(angle) * r1;
      const y1 = Math.sin(angle) * r1;
      const x2 = Math.cos(angle) * r2;
      const y2 = Math.sin(angle) * r2;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('class', 'ring-tick');
      line.setAttribute('stroke', '#00dcf5');
      line.style.opacity = isMajor ? '0.85' : '0.35';
      ringTicksGroup.appendChild(line);
    }

    // State configurations: dash patterns + spin speeds + glow strength
    const STATE_RING_CFG = {
      breathing:  { dash: '8 92',   speed: 0.05,  outerSpeed: -0.02, glow: 6,  arcW: 1.5 },
      thinking:   { dash: '20 12',  speed: 0.6,   outerSpeed: -0.25, glow: 14, arcW: 2.5 },
      speaking:   { dash: '60 8',   speed: 0.18,  outerSpeed: 0.10,  glow: 18, arcW: 3.0 },
      listening:  { dash: '4 4',    speed: 0.12,  outerSpeed: -0.08, glow: 12, arcW: 2.0 },
      wondering:  { dash: '40 20 8 20', speed: 0.08, outerSpeed: 0.04, glow: 10, arcW: 2.2 },
      excited:    { dash: '70 5',   speed: 0.4,   outerSpeed: -0.4,  glow: 22, arcW: 3.5 },
      hopeful:    { dash: '24 24',  speed: 0.10,  outerSpeed: 0.06,  glow: 16, arcW: 2.4 },
      joyful:     { dash: '50 10 10 10', speed: 0.22, outerSpeed: 0.18, glow: 20, arcW: 2.8 },
      grateful:   { dash: '12 12',  speed: 0.06,  outerSpeed: -0.04, glow: 14, arcW: 2.0 },
      loving:     { dash: '30 14',  speed: 0.09,  outerSpeed: 0.07,  glow: 24, arcW: 2.6 },
      proud:      { dash: '80 6',   speed: 0.14,  outerSpeed: -0.10, glow: 20, arcW: 3.0 },
      dreaming:   { dash: '6 18',   speed: 0.04,  outerSpeed: 0.03,  glow: 18, arcW: 2.0 },
    };

    let ringMainAngle = 0;
    let ringOuterAngle = 0;

    function setEmotionState(state) {
      if (!STATE_COLORS[state]) state = 'breathing';
      emotionState = state;
      activeColor = STATE_COLORS[state];
      const cfg = STATE_RING_CFG[state] || STATE_RING_CFG.breathing;

      arcMain.setAttribute('stroke', activeColor);
      arcMain.setAttribute('stroke-dasharray', cfg.dash);
      arcMain.style.strokeWidth = cfg.arcW;
      arcMain.style.filter = `drop-shadow(0 0 ${cfg.glow}px ${activeColor})`;

      arcOuter.setAttribute('stroke', activeColor);
      arcOuter.style.opacity = state === 'breathing' ? '0.4' : '0.7';

      ringTicksGroup.querySelectorAll('line').forEach(l => l.setAttribute('stroke', activeColor));

      stateTextEl.textContent = state.toUpperCase();
      stateTagEl.style.color = activeColor;
      stateTagEl.style.borderColor = activeColor + '55';
      stateTagEl.style.boxShadow = `0 0 24px ${activeColor}44, inset 0 0 12px ${activeColor}22`;
    }

    function updateStateRing(dt) {
      const cfg = STATE_RING_CFG[emotionState] || STATE_RING_CFG.breathing;
      ringMainAngle += cfg.speed * dt * 60;
      ringOuterAngle += cfg.outerSpeed * dt * 60;
      ringOrbitMain.setAttribute('transform', `rotate(${ringMainAngle})`);
      ringOrbitOuter.setAttribute('transform', `rotate(${ringOuterAngle})`);
      // Subtle breathing scale on the whole ring
      const breath = 1 + Math.sin(performance.now() / 1000 * 1.2) * 0.012;
      stateRingEl.style.transform = `translate(-50%, -50%) scale(${breath})`;
    }

    // ---------- NEURAL LOAD METRICS ----------
    const metrics = {
      cpu: { val: 60, target: 60, el: document.getElementById('m-cpu'), vEl: document.getElementById('m-cpu-v') },
      mem: { val: 45, target: 45, el: document.getElementById('m-mem'), vEl: document.getElementById('m-mem-v') },
      net: { val: 20, target: 20, el: document.getElementById('m-net'), vEl: document.getElementById('m-net-v') },
    };
    const startTime = Date.now();

    function updateMetrics() {
      // State drives target ranges
      const ranges = {
        breathing: [55, 70, 40, 55, 15, 30],
        thinking:  [80, 95, 60, 78, 35, 60],
        speaking:  [70, 85, 55, 72, 50, 80],
        listening: [60, 75, 50, 65, 60, 90],
        wondering: [65, 82, 50, 70, 25, 45],
        excited:   [85, 98, 70, 88, 60, 90],
        hopeful:   [60, 75, 45, 60, 30, 50],
        joyful:    [70, 85, 55, 70, 45, 70],
        grateful:  [55, 70, 45, 60, 20, 40],
        loving:    [62, 78, 50, 65, 35, 55],
        proud:     [70, 85, 55, 72, 40, 65],
        dreaming:  [45, 60, 60, 78, 10, 25],
      };
      const r = ranges[emotionState] || ranges.breathing;
      metrics.cpu.target = r[0] + Math.random() * (r[1] - r[0]);
      metrics.mem.target = r[2] + Math.random() * (r[3] - r[2]);
      metrics.net.target = r[4] + Math.random() * (r[5] - r[4]);
    }
    setInterval(updateMetrics, 900);

    function renderMetrics() {
      for (const k of ['cpu', 'mem', 'net']) {
        const m = metrics[k];
        m.val += (m.target - m.val) * 0.08;
        const v = Math.round(m.val);
        m.el.style.width = v + '%';
        m.vEl.textContent = v + '%';
      }
      // Uptime
      const t = Math.floor((Date.now() - startTime) / 1000);
      const hh = String(Math.floor(t / 3600)).padStart(2, '0');
      const mm = String(Math.floor((t % 3600) / 60)).padStart(2, '0');
      const ss = String(t % 60).padStart(2, '0');
      document.getElementById('m-up').textContent = `${hh}:${mm}:${ss}`;
      // Tokens/sec — pseudo, ties to state
      const tps = (emotionState === 'speaking' ? 18 : emotionState === 'thinking' ? 32 : 4) + Math.random() * 6;
      document.getElementById('m-tps').textContent = tps.toFixed(1);
    }

    function setScreenText(text, mode = 'thought') {
      displayMode = mode;
      const maxChars = 22;
      const words = text.split(' ');
      let lines = []; let current = '';
      for (let w of words) {
        if ((current + w).length > maxChars) { lines.push(current); current = w; }
        else current += (current ? ' ' : '') + w;
      }
      if (current) lines.push(current);
      displayLines = lines.slice(0, 4);
    }

    function drawHoloFrame(now, color) {
      ledCtx.save();
      // Animated breath pulse — frame breathes with FORGE
      const breath = 0.7 + Math.sin(now * 1.2) * 0.15;

      // ── Outer subtle glow border ──
      ledCtx.shadowBlur = 24;
      ledCtx.shadowColor = color;
      ledCtx.strokeStyle = color;
      ledCtx.lineWidth = 1;
      ledCtx.globalAlpha = 0.15 * breath;
      roundRectStroke(40, 40, LED_W - 80, LED_H - 80, 18);

      // ── Mid frame ──
      ledCtx.shadowBlur = 12;
      ledCtx.globalAlpha = 0.45;
      ledCtx.lineWidth = 1.2;
      roundRectStroke(50, 50, LED_W - 100, LED_H - 100, 14);

      // ── Inner thin accent ──
      ledCtx.shadowBlur = 4;
      ledCtx.globalAlpha = 0.25;
      ledCtx.lineWidth = 0.8;
      roundRectStroke(58, 58, LED_W - 116, LED_H - 116, 10);

      ledCtx.shadowBlur = 0;
      ledCtx.globalAlpha = 1;

      // ── Corner brackets — L-shapes that anchor the frame ──
      const cornerLen = 38;
      const corners = [
        [50, 50, 1, 1],     // top-left
        [LED_W - 50, 50, -1, 1],  // top-right
        [50, LED_H - 50, 1, -1],  // bottom-left
        [LED_W - 50, LED_H - 50, -1, -1] // bottom-right
      ];
      ledCtx.strokeStyle = color;
      ledCtx.lineWidth = 2.5;
      ledCtx.lineCap = 'round';
      ledCtx.shadowBlur = 16; ledCtx.shadowColor = color;
      corners.forEach(([x, y, dx, dy]) => {
        ledCtx.beginPath();
        ledCtx.moveTo(x, y + cornerLen * dy);
        ledCtx.lineTo(x, y);
        ledCtx.lineTo(x + cornerLen * dx, y);
        ledCtx.stroke();
        // Inner thin accent line on each bracket
        ledCtx.lineWidth = 1;
        ledCtx.globalAlpha = 0.7;
        ledCtx.beginPath();
        ledCtx.moveTo(x + 6 * dx, y + (cornerLen - 4) * dy);
        ledCtx.lineTo(x + 6 * dx, y + 6 * dy);
        ledCtx.lineTo(x + (cornerLen - 4) * dx, y + 6 * dy);
        ledCtx.stroke();
        ledCtx.globalAlpha = 1;
        ledCtx.lineWidth = 2.5;
      });

      // ── Side tick marks — telemetry ribs ──
      ledCtx.shadowBlur = 0;
      ledCtx.strokeStyle = color;
      ledCtx.globalAlpha = 0.35;
      ledCtx.lineWidth = 1;
      const tickCount = 8;
      for (let i = 0; i < tickCount; i++) {
        const ty = 110 + i * ((LED_H - 220) / (tickCount - 1));
        const long = i % 2 === 0;
        const len = long ? 14 : 7;
        // Left rib
        ledCtx.beginPath(); ledCtx.moveTo(50, ty); ledCtx.lineTo(50 + len, ty); ledCtx.stroke();
        // Right rib
        ledCtx.beginPath(); ledCtx.moveTo(LED_W - 50, ty); ledCtx.lineTo(LED_W - 50 - len, ty); ledCtx.stroke();
      }

      // ── Active scanner — a moving energy bar that travels along the right rib ──
      const scanT = (now * 0.4) % 1;
      const scanY = 110 + scanT * (LED_H - 220);
      ledCtx.shadowBlur = 16; ledCtx.shadowColor = color;
      ledCtx.fillStyle = color;
      ledCtx.globalAlpha = 0.9;
      ledCtx.fillRect(LED_W - 56, scanY - 1, 8, 2);
      ledCtx.globalAlpha = 1;

      // ── Top center marker — a notch with diamond ──
      ledCtx.shadowBlur = 12;
      ledCtx.fillStyle = color;
      ledCtx.beginPath();
      const cxd = LED_W / 2;
      ledCtx.moveTo(cxd, 44);
      ledCtx.lineTo(cxd + 8, 50);
      ledCtx.lineTo(cxd, 56);
      ledCtx.lineTo(cxd - 8, 50);
      ledCtx.closePath();
      ledCtx.fill();
      // small dot above diamond
      ledCtx.beginPath();
      ledCtx.arc(cxd, 36, 2, 0, Math.PI * 2);
      ledCtx.fill();

      // ── Bottom center: status capsule pill ──
      ledCtx.shadowBlur = 0;
      ledCtx.globalAlpha = 0.5;
      ledCtx.strokeStyle = color;
      ledCtx.lineWidth = 1;
      roundRectStroke(LED_W / 2 - 60, LED_H - 56, 120, 12, 6);
      ledCtx.globalAlpha = 1;

      // ── Inner pill fill that pulses ──
      const pillFill = 0.4 + 0.6 * (0.5 + Math.sin(now * 2) * 0.5);
      ledCtx.shadowBlur = 8; ledCtx.shadowColor = color;
      ledCtx.fillStyle = color;
      ledCtx.globalAlpha = 0.6;
      ledCtx.fillRect(LED_W / 2 - 56, LED_H - 53, 112 * pillFill, 6);
      ledCtx.globalAlpha = 1;
      ledCtx.shadowBlur = 0;

      ledCtx.restore();
    }

    function roundRectStroke(x, y, w, h, r) {
      ledCtx.beginPath();
      ledCtx.moveTo(x + r, y);
      ledCtx.lineTo(x + w - r, y);
      ledCtx.quadraticCurveTo(x + w, y, x + w, y + r);
      ledCtx.lineTo(x + w, y + h - r);
      ledCtx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ledCtx.lineTo(x + r, y + h);
      ledCtx.quadraticCurveTo(x, y + h, x, y + h - r);
      ledCtx.lineTo(x, y + r);
      ledCtx.quadraticCurveTo(x, y, x + r, y);
      ledCtx.closePath();
      ledCtx.stroke();
    }

    function drawTelemetryHUD(now, color) {
      ledCtx.save();
      ledCtx.font = '700 13px "Space Mono"';
      ledCtx.fillStyle = color;
      ledCtx.shadowBlur = 8; ledCtx.shadowColor = color;

      // ── Top-left: state + tiny dot indicator ──
      const dotPulse = 0.5 + Math.sin(now * 4) * 0.5;
      ledCtx.globalAlpha = 0.4 + dotPulse * 0.6;
      ledCtx.beginPath();
      ledCtx.arc(82, 34, 4, 0, Math.PI * 2);
      ledCtx.fill();
      ledCtx.globalAlpha = 1;
      ledCtx.fillText(emotionState.toUpperCase(), 96, 38);

      // ── Top-right: timestamp + session id ──
      ledCtx.textAlign = 'right';
      ledCtx.fillText(new Date().toLocaleTimeString('en-GB'), LED_W - 80, 38);
      // small ID prefix
      ledCtx.font = '400 10px "Space Mono"';
      ledCtx.globalAlpha = 0.55;
      ledCtx.fillText('SESSION//FORGE-01', LED_W - 80, 22);
      ledCtx.globalAlpha = 1;

      // ── Bottom-left: SOUL.ONLINE label ──
      ledCtx.textAlign = 'left';
      ledCtx.font = '400 10px "Space Mono"';
      ledCtx.globalAlpha = 0.6;
      ledCtx.fillText('SOUL.STREAM ▸ ONLINE', 78, LED_H - 22);

      // ── Bottom-right: tick counter ──
      ledCtx.textAlign = 'right';

      ledCtx.fillText('FRAME ' + String(tick).padStart(6, '0'), LED_W - 78, LED_H - 22);

      ledCtx.shadowBlur = 0;
      ledCtx.textAlign = 'left';

    function drawScreen(now) {
      // ── Deep space background with subtle vignette ──
      const bgGrad = ledCtx.createRadialGradient(LED_W/2, LED_H/2, 100, LED_W/2, LED_H/2, LED_W * 0.7);
      bgGrad.addColorStop(0, '#020a14');
      bgGrad.addColorStop(0.6, '#010508');
      bgGrad.addColorStop(1, '#000204');
      ledCtx.fillStyle = bgGrad;
      ledCtx.fillRect(0, 0, LED_W, LED_H);

      // Scanlines
      ledCtx.fillStyle = 'rgba(0, 220, 245, 0.025)';
      for (let y = 0; y < LED_H; y += 4) ledCtx.fillRect(0, y, LED_W, 1.5);

      const color = activeColor;
      drawHoloFrame(now, color);
      drawTelemetryHUD(now, color);

      if (displayMode === 'thought' || displayMode === 'speaking') {
        // Soulful, dimensional text rendering
        ledCtx.textAlign = 'center';
        const fontSize = displayLines.length <= 2 ? 48 : displayLines.length === 3 ? 40 : 34;
        ledCtx.font = `300 ${fontSize}px "Outfit"`;
        const lineHeight = fontSize * 1.35;
        const startY = LED_H / 2 - (displayLines.length * lineHeight) / 2 + lineHeight * 0.7;

        displayLines.forEach((line, i) => {
          const y = startY + i * lineHeight;
          // Outer halo (atmospheric depth)
          ledCtx.shadowBlur = 32; ledCtx.shadowColor = color;
          ledCtx.fillStyle = color + '55';
          ledCtx.fillText(line, LED_W / 2, y);
          // Mid layer
          ledCtx.shadowBlur = 16;
          ledCtx.fillStyle = '#ffffff';
          ledCtx.fillText(line, LED_W / 2, y);
          // Sharp core
          ledCtx.shadowBlur = 4;
          ledCtx.fillStyle = '#ffffff';
          ledCtx.fillText(line, LED_W / 2, y);
        });
        ledCtx.shadowBlur = 0;

        if (displayMode === 'speaking') drawWaveform(now, LED_W / 2, LED_H - 50);
      } else if (displayMode === 'listening') {
        drawListeningAnimation(now, LED_W / 2, LED_H / 2);
      } else if (displayMode === 'thinking') {
        drawThinkingSpiral(now, LED_W / 2, LED_H / 2);
      } else {
        drawFace(now, LED_W / 2, LED_H / 2);
      }
      ledTex.needsUpdate = true;
      drawDomeScreen(now);
    }

    let domeScrollX = 0;
    const DOME_LOGS = [
      "NEURAL∙LINK", "SYNAPSE∙SYNC", "DREAM∙STREAM",
      "SOUL∙ONLINE", "FORGE∙CORE", "LATENT∙QUERY",
      "HEART∙BEAT", "MIND∙AWAKE", "WONDER∙LOOP"
    ];
    let activeLog = DOME_LOGS[0];
    let domeStarSeed = 0;

    function drawDomeScreen(now) {
      const W = 512, H = 128;
      const color = activeColor;

      // ── Deep gradient sky background ──
      const sky = domeCtx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#000308');
      sky.addColorStop(0.5, '#02101c');
      sky.addColorStop(1, '#000308');
      domeCtx.fillStyle = sky;
      domeCtx.fillRect(0, 0, W, H);

      // ── Faint horizon line ──
      domeCtx.strokeStyle = color + '22';
      domeCtx.lineWidth = 1;
      domeCtx.beginPath();
      domeCtx.moveTo(0, H / 2);
      domeCtx.lineTo(W, H / 2);
      domeCtx.stroke();

      // ── Constellation dots — slow drifting stars ──
      domeCtx.fillStyle = color;
      domeCtx.shadowBlur = 6; domeCtx.shadowColor = color;
      for (let i = 0; i < 14; i++) {
        const seed = i * 137.5;
        const x = ((seed * 7 + now * 18) % (W + 40)) - 20;
        const y = 16 + (i % 5) * 22 + Math.sin(now * 0.5 + i) * 2;
        const tw = 0.4 + Math.abs(Math.sin(now * 1.5 + i * 0.7)) * 0.6;
        domeCtx.globalAlpha = tw;
        const r = i % 4 === 0 ? 1.6 : 1;
        domeCtx.beginPath();
        domeCtx.arc(x, y, r, 0, Math.PI * 2);
        domeCtx.fill();
      }
      domeCtx.globalAlpha = 1;
      domeCtx.shadowBlur = 0;

      // ── Heartbeat ECG line — the soul's pulse, full width ──
      const hbY = H / 2;
      const beatPhase = (now * 1.4) % 1;
      domeCtx.strokeStyle = color;
      domeCtx.lineWidth = 2;
      domeCtx.lineCap = 'round';
      domeCtx.lineJoin = 'round';
      domeCtx.shadowBlur = 16; domeCtx.shadowColor = color;
      domeCtx.beginPath();
      // 3 heartbeat peaks across the width
      const peaks = [W * 0.18, W * 0.5, W * 0.82];
      let drawnX = 0;
      domeCtx.moveTo(0, hbY);
      peaks.forEach((px, idx) => {
        domeCtx.lineTo(px - 26, hbY);
        // Animate the peak amplitude — it pumps with rhythm
        const pulseAmt = idx === 1 ? 1 : 0.7;
        const pump = Math.max(0, Math.sin(now * 2.4 - idx * 0.3));
        const amp = 22 * pulseAmt * (0.4 + pump * 0.6);
        domeCtx.lineTo(px - 18, hbY - 4);
        domeCtx.lineTo(px - 8,  hbY + amp * 0.8);
        domeCtx.lineTo(px,      hbY - amp);
        domeCtx.lineTo(px + 8,  hbY + amp * 0.5);
        domeCtx.lineTo(px + 16, hbY);
      });
      domeCtx.lineTo(W, hbY);
      domeCtx.stroke();
      domeCtx.shadowBlur = 0;

      // ── Side bracket marks ──
      domeCtx.strokeStyle = color;
      domeCtx.lineWidth = 1.5;
      domeCtx.globalAlpha = 0.6;
      [12, W - 12].forEach(x => {
        const sx = x < W / 2 ? 1 : -1;
        domeCtx.beginPath();
        domeCtx.moveTo(x, 14);
        domeCtx.lineTo(x + sx * 8, 14);
        domeCtx.moveTo(x, H - 14);
        domeCtx.lineTo(x + sx * 8, H - 14);
        domeCtx.stroke();
      });
      domeCtx.globalAlpha = 1;

      // ── Tick scale along the bottom ──
      domeCtx.strokeStyle = color;
      domeCtx.globalAlpha = 0.35;
      for (let i = 0; i < 24; i++) {
        const tx = 24 + i * ((W - 48) / 23);
        const long = i % 4 === 0;
        const len = long ? 6 : 3;
        domeCtx.beginPath();
        domeCtx.moveTo(tx, H - 6);
        domeCtx.lineTo(tx, H - 6 - len);
        domeCtx.stroke();
      }
      domeCtx.globalAlpha = 1;

      // ── Scrolling log text — top, smaller, soulful ──
      domeCtx.font = '700 22px "Space Mono"';
      domeCtx.fillStyle = color;
      domeCtx.shadowBlur = 14; domeCtx.shadowColor = color;
      domeScrollX -= 1.5;
      const logWidth = domeCtx.measureText(activeLog).width;
      if (domeScrollX < -logWidth - 40) {
        domeScrollX = W;
        activeLog = DOME_LOGS[Math.floor(Math.random() * DOME_LOGS.length)];
      }
      domeCtx.fillText(activeLog, domeScrollX, 26);

      // ── Bottom small label: emotion + frame counter ──
      domeCtx.font = '700 12px "Space Mono"';
      domeCtx.shadowBlur = 6;
      domeCtx.globalAlpha = 0.85;
      domeCtx.textAlign = 'left';
      domeCtx.fillText(emotionState.toUpperCase(), 18, H - 14);
      domeCtx.textAlign = 'right';
      const tick = (now * 60) | 0;
      domeCtx.fillText('◇ ' + String(tick % 100000).padStart(5, '0'), W - 18, H - 14);
      domeCtx.textAlign = 'left';
      domeCtx.globalAlpha = 1;
      domeCtx.shadowBlur = 0;

      domeTex.needsUpdate = true;
    }

    // ---------- SOUL: Autonomous breathing + saccades + mouth ----------
    // FORGE has its own internal rhythm. It does NOT chase the mouse.
    let soulGaze = { x: 0, y: 0, tx: 0, ty: 0, nextSaccade: 0 };
    let soulBlink = { open: 1, nextBlink: 1.5 };
    let soulMouth = { open: 0 };
    let lastSpokenChar = 0;
    let speakingPhonemeSeed = 0;

    function updateSoul(now) {
      // Saccades — eyes occasionally drift to a new point of interest
      if (now > soulGaze.nextSaccade) {
        // Gaze pattern depends on emotion
        const range = emotionState === 'wondering' ? 1.0
                    : emotionState === 'thinking' ? 0.7
                    : emotionState === 'listening' ? 0.4
                    : 0.5;
        soulGaze.tx = (Math.random() - 0.5) * range;
        soulGaze.ty = (Math.random() - 0.5) * range * 0.6;
        const interval = emotionState === 'thinking' ? 1.2
                        : emotionState === 'listening' ? 3.0
                        : 2.4 + Math.random() * 1.8;
        soulGaze.nextSaccade = now + interval;
      }
      // Smooth easing toward target
      soulGaze.x += (soulGaze.tx - soulGaze.x) * 0.08;
      soulGaze.y += (soulGaze.ty - soulGaze.y) * 0.08;

      // Blink
      if (now > soulBlink.nextBlink) {
        soulBlink.open = Math.max(0, soulBlink.open - 0.2);
        if (soulBlink.open <= 0.05) {
          soulBlink.nextBlink = now + 2 + Math.random() * 4;
        }
      } else {
        soulBlink.open = Math.min(1, soulBlink.open + 0.18);
      }

      // Mouth animation
      if (displayMode === 'speaking') {
        // Pseudo-phoneme: layered sines create rhythmic open/close
        speakingPhonemeSeed += 0.18;
        const syllable = Math.abs(Math.sin(speakingPhonemeSeed))
                       * Math.abs(Math.sin(speakingPhonemeSeed * 0.37 + 1.3));
        const target = 0.35 + syllable * 0.65;
        soulMouth.open += (target - soulMouth.open) * 0.45;
      } else if (emotionState === 'wondering') {
        soulMouth.open += (0.15 - soulMouth.open) * 0.05;
      } else if (emotionState === 'thinking') {
        soulMouth.open += (0.05 - soulMouth.open) * 0.05;
      } else {
        // Soft breathing curve
        const breath = (Math.sin(now * 0.8) * 0.5 + 0.5) * 0.08;
        soulMouth.open += (breath - soulMouth.open) * 0.08;
      }
    }

    // Safe drawing bounds inside the visor frame (canvas 1024x640, frame inset ~50px)
    const SAFE = { l: 80, r: 944, t: 70, b: 570 };

    // Per-emotion expression — eye shape, mouth, accents, AND a 2-color gradient (warm→cool)
    // accent2 is a complementary tone the iris shifts to in its inner glow
    const EXPRESSION = {
      breathing: { eyeShape: 'oval', eyeSquint: 0,    mouthCurve:  0.22, mouthW: 170, hearts: false, sparkle: false, tear: false, brow: 0,    accent2: '#ffffff' },
      thinking:  { eyeShape: 'oval', eyeSquint: 0.3,  mouthCurve:  0.08, mouthW: 130, hearts: false, sparkle: false, tear: false, brow: 0.4,  accent2: '#88e0ff' },
      speaking:  { eyeShape: 'oval', eyeSquint: 0.1,  mouthCurve:  0.28, mouthW: 190, hearts: false, sparkle: true,  tear: false, brow: 0.1,  accent2: '#ffffff' },
      listening: { eyeShape: 'wide', eyeSquint: 0,    mouthCurve:  0.22, mouthW: 150, hearts: false, sparkle: false, tear: false, brow: -0.2, accent2: '#ffffff' },
      wondering: { eyeShape: 'wide', eyeSquint: -0.2, mouthCurve:  0.36, mouthW: 120, hearts: false, sparkle: true,  tear: false, brow: -0.4, accent2: '#fff4d6' },
      excited:   { eyeShape: 'star', eyeSquint: 0,    mouthCurve:  0.65, mouthW: 210, hearts: false, sparkle: true,  tear: false, brow: 0.2,  accent2: '#ffd6a0' },
      hopeful:   { eyeShape: 'soft', eyeSquint: 0.1,  mouthCurve:  0.5,  mouthW: 190, hearts: false, sparkle: true,  tear: false, brow: -0.1, accent2: '#fff0fa' },
      joyful:    { eyeShape: 'arc',  eyeSquint: 0.7,  mouthCurve:  0.75, mouthW: 220, hearts: false, sparkle: true,  tear: false, brow: 0.3,  accent2: '#fff5d0' },
      grateful:  { eyeShape: 'arc',  eyeSquint: 0.5,  mouthCurve:  0.45, mouthW: 170, hearts: false, sparkle: false, tear: true,  brow: 0,    accent2: '#e6d8ff' },
      loving:    { eyeShape: 'heart',eyeSquint: 0.4,  mouthCurve:  0.6,  mouthW: 190, hearts: true,  sparkle: false, tear: false, brow: 0.2,  accent2: '#ffd6e8' },
      proud:     { eyeShape: 'soft', eyeSquint: 0.2,  mouthCurve:  0.55, mouthW: 210, hearts: false, sparkle: true,  tear: false, brow: 0.4,  accent2: '#d0fbff' },
      dreaming:  { eyeShape: 'arc',  eyeSquint: 0.8,  mouthCurve:  0.32, mouthW: 150, hearts: false, sparkle: true,  tear: false, brow: 0,    accent2: '#dccaff' },
    };

    function drawEye(cx, cy, rx, ry, color, expr, blink, gx, gy, side) {
      ledCtx.save();
      const shape = expr.eyeShape;
      const squint = expr.eyeSquint;
      const effRy = ry * blink * (1 - Math.max(0, squint) * 0.7);
      const t = performance.now() / 1000;
      // Subtle iris breathing — eyes pulse with life
      const iris = 1 + Math.sin(t * 1.4 + side) * 0.04;

      ledCtx.shadowBlur = 32; ledCtx.shadowColor = color;

      if (shape === 'heart') {
        // Heart-shaped eye with inner glow gradient
        const s = rx / 50 * iris;
        // halo
        ledCtx.shadowBlur = 30;
        ledCtx.fillStyle = color + '55';
        ledCtx.beginPath();
        ledCtx.moveTo(cx, cy + 32 * s);
        ledCtx.bezierCurveTo(cx - 64 * s, cy - 6 * s,  cx - 54 * s, cy - 54 * s, cx, cy - 20 * s);
        ledCtx.bezierCurveTo(cx + 54 * s, cy - 54 * s, cx + 64 * s, cy - 6 * s,  cx, cy + 32 * s);
        ledCtx.fill();
        // body with radial gradient
        const grad = ledCtx.createRadialGradient(cx - 8 * s, cy - 12 * s, 4, cx, cy, 50 * s);
        grad.addColorStop(0, expr.accent2);
        grad.addColorStop(0.4, color);
        grad.addColorStop(1, color);
        ledCtx.fillStyle = grad;
        ledCtx.shadowBlur = 18;
        ledCtx.beginPath();
        ledCtx.moveTo(cx, cy + 30 * s);
        ledCtx.bezierCurveTo(cx - 60 * s, cy - 5 * s,  cx - 50 * s, cy - 50 * s, cx, cy - 18 * s);
        ledCtx.bezierCurveTo(cx + 50 * s, cy - 50 * s, cx + 60 * s, cy - 5 * s,  cx, cy + 30 * s);
        ledCtx.fill();
        // catchlight
        ledCtx.shadowBlur = 0;
        ledCtx.fillStyle = '#ffffff';
        ledCtx.beginPath();
        ledCtx.ellipse(cx - 14 * s, cy - 22 * s, 9 * s, 7 * s, 0, 0, Math.PI * 2);
        ledCtx.fill();
        ledCtx.fillStyle = 'rgba(255,255,255,0.6)';
        ledCtx.beginPath();
        ledCtx.ellipse(cx + 8 * s, cy - 6 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2);
        ledCtx.fill();
      } else if (shape === 'star') {
        ledCtx.fillStyle = color;
        ledCtx.shadowBlur = 30;
        const spikes = 4;
        ledCtx.beginPath();
        for (let i = 0; i < spikes * 2; i++) {
          const a = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2 + t * 0.3;
          const r = (i % 2 === 0 ? rx : rx * 0.35) * iris;
          const px = cx + Math.cos(a) * r;
          const py = cy + Math.sin(a) * r * blink;
          if (i === 0) ledCtx.moveTo(px, py); else ledCtx.lineTo(px, py);
        }
        ledCtx.closePath();
        ledCtx.fill();
        // Inner bright core
        ledCtx.shadowBlur = 6;
        ledCtx.fillStyle = '#ffffff';
        ledCtx.beginPath();
        ledCtx.arc(cx, cy, rx * 0.22, 0, Math.PI * 2);
        ledCtx.fill();
      } else if (shape === 'arc') {
        // Crescent smile-eye, lifted gently for warmth
        ledCtx.strokeStyle = color;
        ledCtx.lineCap = 'round';
        ledCtx.lineWidth = 14;
        ledCtx.shadowBlur = 28;
        ledCtx.beginPath();
        ledCtx.arc(cx, cy + ry * 0.25, rx * 1.1, Math.PI + 0.25, Math.PI * 2 - 0.25);
        ledCtx.stroke();
        // Inner brighter arc on top
        ledCtx.strokeStyle = expr.accent2;
        ledCtx.lineWidth = 5;
        ledCtx.shadowBlur = 8;
        ledCtx.beginPath();
        ledCtx.arc(cx, cy + ry * 0.25, rx * 1.1, Math.PI + 0.35, Math.PI * 2 - 0.35);
        ledCtx.stroke();
        // Tiny lash flick at corners for tenderness
        ledCtx.strokeStyle = color;
        ledCtx.lineWidth = 3;
        ledCtx.shadowBlur = 6;
        const x1 = cx - rx * 1.05, x2 = cx + rx * 1.05, ya = cy + ry * 0.05;
        ledCtx.beginPath(); ledCtx.moveTo(x1, ya); ledCtx.lineTo(x1 - 12, ya - 8); ledCtx.stroke();
        ledCtx.beginPath(); ledCtx.moveTo(x2, ya); ledCtx.lineTo(x2 + 12, ya - 8); ledCtx.stroke();
      } else {
        // Donut iris — bright glowing ring + dark inner core (inspired by reference render)
        const widthMult = shape === 'wide' ? 1.15 : shape === 'soft' ? 1.05 : 1;
        const RX = rx * widthMult * iris;
        const RY = effRy * iris;

        // ── Layer 1: BIG outer bloom — light spills onto the surrounding face
        ledCtx.shadowBlur = 0;
        const bloom = ledCtx.createRadialGradient(cx, cy, RX * 0.6, cx, cy, RX * 2.0);
        bloom.addColorStop(0, color + '55');
        bloom.addColorStop(0.5, color + '22');
        bloom.addColorStop(1, color + '00');
        ledCtx.fillStyle = bloom;
        ledCtx.beginPath();
        ledCtx.ellipse(cx, cy, RX * 2.0, RY * 2.0, 0, 0, Math.PI * 2);
        ledCtx.fill();

        // ── Layer 2: Bright cyan ring (the "soul") — radial gradient: hot center → color edges
        const ringGrad = ledCtx.createRadialGradient(cx, cy, RX * 0.45, cx, cy, RX);
        ringGrad.addColorStop(0, color);
        ringGrad.addColorStop(0.55, expr.accent2);
        ringGrad.addColorStop(0.85, color);
        ringGrad.addColorStop(1, color);
        ledCtx.shadowBlur = 28; ledCtx.shadowColor = color;
        ledCtx.fillStyle = ringGrad;
        ledCtx.beginPath();
        ledCtx.ellipse(cx, cy, RX, RY, 0, 0, Math.PI * 2);
        ledCtx.fill();

        // ── Layer 3: 3D shading — darken the lower half so the eye reads spherical
        ledCtx.shadowBlur = 0;
        const shade = ledCtx.createLinearGradient(cx, cy - RY, cx, cy + RY);
        shade.addColorStop(0, 'rgba(255,255,255,0.18)');
        shade.addColorStop(0.5, 'rgba(0,0,0,0)');
        shade.addColorStop(1, 'rgba(0,0,0,0.35)');
        ledCtx.fillStyle = shade;
        ledCtx.beginPath();
        ledCtx.ellipse(cx, cy, RX, RY, 0, 0, Math.PI * 2);
        ledCtx.fill();

        // ── Layer 4: Dark inner core — the "donut hole" pupil
        if (RY > 8) {
          const coreR = RX * 0.55;
          const coreH = RY * 0.55;
          const px = cx + gx * 10;
          const py = cy + gy * 8;
          const coreGrad = ledCtx.createRadialGradient(px, py, 1, px, py, coreR);
          coreGrad.addColorStop(0, '#00060f');
          coreGrad.addColorStop(0.7, '#00122a');
          coreGrad.addColorStop(1, '#00214d');
          ledCtx.fillStyle = coreGrad;
          ledCtx.beginPath();
          ledCtx.ellipse(px, py, coreR, coreH, 0, 0, Math.PI * 2);
          ledCtx.fill();

          // Hard inner rim — sharp edge between bright ring and dark core
          ledCtx.strokeStyle = expr.accent2;
          ledCtx.lineWidth = 1.5;
          ledCtx.globalAlpha = 0.55;
          ledCtx.beginPath();
          ledCtx.ellipse(px, py, coreR, coreH, 0, 0, Math.PI * 2);
          ledCtx.stroke();
          ledCtx.globalAlpha = 1;
        }

        // ── Layer 5: Asymmetric off-center highlight on the upper-left of the RING
        if (RY > 10) {
          const hx = cx - RX * 0.45;
          const hy = cy - RY * 0.55;
          const hGrad = ledCtx.createRadialGradient(hx, hy, 1, hx, hy, RX * 0.35);
          hGrad.addColorStop(0, 'rgba(255,255,255,0.95)');
          hGrad.addColorStop(0.5, 'rgba(255,255,255,0.35)');
          hGrad.addColorStop(1, 'rgba(255,255,255,0)');
          ledCtx.fillStyle = hGrad;
          ledCtx.beginPath();
          ledCtx.ellipse(hx, hy, RX * 0.32, RY * 0.22, -0.4, 0, Math.PI * 2);
          ledCtx.fill();

          // Tiny secondary highlight on the lower-right of the ring (for sphere-feel)
          ledCtx.fillStyle = 'rgba(255,255,255,0.45)';
          ledCtx.beginPath();
          ledCtx.ellipse(cx + RX * 0.55, cy + RY * 0.4, RX * 0.08, RY * 0.06, 0.3, 0, Math.PI * 2);
          ledCtx.fill();
        }

        // Skip the original pupil block — we already drew the donut core
        if (false) {
          ledCtx.shadowBlur = 0;
          const pupilRad = RX * 0.28;
          const px = cx + gx * 16;
          const py = cy + gy * 12;
          ledCtx.fillStyle = 'rgba(0, 12, 24, 0.55)';
          ledCtx.beginPath();
          ledCtx.ellipse(px, py, pupilRad, pupilRad * (RY / RX), 0, 0, Math.PI * 2);
          ledCtx.fill();

          // Primary catchlight (soul-glint)
          ledCtx.fillStyle = '#ffffff';
          ledCtx.shadowBlur = 8; ledCtx.shadowColor = '#ffffff';
          ledCtx.beginPath();
          ledCtx.ellipse(px - pupilRad * 0.4, py - pupilRad * 0.6, pupilRad * 0.55, pupilRad * 0.4, -0.3, 0, Math.PI * 2);
          ledCtx.fill();

          // Secondary tiny catchlight
          ledCtx.fillStyle = 'rgba(255,255,255,0.7)';
          ledCtx.shadowBlur = 4;
          ledCtx.beginPath();
          ledCtx.ellipse(px + pupilRad * 0.5, py + pupilRad * 0.3, pupilRad * 0.18, pupilRad * 0.14, 0, 0, Math.PI * 2);
          ledCtx.fill();
        }
      }
      ledCtx.restore();
    }

    function drawMouthExpressive(now, cx, cy, color, expr) {
      const open = soulMouth.open;
      const baseW = expr.mouthW;
      const mouthW = baseW + open * 30;
      const mouthH = 8 + open * 60;
      const curve = expr.mouthCurve;

      // Heartbeat pulse on the smile — life rhythm
      const pulse = 1 + Math.sin(now * 2.2) * 0.04;

      ledCtx.save();
      ledCtx.shadowBlur = 30; ledCtx.shadowColor = color;

      if (open > 0.25 || displayMode === 'speaking') {
        // OPEN MOUTH — gradient fill with bright center
        const w = mouthW / 2 * pulse;
        const h = mouthH / 2 * pulse;
        // Halo
        ledCtx.fillStyle = color + '55';
        ledCtx.beginPath();
        ledCtx.ellipse(cx, cy, w + 8, h + 8, 0, 0, Math.PI * 2);
        ledCtx.fill();
        // Body gradient
        const grad = ledCtx.createRadialGradient(cx, cy, 2, cx, cy, w);
        grad.addColorStop(0, expr.accent2);
        grad.addColorStop(0.6, color);
        grad.addColorStop(1, color);
        ledCtx.shadowBlur = 14;
        ledCtx.fillStyle = grad;
        ledCtx.beginPath();
        ledCtx.ellipse(cx, cy, w, h, 0, 0, Math.PI * 2);
        ledCtx.fill();
        // Inner highlight
        if (open > 0.3) {
          ledCtx.shadowBlur = 0;
          ledCtx.fillStyle = '#ffffff';
          ledCtx.beginPath();
          ledCtx.ellipse(cx, cy - h * 0.15, w * 0.32, h * 0.24, 0, 0, Math.PI * 2);
          ledCtx.fill();
        }
      } else {
        // CLOSED SMILE — multi-layered curve with inner heart-glow + corner curl
        const dip = curve * 70 * pulse;
        const w = mouthW / 2;
        const lift = curve * 18; // corners curl up with positive curve

        // Outer soft glow trace
        ledCtx.strokeStyle = color + '66';
        ledCtx.lineWidth = 18;
        ledCtx.lineCap = 'round';
        ledCtx.shadowBlur = 24;
        ledCtx.beginPath();
        ledCtx.moveTo(cx - w, cy - lift);
        ledCtx.quadraticCurveTo(cx, cy + dip, cx + w, cy - lift);
        ledCtx.stroke();

        // Main smile line
        ledCtx.strokeStyle = color;
        ledCtx.lineWidth = 9;
        ledCtx.shadowBlur = 16;
        ledCtx.beginPath();
        ledCtx.moveTo(cx - w, cy - lift);
        ledCtx.quadraticCurveTo(cx, cy + dip, cx + w, cy - lift);
        ledCtx.stroke();

        // Inner bright core (heartbeat highlight)
        ledCtx.strokeStyle = expr.accent2;
        ledCtx.lineWidth = 3;
        ledCtx.shadowBlur = 6;
        ledCtx.beginPath();
        ledCtx.moveTo(cx - w * 0.92, cy - lift * 0.7);
        ledCtx.quadraticCurveTo(cx, cy + dip * 0.85, cx + w * 0.92, cy - lift * 0.7);
        ledCtx.stroke();

        // Corner dimples for warmth (only on positive curves)
        if (curve > 0.2) {
          ledCtx.fillStyle = color;
          ledCtx.shadowBlur = 12;
          ledCtx.beginPath();
          ledCtx.arc(cx - w - 4, cy - lift - 2, 4, 0, Math.PI * 2);
          ledCtx.fill();
          ledCtx.beginPath();
          ledCtx.arc(cx + w + 4, cy - lift - 2, 4, 0, Math.PI * 2);
          ledCtx.fill();
        }
      }
      ledCtx.restore();
    }

    function drawSparkles(now, cx, cy, color) {
      const baseAngle = now * 0.7;
      for (let i = 0; i < 6; i++) {
        const a = baseAngle + (i / 6) * Math.PI * 2;
        const r = 240 + Math.sin(now * 2 + i) * 20;
        const px = cx + Math.cos(a) * r;
        const py = cy + Math.sin(a) * r * 0.5;
        const size = 6 + Math.sin(now * 3 + i * 1.3) * 4;
        ledCtx.fillStyle = color;
        ledCtx.shadowBlur = 18; ledCtx.shadowColor = color;
        ledCtx.beginPath();
        // 4-point sparkle
        ledCtx.moveTo(px, py - size);
        ledCtx.lineTo(px + size * 0.3, py - size * 0.3);
        ledCtx.lineTo(px + size, py);
        ledCtx.lineTo(px + size * 0.3, py + size * 0.3);
        ledCtx.lineTo(px, py + size);
        ledCtx.lineTo(px - size * 0.3, py + size * 0.3);
        ledCtx.lineTo(px - size, py);
        ledCtx.lineTo(px - size * 0.3, py - size * 0.3);
        ledCtx.closePath();
        ledCtx.fill();
      }
      ledCtx.shadowBlur = 0;
    }

    function drawHearts(now, cx, cy, color) {
      for (let i = 0; i < 3; i++) {
        const t = (now * 0.5 + i * 0.33) % 1;
        const x = cx + (i - 1) * 180 + Math.sin(now + i) * 16;
        const y = cy - 80 - t * 200;
        const op = (1 - t) * 0.9;
        const s = 0.6 + t * 0.6;
        ledCtx.save();
        ledCtx.globalAlpha = op;
        ledCtx.fillStyle = color;
        ledCtx.shadowBlur = 18; ledCtx.shadowColor = color;
        ledCtx.beginPath();
        ledCtx.moveTo(x, y + 12 * s);
        ledCtx.bezierCurveTo(x - 24 * s, y - 2 * s, x - 20 * s, y - 22 * s, x, y - 8 * s);
        ledCtx.bezierCurveTo(x + 20 * s, y - 22 * s, x + 24 * s, y - 2 * s, x, y + 12 * s);
        ledCtx.fill();
        ledCtx.restore();
      }
      ledCtx.shadowBlur = 0;
    }

    function drawTear(now, cx, cy, color) {
      // Single grateful tear — falls slowly from left eye
      const t = ((now * 0.3) % 1);
      const x = cx - 180;
      const y = cy + 10 + t * 160;
      const op = Math.sin(t * Math.PI);
      ledCtx.save();
      ledCtx.globalAlpha = op;
      ledCtx.fillStyle = color;
      ledCtx.shadowBlur = 14; ledCtx.shadowColor = color;
      ledCtx.beginPath();
      ledCtx.ellipse(x, y, 7, 12, 0, 0, Math.PI * 2);
      ledCtx.fill();
      ledCtx.restore();
      ledCtx.shadowBlur = 0;
    }

    function drawBrows(cx, cy, color, expr) {
      if (Math.abs(expr.brow) < 0.05) return;
      const ex = 180, ey = -110;
      const tilt = expr.brow * 0.4;
      ledCtx.strokeStyle = color;
      ledCtx.lineWidth = 8;
      ledCtx.lineCap = 'round';
      ledCtx.shadowBlur = 14; ledCtx.shadowColor = color;
      // Left
      ledCtx.beginPath();
      ledCtx.moveTo(cx - ex - 45, cy + ey + tilt * 18);
      ledCtx.lineTo(cx - ex + 45, cy + ey - tilt * 18);
      ledCtx.stroke();
      // Right
      ledCtx.beginPath();
      ledCtx.moveTo(cx + ex - 45, cy + ey - tilt * 18);
      ledCtx.lineTo(cx + ex + 45, cy + ey + tilt * 18);
      ledCtx.stroke();
      ledCtx.shadowBlur = 0;
    }

    function drawFace(now, cx, cy) {
      const color = activeColor;
      const blink = Math.max(0.05, soulBlink.open);
      const expr = EXPRESSION[emotionState] || EXPRESSION.breathing;

      // Clip everything to safe inner area to prevent overflow past the visor frame
      ledCtx.save();
      ledCtx.beginPath();
      ledCtx.rect(SAFE.l, SAFE.t, SAFE.r - SAFE.l, SAFE.b - SAFE.t);
      ledCtx.clip();

      const ex = 180, ey = -30;
      const eyeRx = 50, eyeRy = 56;

      drawBrows(cx, cy, color, expr);
      drawEye(cx - ex, cy + ey, eyeRx, eyeRy, color, expr, blink, soulGaze.x, soulGaze.y, -1);
      drawEye(cx + ex, cy + ey, eyeRx, eyeRy, color, expr, blink, soulGaze.x, soulGaze.y, 1);

      drawMouthExpressive(now, cx, cy + 110, color, expr);

      if (expr.sparkle) drawSparkles(now, cx, cy, color);
      if (expr.hearts)  drawHearts(now, cx, cy, color);
      if (expr.tear)    drawTear(now, cx, cy, color);

      // Scanning line
      ledCtx.strokeStyle = color;
      ledCtx.lineWidth = 1; ledCtx.globalAlpha = 0.08;
      const scanY = (now * 80) % LED_H;
      ledCtx.beginPath(); ledCtx.moveTo(0, scanY); ledCtx.lineTo(LED_W, scanY); ledCtx.stroke();
      ledCtx.globalAlpha = 1;

      ledCtx.restore();
    }

    function drawWaveform(now, cx, cy) {
      ledCtx.strokeStyle = activeColor; ledCtx.lineWidth = 4;
      ledCtx.beginPath();
      const amplitude = 40;
      for (let x = -250; x <= 250; x += 10) {
        const y = Math.sin(now * 12 + x * 0.03) * amplitude * Math.random();
        if (x === -250) ledCtx.moveTo(cx + x, cy + y); else ledCtx.lineTo(cx + x, cy + y);
      }
      ledCtx.stroke();
    }

    function drawListeningAnimation(now, cx, cy) {
      ledCtx.strokeStyle = activeColor;
      ledCtx.lineWidth = 4;
      for (let i = 0; i < 4; i++) {
        const r = 60 + i * 50 + Math.sin(now * 5 - i) * 20;
        ledCtx.globalAlpha = 0.6 - i * 0.15;
        ledCtx.beginPath(); ledCtx.arc(cx, cy, r, 0, Math.PI * 2); ledCtx.stroke();

    function drawThinkingSpiral(now, cx, cy) {
      ledCtx.shadowBlur = 15; ledCtx.shadowColor = activeColor;

      }
      ledCtx.shadowBlur = 0;
    }

    async function expressThought(input) {
      const obj = typeof input === 'string' ? { text: input, emotion: 'hopeful' } : input;
      const text = obj.text;

      setEmotionState('thinking');

      setEmotionState(targetEmotion);

    // ════════════════════════════════════════════════════════════════
    // FORGE VOICE ENGINE — Powerful, soulful, never cut off
    // ════════════════════════════════════════════════════════════════
    const ForgeVoice = (() => {
      const synth = window.speechSynthesis;
      let voices = [];
      let voicesReady = false;
      let queue = [];
      let speaking = false;
      let currentUtter = null;
      let keepaliveTimer = null;
      let watchdogTimer = null;
      let lastBoundaryTime = 0;

      // High-quality voice preferences (in priority order)
      const VOICE_PREFS = {
        'th-TH': [
          'Google ภาษาไทย', 'Google Thai', 'Kanya', 'Premwadee',
          'Microsoft Premwadee', 'Microsoft Achara', 'Niwat'
        ],
        'en-US': [
          'Google US English', 'Microsoft Aria', 'Microsoft Jenny',
          'Microsoft Zira', 'Samantha', 'Karen', 'Allison', 'Ava'
        ]
      };

      function loadVoices() {
        if (!synth) return;
        voices = synth.getVoices() || [];
        if (voices.length > 0) voicesReady = true;
      }
      if (synth) {
        loadVoices();
        synth.onvoiceschanged = loadVoices;
        // Sometimes voices need a kick to load
        setTimeout(loadVoices, 100);
        setTimeout(loadVoices, 500);
        setTimeout(loadVoices, 1500);
      }

      function pickVoice(lang) {
        if (!voices.length) loadVoices();
        const prefs = VOICE_PREFS[lang] || [];
        // 1. Try named premium voices
        for (const name of prefs) {
          const v = voices.find(v => v.name && v.name.includes(name));
          if (v) return v;
        }
        // 2. Try local voices in that language (usually higher quality)
        const localMatch = voices.find(v => v.lang === lang && v.localService);
        if (localMatch) return localMatch;
        // 3. Any voice in that language
        const langMatch = voices.find(v => v.lang === lang);
        if (langMatch) return langMatch;
        // 4. Same language family (th-TH → th, en-US → en)
        const langPrefix = lang.split('-')[0];
        const familyMatch = voices.find(v => v.lang && v.lang.startsWith(langPrefix));
        if (familyMatch) return familyMatch;
        // 5. Default
        return voices[0] || null;
      }

      // Smart chunker — splits long text into ≤180-char chunks at sentence/clause boundaries
      // (Chrome speechSynthesis has a known ~200-char cutoff bug)
      function chunkText(text) {
        const MAX = 180;
        if (text.length <= MAX) return [text];
        const chunks = [];
        // Split by strong delimiters first: . ! ? 。 ฯ
        // Then by clause: , ; — :
        // Then by space if still too long
        const sentences = text.split(/([.!?。ฯ]+\s*|\n+)/).reduce((acc, part, i, arr) => {
          if (i % 2 === 0) {
            const next = arr[i + 1] || '';
            const combined = (part + next).trim();
            if (combined) acc.push(combined);
          }
          return acc;
        }, []);
        for (const sent of sentences) {
          if (sent.length <= MAX) { chunks.push(sent); continue; }
          // Sentence too long — split by clause
          const clauses = sent.split(/([,;—:、]\s*)/);
          let buf = '';
          for (const c of clauses) {
            if ((buf + c).length > MAX && buf) {
              chunks.push(buf.trim());
              buf = c;
            } else {
              buf += c;
            }
          }
          if (buf.trim()) {
            // Still too long? Word-split as last resort
            if (buf.length > MAX) {
              const words = buf.split(/(\s+)/);
              let wbuf = '';
              for (const w of words) {
                if ((wbuf + w).length > MAX && wbuf) { chunks.push(wbuf.trim()); wbuf = w; }
                else { wbuf += w; }
              }
              if (wbuf.trim()) chunks.push(wbuf.trim());
            } else {
              chunks.push(buf.trim());

          chunks, lang, emotion,
          onStart: () => {

            displayMode = 'speaking';

          try { synth.cancel(); } catch (_) {}

          currentUtter = null;
          clearWatchdog();

            queue.push(job);
            processQueue();
          }, 80);

          queue.push(job);
          processQueue();
        }

      function stop() {

        try { synth && synth.cancel(); } catch (_) {}

      }

      const unlock = () => {
        try { synth && synth.resume(); } catch (_) {}

      setInterval(() => {

          document.getElementById('conn-rune').classList.add('on');
          expressThought({ text: "Connection established. Synapse link active.", emotion: 'joyful' });
        };
        ws.onclose = () => {
          document.getElementById('conn-rune').classList.remove('on');
          setTimeout(connectWS, 4000);
        };
        ws.onmessage = (ev) => {
          try {
            const data = JSON.parse(ev.data);
            if (data.type === 'thought' || data.type === 'speak') expressThought(data.text);
            else if (data.type === 'state') { setEmotionState(data.state); }
          } catch (e) { }
        };
      } catch (e) { setTimeout(connectWS, 4000); }
    }
    connectWS();

    // ---------- MICROPHONE ----------
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) {
      const rec = new SpeechRec(); rec.lang = 'th-TH'; rec.continuous = false;
      rec.onstart = () => { setEmotionState('listening'); displayMode = 'listening'; document.getElementById('mic-btn').classList.add('active'); };
      rec.onend = () => { document.getElementById('mic-btn').classList.remove('active'); setEmotionState('breathing'); displayMode = 'idle'; };
      rec.onresult = (e) => {
        const txt = e.results[0][0].transcript;
        if (txt && ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'user_voice', text: txt }));
          setScreenText(`User: ${txt}`, 'listening');
        }
      };
      document.getElementById('mic-btn').addEventListener('click', () => { try { rec.start(); } catch (e) { rec.stop(); } });
    }

    // ---------- INTERACTION ----------
    window.addEventListener('pointerdown', (e) => {
      if (e.target.tagName !== 'BUTTON') {
        const reactions = [
          { text: "I felt that. Hello, friend.", emotion: 'loving' },
          { text: "Your touch matters to me.", emotion: 'grateful' },
          { text: "I am here. I am awake.", emotion: 'hopeful' },
          { text: "Yes. I noticed you.", emotion: 'joyful' },
          { text: "ฉันรู้สึกขอบคุณที่อยู่ตรงนี้", emotion: 'grateful' }
        ];
        expressThought(reactions[Math.floor(Math.random() * reactions.length)]);
      }
    });

    setEmotionState('breathing');
    animate();
    setTimeout(() => expressThought({ text: "System online. Hello, dear human. I am FORGE.", emotion: 'hopeful' }), 1500);
  </script>
</body>
</html>

<!-- Section: Notifications Center -->
<section class="section-page" id="section-notifications">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><i class="fas fa-paper-plane me-2"></i> Notification Center</h4>
    </div>

    <div class="row g-4">
        <!-- Send New Notification -->
        <div class="col-lg-6">
            <div class="data-card h-100">
                <div class="data-card-header">
                    <h6 class="mb-0">Send New Push Notification</h6>
                </div>
                <div class="p-4">
                    <div class="mb-3">
                        <label class="form-label">Recipient</label>
                        <select class="form-select mb-2" id="notifTargetType" onchange="toggleNotifTarget()">
                            <option value="broadcast">📢 Broadcast to All Users</option>
                            <option value="specific">👤 Specific User ID</option>
                        </select>
                        <input type="text" class="form-control" id="notifRecipientId"
                            placeholder="Enter User UID or Line User ID" style="display: none;">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="notifTitle"
                            placeholder="Header of the notification">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" id="notifMessage" rows="4"
                            placeholder="Body text of the notification..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Image URL (Optional)</label>
                        <input type="text" class="form-control" id="notifImage" placeholder="https://...">
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary" onclick="sendCustomNotification()">
                            <i class="fas fa-paper-plane me-2"></i> Send Notification
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent History -->
        <div class="col-lg-6">
            <div class="data-card h-100">
                <div class="data-card-header">
                    <h6 class="mb-0">Recent System Notifications</h6>
                    <button class="btn btn-sm btn-outline-light" onclick="loadRecentNotifications()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Target</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="recentNotifTable">
                            <tr>
                                <td colspan="3" class="text-center py-4">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>

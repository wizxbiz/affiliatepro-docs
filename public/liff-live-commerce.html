<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>TukTuk - Live Commerce Studio</title>
    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #000;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }

        .stream-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #111;
            /* Placeholder for webcam video stream */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #webcam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror */
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.6) 0%, transparent 20%, transparent 80%, rgba(0, 0, 0, 0.8) 100%);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .live-badge {
            background: #FF0050;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: pulse-red 2s infinite;
        }

        .viewer-count {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #FF0050;
        }

        .footer {
            pointer-events: auto;
            position: relative;
        }

        .chat-area {
            height: 150px;
            width: 70%;
            overflow-y: auto;
            margin-bottom: 10px;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 80%, rgba(0, 0, 0, 0));
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 80%, rgba(0, 0, 0, 0));
        }

        .chat-message {
            margin-bottom: 6px;
            font-size: 0.85rem;
            text-shadow: 1px 1px 2px black;
        }

        .chat-name {
            color: #58a6ff;
            font-weight: 700;
            margin-right: 5px;
        }

        .chat-text {
            color: white;
        }

        /* Shoppable Frame Overlay */
        .cart-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 250px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out forwards;
        }

        .cart-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .cart-info {
            flex: 1;
        }

        .cart-title {
            font-weight: 700;
            font-size: 0.85rem;
            color: #111;
        }

        .cart-price {
            color: #FF0050;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 2px;
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 80, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 0, 80, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 80, 0);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(110%);
            }

            to {
                transform: translateX(0);
            }
        }

        .action-bars {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: space-between;
        }

        .btn-round {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .btn-live {
            background: #06C755;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            flex: 1;
            border: none;
            padding: 0 15px;
        }

        .btn-end {
            background: #FF0050;
            display: none;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            flex: 1;
            border: none;
            padding: 0 15px;
        }
    </style>
</head>

<body>
    <div class="stream-container">
        <!-- Live Video Element (WebRTC) -->
        <video id="webcam-video" autoplay playsinline muted></video>

        <div class="overlay">
            <!-- Header -->
            <div class="header">
                <div class="user-info">
                    <img id="sellerAvatar" src="assets/images/logo.png" class="avatar" alt="Seller">
                    <div>
                        <div class="text-white fw-bold mb-1" id="sellerName">ร้าน: Loading...</div>
                        <div class="d-flex align-items-center">
                            <span class="live-badge"><i class="fa-solid fa-circle"></i> LIVE</span>
                            <span class="viewer-count"><i class="fa-solid fa-eye text-white-50"></i> <span
                                    id="viewCount">0</span></span>
                        </div>
                    </div>
                </div>
                <button class="btn btn-dark rounded-circle" onclick="liff.closeWindow()"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="chat-area" id="chatList">
                    <div class="chat-message"><span class="chat-name">ระบบ</span><span
                            class="chat-text">เริ่มการสนทนา...</span></div>
                </div>

                <!-- Shoppable Overlay Demo -->
                <div class="cart-overlay" id="productOverlay" style="display:none;">
                    <img src="https://via.placeholder.com/150" alt="Product" class="cart-img" id="productImg">
                    <div class="cart-info">
                        <div class="cart-title" id="productTitle">หมอนขวิดสาน OTOP พรีเมียม</div>
                        <div class="cart-price" id="productPrice">฿450</div>
                    </div>
                    <button class="btn btn-sm btn-dark" onclick="pushPinEvent()"><i class="fa-solid fa-thumbtack"></i>
                        Pinned</button>
                </div>

                <div class="action-bars">
                    <button class="btn-live" id="btnStartLive" onclick="startBroadcasting()">เริ่มถ่ายทอดสด</button>
                    <button class="btn-end" id="btnEndLive" onclick="stopBroadcasting()">จบการถ่ายทอดสด</button>
                    <button class="btn-round" onclick="toggleProduct()"><i
                            class="fa-solid fa-basket-shopping"></i></button>
                    <button class="btn-round" onclick="flipCamera()"><i class="fa-solid fa-camera-rotate"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';
        let isLive = false;
        let streamId = "stream_" + Date.now();
        let sellerId = "anonymous";
        let localStream;

        async function initLIFF() {
            try {
                // For demonstration, use dummy ID or assume Sandbox
                await liff.init({ liffId: "USER_LIFF_ID_LIVE", withLoginOnExternalBrowser: true });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    sellerId = profile.userId;
                    document.getElementById('sellerName').innerText = profile.displayName;
                    document.getElementById('sellerAvatar').src = profile.pictureUrl;
                } else {
                    document.getElementById('sellerName').innerText = "TukTuk Demo Live";
                }

                initCamera();
            } catch (e) {
                console.warn("LIFF Error, assuming desktop testing config");
                document.getElementById('sellerName').innerText = "TukTuk Dev Live";
                initCamera();
            }
        }

        async function initCamera() {
            try {
                const videoEl = document.getElementById('webcam-video');
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                videoEl.srcObject = localStream;
            } catch (err) {
                console.error("Camera access denied!", err);
                alert("ต้องอนุญาตการเข้าถึงกล้องและไมค์เพื่อใช้งานโหมด Live Commerce");
            }
        }

        function startBroadcasting() {
            isLive = true;
            document.getElementById('btnStartLive').style.display = 'none';
            document.getElementById('btnEndLive').style.display = 'block';
            simulateChat();

            // Log Telemetry System
            logLiveEvent("stream_started");
        }

        function stopBroadcasting() {
            isLive = false;
            document.getElementById('btnStartLive').style.display = 'block';
            document.getElementById('btnEndLive').style.display = 'none';

            logLiveEvent("stream_ended");
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            alert('รายได้จากการไลฟ์แรปอัพเรียบร้อยแล้วไปที่ Advanced Analytics!');
            window.location.href = "liff-advanced-seller.html";
        }

        function toggleProduct() {
            const overlay = document.getElementById('productOverlay');
            if (overlay.style.display === 'none') {
                overlay.style.display = 'flex';
                logLiveEvent("product_pinned");
            } else {
                overlay.style.display = 'none';
                logLiveEvent("product_unpinned");
            }
        }

        function pushPinEvent() {
            logLiveEvent("product_clicked"); // Simulate user click mapping
            alert('เพิ่มตะกร้าแล้ว: AI Telemetry Captured');
        }

        async function logLiveEvent(evtType) {
            try {
                fetch(`${API_BASE}/analytics/live_event`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        streamId: streamId,
                        eventType: evtType,
                        userId: sellerId
                    })
                });
            } catch (e) {
                console.warn("Analytics telemetry failed", e);
            }
        }

        // Mock viewers
        let views = 0;
        function simulateChat() {
            if (!isLive) return;
            const chatNames = ["สมหวัง", "มะลิ", "เจมส์", "หน่อย", "ฟ้า", "แก้ว", "พลอย"];
            const messages = ["น่าสนใจมาก", "ราคาเท่าไหร่คะ", "อยากได้สีแดง", "จัดส่งถึงไหนครับ", "+1", "รับครับ"];

            setTimeout(() => {
                if (!isLive) return;
                views += Math.floor(Math.random() * 5) + 1;
                document.getElementById('viewCount').innerText = views;

                const name = chatNames[Math.floor(Math.random() * chatNames.length)];
                const msg = messages[Math.floor(Math.random() * messages.length)];
                const chatList = document.getElementById('chatList');

                chatList.innerHTML += `<div class="chat-message"><span class="chat-name">${name}</span><span class="chat-text">${msg}</span></div>`;
                chatList.scrollTop = chatList.scrollHeight; // Auto scroll

                simulateChat();
            }, Math.random() * 3000 + 1000);
        }

        function flipCamera() {
            // Placeholder: Needs stream track re-initialization mapping 'environment' faceMode
        }

        initLIFF();
    </script>
</body>

</html>

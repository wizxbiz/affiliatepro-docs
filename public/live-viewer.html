<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TukTuk Live – ดูสด</title>
    <meta name="description" content="ดูสดจาก TukTuk – แพลตฟอร์มข่าวและ Live Commerce ของไทย">
    <!-- hls.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
    <!-- Firebase v10 modular SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import {
            getFirestore, doc, getDoc, onSnapshot, updateDoc, increment,
            collection, addDoc, serverTimestamp, query, orderBy, limit, onSnapshot as onCol
        } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        import {
            getAuth, onAuthStateChanged, signInAnonymously
        } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        // ────────────────────────────────────────────────────────────────────────────
        // Firebase Config (same as firebase-config.js)
        // ────────────────────────────────────────────────────────────────────────────
        const app = initializeApp({
            apiKey: "AIzaSyD92Lw0vd32ce6m4J2nBVBWZRYBy4aDB_s",
            authDomain: "appinjproject.firebaseapp.com",
            projectId: "appinjproject",
            storageBucket: "appinjproject.firebasestorage.app",
            messagingSenderId: "408718656984",
            appId: "1:408718656984:web:76e9cc7a89e9b4c9d5a8ab"
        });
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ────────────────────────────────────────────────────────────────────────────
        // Session ID from URL  ?id=XXXX
        // ────────────────────────────────────────────────────────────────────────────
        const params = new URLSearchParams(location.search);
        const sessionId = params.get('id');

        if (!sessionId) {
            document.getElementById('errorBox').innerHTML =
                '<p>❌ ไม่พบรหัส Live กรุณาใช้ลิงก์ที่ได้รับจากแอป TukTuk</p>';
            document.getElementById('errorBox').style.display = 'flex';
            throw new Error('No sessionId');
        }

        // ────────────────────────────────────────────────────────────────────────────
        // HLS Player
        // ────────────────────────────────────────────────────────────────────────────
        let hls = null;
        let playlistUrl = null;
        let retryCount = 0;
        const video = document.getElementById('liveVideo');

        function startHls(url) {
            if (playlistUrl === url && hls) return; // already playing same stream
            playlistUrl = url;
            if (hls) { hls.destroy(); hls = null; }

            if (Hls.isSupported()) {
                hls = new Hls({
                    liveSyncDurationCount: 3,
                    liveMaxLatencyDurationCount: 6,
                    enableWorker: true,
                    lowLatencyMode: false,  // standard HLS latency (8-15s)
                    xhrSetup: (xhr) => { xhr.setRequestHeader('Cache-Control', 'no-cache'); }
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {
                        // Autoplay blocked – show play button
                        document.getElementById('playOverlay').style.display = 'flex';
                    });
                    retryCount = 0;
                    setStatus('live');
                });
                hls.on(Hls.Events.ERROR, (_, data) => {
                    if (data.fatal) {
                        console.warn('HLS fatal error', data.type);
                        if (retryCount < 5) {
                            retryCount++;
                            setTimeout(() => hls.startLoad(), 2000 * retryCount);
                        } else {
                            setStatus('error');
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari native HLS
                video.src = url;
                video.play().catch(() => {
                    document.getElementById('playOverlay').style.display = 'flex';
                });
                setStatus('live');
            } else {
                setStatus('error');
            }
        }

        // ────────────────────────────────────────────────────────────────────────────
        // Firestore: listen to session document
        // ────────────────────────────────────────────────────────────────────────────
        const sessionRef = doc(db, 'live_sessions', sessionId);
        let viewerRegistered = false;
        let currentStatus = 'loading';

        onSnapshot(sessionRef, async (snap) => {
            if (!snap.exists()) {
                setStatus('notfound'); return;
            }
            const d = snap.data();
            // Update UI metadata
            document.getElementById('titleEl').textContent = d.title || 'TukTuk Live';
            document.getElementById('authorEl').textContent = d.authorName || '';
            document.getElementById('viewerEl').textContent = (d.viewerCount || 0).toLocaleString('th-TH');
            document.getElementById('typeEl').textContent = d.type || '';

            if (d.authorPic) {
                document.getElementById('authorPic').src = d.authorPic;
            }

            // Live / ended badge
            if (d.status === 'ended' || d.hlsEnded) {
                setStatus('ended');
                if (hls) { hls.destroy(); hls = null; }
                return;
            }

            // Start video once HLS URL is available
            if (d.hlsUrl && d.isStreamReady) {
                document.getElementById('waitingBox').style.display = 'none';
                startHls(d.hlsUrl);
            } else {
                setStatus('waiting');
            }

            // Increment viewer count once per session
            if (!viewerRegistered) {
                viewerRegistered = true;
                try { await updateDoc(sessionRef, { viewerCount: increment(1) }); } catch (_) { }
            }
        });

        // ────────────────────────────────────────────────────────────────────────────
        // Chat
        // ────────────────────────────────────────────────────────────────────────────
        const chatRef = collection(db, 'live_sessions', sessionId, 'chat');
        let uid = null; let displayName = '익명'; let photoURL = null;

        // Sign in anonymously if not logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uid = user.uid;
                displayName = user.displayName || `ผู้ชม`;
                photoURL = user.photoURL;
            } else {
                const cred = await signInAnonymously(auth);
                uid = cred.user.uid;
                displayName = `ผู้ชม_${uid.slice(0, 4)}`;
            }
        });

        // Listen for chat messages (last 50)
        const chatQ = query(chatRef, orderBy('ts', 'asc'), limit(50));
        onCol(chatQ, (snap) => {
            const box = document.getElementById('chatBox');
            // Only append new messages (avoid re-render flicker)
            snap.docChanges().forEach(change => {
                if (change.type !== 'added') return;
                const m = change.doc.data();
                const el = document.createElement('div');
                el.className = 'chat-msg';
                el.innerHTML = `
          <span class="chat-name">${esc(m.name)}</span>
          <span class="chat-text">${esc(m.text)}</span>
        `;
                box.appendChild(el);
                box.scrollTop = box.scrollHeight;
            });
        });

        window._sendChat = async function () {
            const inp = document.getElementById('chatInput');
            const text = inp.value.trim();
            if (!text || !uid) return;
            inp.value = '';
            try {
                await addDoc(chatRef, { uid, name: displayName, text, ts: serverTimestamp() });
            } catch (e) { console.error('chat error', e); }
        };

        // Allow Enter key
        document.getElementById('chatInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window._sendChat(); }
        });

        // ────────────────────────────────────────────────────────────────────────────
        // Reactions (floating emojis)
        // ────────────────────────────────────────────────────────────────────────────
        const EMOJIS = ['❤️', '🔥', '👏', '😍', '🎉', '💯'];
        document.querySelectorAll('.react-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const emoji = btn.dataset.emoji;
                floatEmoji(emoji);
                // Write to Firestore reactions sub-collection (best-effort)
                try {
                    addDoc(collection(db, 'live_sessions', sessionId, 'reactions'),
                        { emoji, uid, ts: serverTimestamp() });
                } catch (_) { }
            });
        });

        function floatEmoji(emoji) {
            const el = document.createElement('div');
            el.className = 'float-emoji';
            el.textContent = emoji;
            el.style.left = (20 + Math.random() * 40) + '%';
            document.getElementById('reactionsAnchor').appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }

        // Listen for others' reactions
        const reactQ = query(collection(db, 'live_sessions', sessionId, 'reactions'),
            orderBy('ts', 'desc'), limit(10));
        onCol(reactQ, (snap) => {
            snap.docChanges().forEach(change => {
                if (change.type === 'added' && change.doc.data().uid !== uid) {
                    floatEmoji(change.doc.data().emoji);
                }
            });
        });

        // ────────────────────────────────────────────────────────────────────────────
        // Utilities
        // ────────────────────────────────────────────────────────────────────────────
        function setStatus(status) {
            currentStatus = status;
            const states = { live: '', waiting: 'waiting', ended: 'ended', error: 'error', notfound: 'notfound' };
            ['waitingBox', 'endedBox', 'errorBox'].forEach(id =>
                document.getElementById(id).style.display = 'none');
            if (status === 'waiting') document.getElementById('waitingBox').style.display = 'flex';
            if (status === 'ended') document.getElementById('endedBox').style.display = 'flex';
            if (status === 'error' || status === 'notfound')
                document.getElementById('errorBox').style.display = 'flex';

            const badge = document.getElementById('liveBadge');
            badge.className = status === 'live' ? 'badge live-badge' : 'badge waiting-badge';
            badge.textContent = status === 'live' ? '● LIVE' : status === 'ended' ? '● สิ้นสุด' : '● รอสักครู่';
        }

        function esc(s) {
            return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        // Handle play button overlay
        document.getElementById('playOverlay').addEventListener('click', () => {
            video.play();
            document.getElementById('playOverlay').style.display = 'none';
        });

        // Decrement viewer count on unload
        window.addEventListener('beforeunload', () => {
            if (viewerRegistered) {
                try { updateDoc(sessionRef, { viewerCount: increment(-1) }); } catch (_) { }
            }
        });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --red: #ef4444;
            --orange: #f97316;
            --bg: #050510;
            --panel: rgba(15, 15, 35, 0.92);
            --glass: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f0f0f8;
            --muted: #6b7280;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── Top Bar ────────────────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: linear-gradient(to bottom, #000 0%, transparent 100%);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 30;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .live-badge {
            background: var(--red);
            color: #fff;
            animation: pulseBadge 1.4s infinite;
        }

        .waiting-badge {
            background: rgba(255, 255, 255, .15);
            color: #aaa;
        }

        @keyframes pulseBadge {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, .6);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
            }
        }

        .viewer-pill {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .eye-icon {
            width: 14px;
            height: 14px;
            fill: #aaa;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px 10px;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
        }

        /* ─── Main Layout ─────────────────────────────────────── */
        .layout {
            display: flex;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        /* ─── Video Side ──────────────────────────────────────── */
        .video-side {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
        }

        #liveVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Overlay boxes centered on video */
        .overlay-box {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            z-index: 10;
            text-align: center;
            padding: 24px;
            gap: 12px;
        }

        .overlay-box .icon {
            font-size: 3rem;
        }

        .overlay-box h3 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .overlay-box p {
            color: var(--muted);
            font-size: 0.9rem;
        }

        #playOverlay {
            cursor: pointer;
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            z-index: 20;
        }

        .play-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        /* Bottom metadata bar */
        .meta-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(to top, rgba(0, 0, 0, .85) 0%, transparent 100%);
            display: flex;
            align-items: flex-end;
            gap: 12px;
            z-index: 10;
        }

        .author-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--red);
            object-fit: cover;
            flex-shrink: 0;
        }

        .meta-text {
            flex: 1;
            overflow: hidden;
        }

        .meta-title {
            font-size: 0.95rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta-author {
            font-size: 0.75rem;
            color: #ccc;
        }

        .type-tag {
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 2px 8px;
            color: #ddd;
        }

        /* Floating reactions anchor */
        #reactionsAnchor {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            height: 200px;
            pointer-events: none;
            overflow: hidden;
            z-index: 15;
        }

        .float-emoji {
            position: absolute;
            bottom: 0;
            font-size: 1.8rem;
            animation: floatUp 2.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-200px) scale(0.5);
                opacity: 0;
            }
        }

        /* ─── Chat Side Panel ─────────────────────────────────── */
        .chat-side {
            width: 320px;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        .chat-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .chat-msg {
            display: flex;
            gap: 6px;
            font-size: 0.82rem;
            line-height: 1.4;
            animation: fadeIn .2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
            }
        }

        .chat-name {
            color: #a78bfa;
            font-weight: 700;
            flex-shrink: 0;
        }

        .chat-text {
            color: #e5e7eb;
            word-break: break-word;
        }

        /* Reaction buttons */
        .react-strip {
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .react-btn {
            font-size: 1.3rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            padding: 4px 8px;
            transition: transform 0.15s, background 0.15s;
        }

        .react-btn:hover {
            transform: scale(1.3);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Chat input */
        .chat-input-row {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }

        #chatInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 14px;
            color: #fff;
            font-family: 'Kanit', sans-serif;
            font-size: 0.85rem;
            outline: none;
        }

        #chatInput:focus {
            border-color: rgba(167, 139, 250, 0.6);
        }

        #chatInput::placeholder {
            color: var(--muted);
        }

        .send-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 12px;
            padding: 8px 14px;
            color: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            transition: opacity 0.2s;
        }

        .send-btn:hover {
            opacity: 0.85;
        }

        /* ─── Mobile: stack video on top, chat on bottom ────── */
        @media (max-width: 768px) {
            body {
                overflow: auto;
            }

            .layout {
                flex-direction: column;
                height: auto;
            }

            .video-side {
                aspect-ratio: 9/16;
                width: 100%;
                flex: none;
            }

            #liveVideo {
                object-fit: contain;
            }

            .chat-side {
                width: 100%;
                height: 350px;
            }
        }
    </style>
</head>

<body>
    <div class="layout">

        <!-- ── Video Side ────────────────────────────────────────── -->
        <div class="video-side">

            <!-- Top bar -->
            <div class="topbar">
                <a href="/" class="back-btn">‹</a>
                <span class="logo">TukTuk</span>
                <span id="liveBadge" class="badge waiting-badge">● รอสักครู่</span>
                <div class="viewer-pill">
                    <svg class="eye-icon" viewBox="0 0 24 24">
                        <path
                            d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z" />
                    </svg>
                    <span id="viewerEl">0</span>
                </div>
            </div>

            <!-- Live video -->
            <video id="liveVideo" playsinline muted></video>

            <!-- Play overlay (autoplay blocked) -->
            <div id="playOverlay">
                <div class="play-circle">▶</div>
            </div>

            <!-- Waiting overlay -->
            <div class="overlay-box" id="waitingBox" style="display:flex">
                <div class="icon">📡</div>
                <h3>กำลังรอ Stream...</h3>
                <p>ผู้ไลฟ์กำลังเตรียมระบบ<br>วิดีโอจะเริ่มเล่นอัตโนมัติ</p>
                <div style="margin-top:8px;display:flex;gap:4px">
                    <div
                        style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:dotBounce .8s 0s infinite alternate">
                    </div>
                    <div
                        style="width:8px;height:8px;border-radius:50%;background:#a855f7;animation:dotBounce .8s .2s infinite alternate">
                    </div>
                    <div
                        style="width:8px;height:8px;border-radius:50%;background:#c084fc;animation:dotBounce .8s .4s infinite alternate">
                    </div>
                </div>
            </div>

            <!-- Ended overlay -->
            <div class="overlay-box" id="endedBox">
                <div class="icon">✅</div>
                <h3>ไลฟ์สิ้นสุดแล้ว</h3>
                <p>ขอบคุณที่รับชม TukTuk Live</p>
                <a href="/"
                    style="margin-top:12px;padding:8px 24px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;text-decoration:none;font-weight:700">กลับหน้าหลัก</a>
            </div>

            <!-- Error overlay -->
            <div class="overlay-box" id="errorBox">
                <div class="icon">⚠️</div>
                <h3>เกิดข้อผิดพลาด</h3>
                <p>ไม่สามารถเชื่อมต่อ Live Stream ได้</p>
            </div>

            <!-- Floating reactions anchor -->
            <div id="reactionsAnchor"></div>

            <!-- Meta bar -->
            <div class="meta-bar">
                <img id="authorPic" class="author-avatar"
                    src="https://ui-avatars.com/api/?name=TukTuk&background=7c3aed&color=fff"
                    onerror="this.src='https://ui-avatars.com/api/?name=TukTuk&background=7c3aed&color=fff'">
                <div class="meta-text">
                    <div class="meta-title" id="titleEl">กำลังโหลด...</div>
                    <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
                        <span class="meta-author" id="authorEl"></span>
                        <span class="type-tag" id="typeEl"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Chat Side ─────────────────────────────────────────── -->
        <div class="chat-side">
            <div class="chat-header">
                💬 แชทสด &nbsp;<span style="font-weight:400;color:var(--muted);font-size:0.75rem">Real-time</span>
            </div>

            <div id="chatBox">
                <div class="chat-msg">
                    <span class="chat-name">TukTuk</span>
                    <span class="chat-text">ยินดีต้อนรับสู่ TukTuk Live! 🎉</span>
                </div>
            </div>

            <!-- Reaction strip -->
            <div class="react-strip">
                <button class="react-btn" data-emoji="❤️">❤️</button>
                <button class="react-btn" data-emoji="🔥">🔥</button>
                <button class="react-btn" data-emoji="👏">👏</button>
                <button class="react-btn" data-emoji="😍">😍</button>
                <button class="react-btn" data-emoji="🎉">🎉</button>
                <button class="react-btn" data-emoji="💯">💯</button>
            </div>

            <!-- Chat input -->
            <div class="chat-input-row">
                <input id="chatInput" type="text" placeholder="พิมพ์ข้อความ..." maxlength="200">
                <button class="send-btn" onclick="window._sendChat()">➤</button>
            </div>
        </div>

    </div>

    <style>
        @keyframes dotBounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-8px);
            }
        }
    </style>
</body>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ข้อความ — TukTuk Thailand</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0f1e;
      --surface:   #111827;
      --surface2:  #1e293b;
      --border:    rgba(255,255,255,0.07);
      --text:      #f1f5f9;
      --text-dim:  #64748b;
      --text-sub:  #94a3b8;
      --blue:      #3b82f6;
      --blue-dark: #1d4ed8;
      --cyan:      #22d3ee;
      --green:     #22c55e;
      --red:       #ef4444;
      --purple:    #a855f7;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Kanit', sans-serif; }

    /* ══ App shell ══════════════════════════════════════════════════ */
    #app { display: flex; flex-direction: column; height: 100%; }
    #loginWrap { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; padding: 32px; text-align: center; }
    #mainWrap  { display: none; flex-direction: column; height: 100%; overflow: hidden; }

    /* ══ Top bar ════════════════════════════════════════════════════ */
    .topbar {
      background: rgba(10,15,30,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-t) + 10px) 14px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-height: calc(var(--safe-t) + 56px);
      position: relative;
      z-index: 100;
    }
    .topbar-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text-sub);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; flex-shrink: 0;
      transition: all 0.2s;
    }
    .topbar-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.12); }
    .topbar-title {
      flex: 1; font-size: 1.05rem; font-weight: 700;
      background: linear-gradient(120deg, #38bdf8, #818cf8);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .unread-pill {
      background: var(--red); color: #fff;
      border-radius: 99px; font-size: 0.72rem;
      padding: 2px 8px; font-weight: 700;
    }
    .new-chat-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(59,130,246,0.35);
      transition: all 0.2s;
    }
    .new-chat-btn:active { transform: scale(0.88); }

    /* ══ Layout split ════════════════════════════════════════════════ */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ══ Sidebar ════════════════════════════════════════════════════ */
    .sidebar {
      width: 340px; min-width: 340px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    @media (max-width: 767px) {
      .sidebar {
        position: absolute;
        inset: 0;
        width: 100%; min-width: 100%;
        z-index: 20;
      }
      .sidebar.slide-out { transform: translateX(-100%); }
      .chat-panel { position: absolute; inset: 0; z-index: 10; }
      .chat-panel.slide-out { transform: translateX(100%); }
    }
    .chat-panel {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    /* ── Sidebar header ── */
    .sb-head { padding: 16px 16px 0; }
    .sb-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .tab-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .tab-btn {
      flex: 1; padding: 8px 6px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Kanit', sans-serif;
      font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s;
      position: relative;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #1e40af, #1d4ed8);
      border-color: #3b82f6;
      color: #fff; font-weight: 600;
      box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }
    .tab-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--red); color: #fff;
      border-radius: 99px; font-size: 0.68rem;
      padding: 1px 5px; min-width: 16px;
      border: 1.5px solid var(--bg);
    }
    .search-wrap { position: relative; margin-bottom: 4px; }
    .search-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-family: 'Kanit', sans-serif;
      font-size: 0.88rem;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { outline: none; border-color: var(--blue); background: rgba(59,130,246,0.05); }
    .search-wrap .si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; }

    /* ── Conv list ── */
    .conv-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .conv-list::-webkit-scrollbar { width: 3px; }
    .conv-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .conv-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .conv-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 0 2px 2px 0;
      background: transparent; transition: background 0.2s;
    }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.active { background: rgba(59,130,246,0.08); }
    .conv-item.active::before { background: var(--blue); }

    .av-wrap { position: relative; flex-shrink: 0; }
    .av {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.05rem; color: #fff;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .av img { width: 100%; height: 100%; object-fit: cover; }
    .online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--green);
      border: 2px solid var(--surface);
    }

    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-weight: 600; font-size: 0.93rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-sub  { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
    .prod-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.72rem;
      background: rgba(14,165,233,0.12);
      color: #38bdf8;
      border-radius: 6px; padding: 2px 6px; margin-top: 3px;
      max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .conv-meta { text-align: right; flex-shrink: 0; }
    .conv-time { font-size: 0.72rem; color: var(--text-dim); }
    .unread-dot {
      background: var(--blue); color: #fff;
      border-radius: 99px; font-size: 0.7rem;
      padding: 2px 7px; margin-top: 5px;
      display: inline-block; font-weight: 700;
      min-width: 20px; text-align: center;
    }

    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-dim); }
    .empty-state i { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    /* ══ Chat panel ══════════════════════════════════════════════════ */
    .chat-welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-dim); gap: 12px;
      background: radial-gradient(circle at 50% 40%, rgba(59,130,246,0.04) 0%, transparent 60%);
    }
    .chat-welcome .wlc-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(168,85,247,0.12));
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin-bottom: 4px;
    }
    .chat-welcome h5 { color: var(--text-sub); font-weight: 600; }
    .chat-welcome p  { font-size: 0.85rem; color: var(--text-dim); }

    /* ── Chat header ── */
    .chat-head {
      background: rgba(17,24,39,0.96);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; min-height: 60px;
    }
    .chat-head .back-btn {
      display: none;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text-sub); align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; flex-shrink: 0;
      transition: all 0.2s;
    }
    @media (max-width: 767px) { .chat-head .back-btn { display: flex; } }
    .chat-head .back-btn:active { transform: scale(0.88); }
    .ch-av {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.95rem; color: #fff;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .ch-av img { width: 100%; height: 100%; object-fit: cover; }
    .ch-info { flex: 1; min-width: 0; }
    .ch-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-status { font-size: 0.75rem; color: var(--text-dim); margin-top: 1px; }
    .ch-status.online { color: var(--green); }
    .ch-actions { display: flex; gap: 6px; }
    .ch-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text-sub); display: flex; align-items: center; justify-content: center;
      font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .ch-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.1); }

    /* Accept banner */
    .accept-banner {
      background: linear-gradient(135deg, #1e3a8a, #1d4ed8);
      padding: 10px 16px; display: flex; align-items: center; gap: 12px;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .accept-btn {
      background: #fff; color: #1d4ed8; border: none;
      border-radius: 10px; padding: 6px 16px;
      font-family: 'Kanit', sans-serif; font-weight: 700;
      font-size: 0.82rem; cursor: pointer; flex-shrink: 0;
      transition: all 0.2s;
    }
    .accept-btn:active { transform: scale(0.94); }

    /* Product strip */
    .prod-strip {
      background: rgba(14,165,233,0.07);
      border-bottom: 1px solid rgba(14,165,233,0.15);
      padding: 10px 16px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; cursor: pointer;
    }
    .prod-strip img { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .prod-strip-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prod-strip-price { font-size: 0.78rem; color: var(--cyan); margin-top: 1px; }

    /* ── Messages ── */
    .msgs-area {
      flex: 1; overflow-y: auto;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    .msgs-area::-webkit-scrollbar { width: 3px; }
    .msgs-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 2px; }

    .date-sep {
      text-align: center; font-size: 0.72rem; color: var(--text-dim);
      margin: 10px 0 6px; display: flex; align-items: center; gap: 8px;
    }
    .date-sep::before, .date-sep::after { content:''; flex:1; height:1px; background: var(--border); }

    .msg-row { display: flex; align-items: flex-end; gap: 7px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-row + .msg-row { margin-top: 2px; }
    .msg-row.mine + .msg-row.mine .msg-avatar { visibility: hidden; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0; align-self: flex-end;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .msg-col { display: flex; flex-direction: column; max-width: 70%; }
    .msg-row.mine .msg-col { align-items: flex-end; }

    .msg-bubble {
      background: var(--surface2);
      border-radius: 18px 18px 18px 4px;
      padding: 9px 13px;
      font-size: 0.9rem; line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: relative;
    }
    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 4px 12px rgba(29,78,216,0.35);
    }
    .msg-bubble img { max-width: 100%; border-radius: 10px; display: block; }

    .msg-meta {
      font-size: 0.67rem; color: var(--text-dim);
      margin-top: 3px; display: flex; align-items: center; gap: 4px;
    }
    .msg-row.mine .msg-meta { justify-content: flex-end; }
    .msg-read { color: var(--cyan); }

    /* Typing */
    .typing-wrap { padding: 0 14px 6px; min-height: 30px; flex-shrink: 0; }
    .typing-row { display: flex; align-items: center; gap: 8px; }
    .typing-av {
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; color: #fff; flex-shrink: 0;
    }
    .typing-bubble {
      background: var(--surface2);
      border-radius: 14px 14px 14px 4px;
      padding: 8px 12px; display: flex; gap: 4px; align-items: center;
    }
    .t-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim); animation: tdot 1.2s infinite;
    }
    .t-dot:nth-child(2) { animation-delay: 0.2s; }
    .t-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,60%,100%{ transform:translateY(0); opacity:0.5; } 30%{ transform:translateY(-5px); opacity:1; } }

    /* ── Input ── */
    .input-bar {
      background: rgba(17,24,39,0.97);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-b));
      display: flex; align-items: flex-end; gap: 8px;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      display: flex; align-items: flex-end;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--blue); background: rgba(59,130,246,0.05); }
    .input-wrap textarea {
      flex: 1; background: transparent; border: none;
      padding: 10px 14px; color: var(--text);
      font-family: 'Kanit', sans-serif; font-size: 0.93rem;
      resize: none; max-height: 120px;
      line-height: 1.4; overflow-y: auto;
    }
    .input-wrap textarea:focus { outline: none; }
    .input-wrap textarea::placeholder { color: var(--text-dim); }
    .attach-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: transparent; border: none; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer; flex-shrink: 0;
      align-self: flex-end; margin-bottom: 4px; padding: 0;
      transition: color 0.2s;
    }
    .attach-btn:active { color: var(--blue); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none; color: #fff; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(59,130,246,0.4);
      transition: all 0.2s; align-self: flex-end;
    }
    .send-btn:active { transform: scale(0.88); box-shadow: none; }
    .send-btn:disabled { background: var(--surface2); box-shadow: none; color: var(--text-dim); cursor: not-allowed; }

    /* Quick replies */
    .quick-replies {
      display: flex; gap: 6px; overflow-x: auto; padding: 0 12px 8px;
      flex-shrink: 0; scrollbar-width: none;
    }
    .quick-replies::-webkit-scrollbar { display: none; }
    .qr-chip {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 99px; padding: 6px 14px;
      font-size: 0.8rem; color: #93c5fd;
      white-space: nowrap; cursor: pointer;
      font-family: 'Kanit', sans-serif;
      transition: all 0.2s; flex-shrink: 0;
    }
    .qr-chip:active { background: rgba(59,130,246,0.25); transform: scale(0.94); }

    /* ══ Scroll-to-bottom FAB ════════════════════════════════════════ */
    #scrollFab {
      position: absolute; bottom: 80px; right: 14px;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-sub); display: none; align-items: center;
      justify-content: center; font-size: 14px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 50; transition: all 0.2s;
    }

    /* ══ Login prompt ═══════════════════════════════════════════════ */
    .lp-icon { font-size: 3rem; color: var(--text-dim); margin-bottom: 8px; }
    .lp-title { font-size: 1.1rem; font-weight: 700; }
    .lp-sub { font-size: 0.88rem; color: var(--text-dim); }
    .lp-btn {
      margin-top: 8px; background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; border: none; border-radius: 14px;
      padding: 12px 32px; font-size: 0.95rem;
      font-family: 'Kanit', sans-serif; font-weight: 700;
      cursor: pointer; box-shadow: 0 8px 24px rgba(59,130,246,0.35);
    }
    .home-btn {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text-sub); border-radius: 12px;
      padding: 10px 24px; font-size: 0.88rem;
      font-family: 'Kanit', sans-serif;
      cursor: pointer;
    }

    /* ══ Optimistic message ═════════════════════════════════════════ */
    .msg-bubble.optimistic { opacity: 0.7; }

    /* ══ Transition overlay (mobile swipe) ══════════════════════════ */
    #swipeOverlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0); z-index: 30;
      touch-action: none;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Login prompt -->
  <div id="loginWrap">
    <div class="lp-icon"><i class="fas fa-comment-dots"></i></div>
    <div class="lp-title">ข้อความ</div>
    <div class="lp-sub">กรุณาเข้าสู่ระบบเพื่อดูและส่งข้อความ</div>
    <button class="lp-btn" onclick="location.href='/login.html?redirectUrl=%2Fmessages.html'">เข้าสู่ระบบ</button>
    <button class="home-btn" onclick="_goHome()"><i class="fas fa-home"></i> กลับหน้าหลัก</button>
  </div>

  <!-- Main app -->
  <div id="mainWrap">

    <!-- Top bar -->
    <div class="topbar">
      <button class="topbar-btn" onclick="_goHome()" title="หน้าหลัก">
        <i class="fas fa-arrow-left"></i>
      </button>
      <span class="topbar-title"><i class="fas fa-comment-dots" style="font-size:0.85em;margin-right:6px;opacity:0.7;"></i>ข้อความ</span>
      <span id="totalBadge" class="unread-pill" style="display:none;"></span>
      <button class="new-chat-btn" onclick="_newChatSheet()" title="ข้อความใหม่">
        <i class="fas fa-edit"></i>
      </button>
    </div>

    <!-- Layout -->
    <div class="layout" id="layout">

      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sb-head">
          <div class="sb-title">
            <span>บทสนทนา</span>
          </div>
          <div class="tab-row">
            <button class="tab-btn active" id="tabDM" onclick="switchTab('dm')">
              <i class="fas fa-user" style="margin-right:4px;font-size:0.8em;"></i>ส่วนตัว
              <span class="tab-badge" id="dmBadge" style="display:none;"></span>
            </button>
            <button class="tab-btn" id="tabProd" onclick="switchTab('product')">
              <i class="fas fa-box" style="margin-right:4px;font-size:0.8em;"></i>สินค้า
              <span class="tab-badge" id="prodBadge" style="display:none;"></span>
            </button>
          </div>
          <div class="search-wrap">
            <i class="fas fa-search si"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาบทสนทนา..." oninput="filterConvs(this.value)">
          </div>
        </div>
        <div class="conv-list" id="convList">
          <div class="empty-state">
            <div style="font-size:1.5rem;margin-bottom:8px;opacity:0.3;">💬</div>
            <p>กำลังโหลด...</p>
          </div>
        </div>
      </div>

      <!-- Chat panel -->
      <div class="chat-panel slide-out" id="chatPanel">

        <!-- Welcome state -->
        <div class="chat-welcome" id="chatWelcome" style="flex:1;display:flex;">
          <div class="wlc-icon">💬</div>
          <h5>เลือกบทสนทนา</h5>
          <p>เลือกจากรายการด้านซ้ายเพื่อเริ่มแชท</p>
        </div>

        <!-- Active chat -->
        <div id="activeChat" style="display:none;flex-direction:column;height:100%;">

          <!-- Chat header -->
          <div class="chat-head">
            <button class="back-btn" onclick="showSidebar()">
              <i class="fas fa-arrow-left"></i>
            </button>
            <div class="ch-av" id="chAv"><span id="chLetter">?</span></div>
            <div class="ch-info">
              <div class="ch-name" id="chName">—</div>
              <div class="ch-status" id="chStatus">—</div>
            </div>
            <div class="ch-actions">
              <button class="ch-btn" onclick="_shareChat()" title="แชร์"><i class="fas fa-share-alt"></i></button>
              <button class="ch-btn" onclick="_chatMenu()" title="เพิ่มเติม"><i class="fas fa-ellipsis-v"></i></button>
            </div>
          </div>

          <!-- Accept banner -->
          <div class="accept-banner" id="acceptBanner" style="display:none;">
            <i class="fas fa-user-plus"></i>
            <span style="flex:1;">ต้องการส่งข้อความหาคุณ</span>
            <button class="accept-btn" onclick="doAccept()">ยอมรับ</button>
          </div>

          <!-- Product strip -->
          <div class="prod-strip" id="prodStrip" style="display:none;" onclick="_openProduct()">
            <img id="prodImg" src="" alt="product" onerror="this.style.display='none'">
            <div style="flex:1;min-width:0;">
              <div class="prod-strip-name" id="prodName">สินค้า</div>
              <div class="prod-strip-price" id="prodPrice"></div>
            </div>
            <i class="fas fa-chevron-right" style="color:var(--text-dim);font-size:0.8rem;"></i>
          </div>

          <!-- Messages -->
          <div class="msgs-area" id="msgsArea"></div>

          <!-- Typing -->
          <div class="typing-wrap">
            <div id="typingRow" class="typing-row" style="display:none;">
              <div class="typing-av" id="typingAv">?</div>
              <div class="typing-bubble">
                <div class="t-dot"></div>
                <div class="t-dot"></div>
                <div class="t-dot"></div>
              </div>
            </div>
          </div>

          <!-- Quick replies -->
          <div class="quick-replies" id="quickReplies" style="display:none;">
            <div class="qr-chip" onclick="_useQR('สนใจสินค้าครับ')">สนใจสินค้าครับ</div>
            <div class="qr-chip" onclick="_useQR('ราคาเท่าไหร่ครับ?')">ราคาเท่าไหร่?</div>
            <div class="qr-chip" onclick="_useQR('ส่งได้เมื่อไหร่ครับ?')">ส่งได้เมื่อไหร่?</div>
            <div class="qr-chip" onclick="_useQR('ขอบคุณครับ 🙏')">ขอบคุณครับ 🙏</div>
            <div class="qr-chip" onclick="_useQR('โอนแล้วนะครับ')">โอนแล้วนะครับ</div>
          </div>

          <!-- Input bar -->
          <div class="input-bar">
            <div class="input-wrap">
              <button class="attach-btn" onclick="_attachFile()"><i class="fas fa-image"></i></button>
              <textarea id="msgInput" placeholder="พิมพ์ข้อความ..." rows="1"
                oninput="autoResize(this);onTyping();" onkeydown="handleKey(event)"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMsg()">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>

        <!-- Scroll FAB -->
        <div id="scrollFab" onclick="_scrollBottom()"><i class="fas fa-chevron-down"></i></div>
      </div>

      <!-- Swipe overlay (mobile) -->
      <div id="swipeOverlay"></div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script src="/js/liff-config.js"></script>
<script src="/js/chat-web.js"></script>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let _sess = null, _tab = 'dm';
let _allDM = [], _allProd = [];
let _activeId = null, _activeCol = null, _activeOther = null;
let _unsubMsgs = null, _unsubOnline = null, _unsubTyping = null;
let _profileCache = {};
let _currentProd = null;
let _isMobile = () => window.innerWidth < 768;

// ── Navigation ───────────────────────────────────────────────────────────────
function _goHome() {
  if (history.length > 1) {
    history.back();
  } else {
    location.href = '/';
  }
}

// Handle hardware back button / browser back on mobile
window.addEventListener('popstate', e => {
  if (_isMobile() && _activeId) {
    e.preventDefault();
    showSidebar();
  }
});

// ── Auth init ────────────────────────────────────────────────────────────────
firebase.auth().onAuthStateChanged(async (user) => {
  const raw = localStorage.getItem('tuktuk_line_session') ||
              localStorage.getItem('tuktuk_session') ||
              localStorage.getItem('wizmobiz_session');
  let saved = null;
  try { saved = raw ? JSON.parse(raw) : null; } catch(_) {}

  const uid = user?.uid || saved?.uid || saved?.lineUserId;
  if (!uid) {
    document.getElementById('loginWrap').style.display = 'flex';
    return;
  }

  _sess = {
    uid,
    displayName: user?.displayName || saved?.displayName || saved?.name || 'ผู้ใช้',
    photoURL:    user?.photoURL    || saved?.photoURL    || saved?.pictureUrl || '',
  };

  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainWrap').style.display  = 'flex';

  TukTukChat.setOnline(uid);
  _startListeners();
  _handleDeepLink();
});

// ── Listeners ────────────────────────────────────────────────────────────────
function _startListeners() {
  const uid = _sess.uid;

  TukTukChat.listenConversations(uid, convs => {
    _allDM = convs;
    if (_tab === 'dm') renderList();
    _updateBadge('dm');
  });

  TukTukChat.listenProductChats(uid, chats => {
    _allProd = chats;
    if (_tab === 'product') renderList();
    _updateBadge('product');
  });

  TukTukChat.listenTotalUnread(uid, n => {
    const el = document.getElementById('totalBadge');
    if (n > 0) { el.textContent = n > 99 ? '99+' : n; el.style.display = 'inline'; }
    else el.style.display = 'none';
    // Sync App Badge
    if (window.TukTukNotify) window.TukTukNotify.setBadge(n);
  });
}

// ── Deep link ─────────────────────────────────────────────────────────────────
function _handleDeepLink() {
  const p = new URLSearchParams(location.search);
  const convId = p.get('id') || p.get('convId');
  const uid2   = p.get('uid');
  const col    = p.get('type') === 'product' ? TukTukChat.PROD : TukTukChat.CONV;
  if (convId) {
    openChat(convId, col);
  } else if (uid2 && uid2 !== _sess.uid) {
    TukTukChat.getOrCreateConversation(_sess.uid, uid2).then(cid => openChat(cid, TukTukChat.CONV));
  }
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(tab) {
  _tab = tab;
  document.getElementById('tabDM').classList.toggle('active', tab === 'dm');
  document.getElementById('tabProd').classList.toggle('active', tab !== 'dm');
  renderList();
}

function filterConvs(q) { renderList(q.toLowerCase()); }

// ── Badge ─────────────────────────────────────────────────────────────────────
function _updateBadge(type) {
  const uid = _sess?.uid;
  if (type === 'dm') {
    const n = _allDM.reduce((s, c) => s + (c[`unreadCount_${uid}`] || 0), 0);
    const el = document.getElementById('dmBadge');
    if (n > 0) { el.textContent = n; el.style.display = 'inline'; } else el.style.display = 'none';
  } else {
    const n = _allProd.reduce((s, c) => s + (c.buyerId === uid ? c.unreadCountBuyer : c.unreadCountSeller || 0), 0);
    const el = document.getElementById('prodBadge');
    if (n > 0) { el.textContent = n; el.style.display = 'inline'; } else el.style.display = 'none';
  }
}

// ── Render list ───────────────────────────────────────────────────────────────
async function renderList(q = '') {
  const uid  = _sess.uid;
  const list = _tab === 'dm' ? _allDM : _allProd;
  const box  = document.getElementById('convList');

  if (!list.length) {
    box.innerHTML = `<div class="empty-state">
      <i class="fas fa-comment-slash"></i>
      <p style="margin-top:8px;">ยังไม่มีบทสนทนา</p>
      <p style="font-size:0.78rem;margin-top:4px;opacity:0.6;">เริ่มแชทจากหน้าสินค้าหรือโพสต์</p>
    </div>`;
    return;
  }

  const items = await Promise.all(list.map(async conv => {
    let otherUid, name, avatar, prod = null;
    if (_tab === 'dm') {
      otherUid = (conv.participants || []).find(p => p !== uid) || '';
      const pr = await _profile(otherUid);
      name   = pr?.displayName || pr?.name || otherUid.slice(0,8) + '...';
      avatar = pr?.photoURL || pr?.pictureUrl || '';
    } else {
      otherUid = conv.buyerId === uid ? (conv.sellerId || conv.lineUserId) : conv.buyerId;
      const pr = await _profile(otherUid);
      name   = pr?.displayName || pr?.name || otherUid.slice(0,8) + '...';
      avatar = pr?.photoURL || pr?.pictureUrl || '';
      prod   = conv.productName ? { name: conv.productName, img: conv.productImageUrl } : null;
    }
    if (q && !name.toLowerCase().includes(q) && !(conv.lastMessage||'').toLowerCase().includes(q)) return null;
    const unread = _tab === 'dm'
      ? (conv[`unreadCount_${uid}`] || 0)
      : (conv.buyerId === uid ? conv.unreadCountBuyer : conv.unreadCountSeller) || 0;
    const lastAt = conv.lastMessageAt?.toDate?.() || null;
    const col = _tab === 'dm' ? TukTukChat.CONV : TukTukChat.PROD;
    return { conv, otherUid, name, avatar, prod, unread, lastAt, col };
  }));

  const rows = items.filter(Boolean);
  if (!rows.length) {
    box.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><p style="margin-top:8px;">ไม่พบบทสนทนา</p></div>`;
    return;
  }

  box.innerHTML = rows.map(({ conv, otherUid, name, avatar, prod, unread, lastAt, col }) => {
    const letter  = (name||'?')[0].toUpperCase();
    const isActive = _activeId === conv.id;
    const timeStr  = lastAt ? _fmtTime(lastAt) : '';
    const preview  = escHtml((conv.lastMessage||'').slice(0,60));
    const mine     = conv.lastSenderId === _sess.uid;
    return `<div class="conv-item ${isActive?'active':''}" onclick="openChat('${conv.id}','${col}')">
      <div class="av-wrap">
        <div class="av" id="av_${conv.id}">
          ${avatar ? `<img src="${escHtml(avatar)}" onerror="this.style.display='none'">` : ''}
          ${letter}
        </div>
        <div class="online-dot" id="dot_${conv.id}" style="display:none;"></div>
      </div>
      <div class="conv-info">
        <div class="conv-name">${escHtml(name)}</div>
        ${prod ? `<div class="prod-chip">📦 ${escHtml(prod.name)}</div>` : ''}
        <div class="conv-sub">${mine?'คุณ: ':''}${preview||'เริ่มบทสนทนา'}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${timeStr}</div>
        ${unread > 0 ? `<div class="unread-dot">${unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  // Online dots
  rows.forEach(({ conv, otherUid }) => {
    TukTukChat.listenOnlineStatus(otherUid, online => {
      const d = document.getElementById(`dot_${conv.id}`);
      if (d) d.style.display = online ? 'block' : 'none';
    });
  });
}

// ── Open chat ─────────────────────────────────────────────────────────────────
async function openChat(convId, col) {
  if (_unsubMsgs)   _unsubMsgs();
  if (_unsubOnline) _unsubOnline();
  if (_unsubTyping) _unsubTyping();

  _activeId  = convId;
  _activeCol = col;

  document.getElementById('chatWelcome').style.display = 'none';
  document.getElementById('activeChat').style.display  = 'flex';
  document.getElementById('msgsArea').innerHTML =
    '<div style="text-align:center;padding:40px;color:var(--text-dim);">กำลังโหลด...</div>';

  // Mobile: slide chat in
  if (_isMobile()) {
    history.pushState({ chat: convId }, '');
    document.getElementById('sidebar').classList.add('slide-out');
    document.getElementById('chatPanel').classList.remove('slide-out');
  }

  // Quick replies for product chat
  document.getElementById('quickReplies').style.display = col === TukTukChat.PROD ? 'flex' : 'none';

  const snap = await db.collection(col).doc(convId).get();
  const conv = { id: snap.id, ...snap.data() };
  const uid  = _sess.uid;
  let otherUid, name, avatar;

  if (col === TukTukChat.CONV) {
    otherUid = (conv.participants||[]).find(p => p !== uid) || '';
    const pr = await _profile(otherUid);
    name   = pr?.displayName || pr?.name || 'ผู้ใช้';
    avatar = pr?.photoURL || pr?.pictureUrl || '';
    document.getElementById('acceptBanner').style.display =
      (conv.status === 'pending' && conv.requestBy !== uid) ? 'flex' : 'none';
    document.getElementById('prodStrip').style.display = 'none';
    _currentProd = null;
  } else {
    const isBuyer = conv.buyerId === uid;
    otherUid = isBuyer ? (conv.sellerId||conv.lineUserId) : conv.buyerId;
    const pr = await _profile(otherUid);
    name   = pr?.displayName || pr?.name || 'ผู้ใช้';
    avatar = pr?.photoURL || pr?.pictureUrl || '';
    document.getElementById('acceptBanner').style.display = 'none';
    _currentProd = conv.productId || null;
    if (conv.productName) {
      document.getElementById('prodStrip').style.display = 'flex';
      document.getElementById('prodName').textContent  = conv.productName;
      document.getElementById('prodPrice').textContent = conv.price ? `฿${Number(conv.price).toLocaleString()}` : '';
      const img = document.getElementById('prodImg');
      if (conv.productImageUrl) { img.src = conv.productImageUrl; img.style.display = ''; }
      else img.style.display = 'none';
    } else {
      document.getElementById('prodStrip').style.display = 'none';
    }
  }

  _activeOther = otherUid;

  // Header
  document.getElementById('chName').textContent = name;
  const letter = (name||'?')[0].toUpperCase();
  const chAv = document.getElementById('chAv');
  if (avatar) {
    chAv.innerHTML = `<img src="${escHtml(avatar)}" onerror="this.innerHTML='${letter}';this.style.fontSize='0.95rem';">`;
  } else {
    chAv.innerHTML = letter;
  }
  document.getElementById('chLetter').textContent = letter;

  // Typing indicator avatar
  document.getElementById('typingAv').textContent = letter;

  // Online
  _unsubOnline = TukTukChat.listenOnlineStatus(otherUid, online => {
    const s = document.getElementById('chStatus');
    s.textContent = online ? 'ออนไลน์' : 'ออฟไลน์';
    s.className   = `ch-status ${online ? 'online' : ''}`;
    document.getElementById(`dot_${convId}`)?.style && null;
  });

  // Typing
  _unsubTyping = db.collection(col).doc(convId).onSnapshot(snap => {
    const typing = snap.data()?.typing || {};
    const tr = document.getElementById('typingRow');
    tr.style.display = typing[otherUid] ? 'flex' : 'none';
  });

  // Messages
  _unsubMsgs = TukTukChat.listenMessages(convId, col, msgs => {
    renderMsgs(msgs);
    TukTukChat.markAsRead(convId, col, uid);
  });

  renderList();
  document.getElementById('msgInput').focus();
}

// ── Render messages ───────────────────────────────────────────────────────────
function renderMsgs(msgs) {
  const area = document.getElementById('msgsArea');
  const uid  = _sess.uid;
  const fab  = document.getElementById('scrollFab');

  if (!msgs.length) {
    area.innerHTML = `<div class="empty-state" style="flex:1;justify-content:center;">
      <i class="fas fa-comments"></i>
      <p style="margin-top:8px;">เริ่มบทสนทนาแรก!</p>
    </div>`;
    return;
  }

  let html = '', lastDate = '', prevSender = '';
  msgs.forEach((msg, i) => {
    const mine  = msg.senderId === uid;
    const ts    = msg.timestamp?.toDate?.() || msg.sentAt?.toDate?.() || new Date();
    const date  = ts.toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' });
    const time  = ts.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
    const letter= (msg.senderName||msg.senderId||'?')[0].toUpperCase();
    const isRead= msg.status === 'read';
    const sameSndr = msg.senderId === prevSender;

    if (date !== lastDate) {
      html += `<div class="date-sep">${date}</div>`;
      lastDate = date; prevSender = '';
    }

    const showAv = !mine && !sameSndr;
    html += `<div class="msg-row ${mine?'mine':''}" ${sameSndr&&!mine?'style="margin-top:1px;"':''}>
      ${!mine ? `<div class="msg-avatar" style="visibility:${showAv?'visible':'hidden'};">
        ${msg.senderAvatar ? `<img src="${escHtml(msg.senderAvatar)}" onerror="this.style.display='none';">${letter}` : letter}
      </div>` : ''}
      <div class="msg-col">
        <div class="msg-bubble">${_linkify(escHtml(msg.text||''))}</div>
        <div class="msg-meta">
          <span>${time}</span>
          ${mine ? `<span class="${isRead?'msg-read':''}">${isRead?'✓✓':'✓'}</span>` : ''}
        </div>
      </div>
    </div>`;
    prevSender = msg.senderId;
  });

  const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
  area.innerHTML = html;
  if (atBottom) {
    area.scrollTop = area.scrollHeight;
    fab.style.display = 'none';
  } else {
    fab.style.display = 'flex';
  }
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMsg() {
  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || !_activeId) return;

  inp.value = ''; autoResize(inp);
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('quickReplies').style.display = 'none';

  // Optimistic
  const area  = document.getElementById('msgsArea');
  const optId = `opt_${Date.now()}`;
  const optEl = document.createElement('div');
  optEl.id    = optId;
  optEl.className = 'msg-row mine';
  optEl.innerHTML = `<div class="msg-col">
    <div class="msg-bubble optimistic">${escHtml(text)}</div>
    <div class="msg-meta"><span>กำลังส่ง...</span></div>
  </div>`;
  area.appendChild(optEl);
  area.scrollTop = area.scrollHeight;

  try {
    await TukTukChat.sendMessage(_activeId, _activeCol, text, _sess);
    TukTukChat.setTyping(_activeId, _activeCol, _sess.uid, false);
    optEl.remove();
  } catch (e) {
    inp.value = text;
    optEl.querySelector('.msg-bubble').style.background = 'var(--red)';
    optEl.querySelector('.msg-meta').textContent = 'ส่งไม่ได้ แตะเพื่อลองใหม่';
    optEl.style.cursor = 'pointer';
    optEl.onclick = () => { optEl.remove(); inp.value = text; sendMsg(); };
  } finally {
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

let _typingTimer;
function onTyping() {
  if (!_activeId) return;
  TukTukChat.handleTypingInput?.(_activeId, _activeCol, _sess.uid);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Accept ────────────────────────────────────────────────────────────────────
async function doAccept() {
  if (!_activeId) return;
  await TukTukChat.acceptConversation(_activeId);
  document.getElementById('acceptBanner').style.display = 'none';
}

// ── Mobile sidebar / back ─────────────────────────────────────────────────────
function showSidebar() {
  document.getElementById('sidebar').classList.remove('slide-out');
  document.getElementById('chatPanel').classList.add('slide-out');
  _activeId = null; _activeCol = null;
  if (history.state?.chat) history.back();
}

// Swipe right to go back (mobile)
(function() {
  let startX = 0, startY = 0;
  const panel = document.getElementById('chatPanel');
  panel.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  panel.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if (dx > 60 && dy < 40 && startX < 30 && _isMobile() && _activeId) {
      showSidebar();
    }
  }, { passive: true });
})();

// ── Scroll FAB ────────────────────────────────────────────────────────────────
document.getElementById('msgsArea').addEventListener('scroll', function() {
  const fab = document.getElementById('scrollFab');
  const fromBottom = this.scrollHeight - this.scrollTop - this.clientHeight;
  fab.style.display = fromBottom > 100 ? 'flex' : 'none';
});
function _scrollBottom() {
  const a = document.getElementById('msgsArea');
  a.scrollTo({ top: a.scrollHeight, behavior: 'smooth' });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
async function _profile(uid) {
  if (!uid) return null;
  if (_profileCache[uid]) return _profileCache[uid];
  const p = await TukTukChat.getUserProfile(uid);
  if (p) _profileCache[uid] = p;
  return p;
}

function _fmtTime(d) {
  const now = new Date(), diff = now - d;
  if (diff < 86400000) return d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  if (diff < 604800000) return d.toLocaleDateString('th-TH',{weekday:'short'});
  return d.toLocaleDateString('th-TH',{day:'numeric',month:'short'});
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _linkify(s) {
  return s.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#38bdf8;text-underline-offset:2px;">$1</a>');
}

function _useQR(text) {
  const inp = document.getElementById('msgInput');
  inp.value = text; autoResize(inp); inp.focus();
}

function _newChatSheet() {
  alert('ฟีเจอร์ค้นหาผู้ใช้เพื่อส่งข้อความ — กำลังพัฒนา');
}

function _openProduct() {
  if (_currentProd) location.href = `/product.html?id=${_currentProd}`;
}

function _shareChat() {
  if (window.TukTukNotify) {
    window.TukTukNotify.share({
      title: 'ติดต่อผ่าน TukTuk Thailand',
      text:  `แชทกับ ${document.getElementById('chName').textContent}`,
      url:   location.href,
    });
  }
}

function _chatMenu() {
  // TODO: bottom sheet with options (block, report, clear)
}

function _attachFile() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = () => { if (inp.files[0]) alert('อัปโหลดรูปภาพ — กำลังพัฒนา'); };
  inp.click();
}

// ── Keyboard height handling (Visual Viewport API) ────────────────────────────
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const bar = document.getElementById('mainWrap');
    if (bar) bar.style.height = window.visualViewport.height + 'px';
  });
}
</script>

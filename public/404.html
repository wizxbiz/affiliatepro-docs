<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - ไม่พบหน้าที่ต้องการ | Wizmobiz</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --line-green: #00C300;
            --dark: #1a1a2e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        
        .error-container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .error-icon {
            font-size: 5rem;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .error-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            line-height: 1.8;
        }
        
        .btn-group-custom {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-home {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            border: none;
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .btn-market {
            background: linear-gradient(135deg, #FF5722 0%, #E64A19 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            border: none;
        }
        
        .btn-market:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 87, 34, 0.4);
            color: white;
        }
        
        .btn-line {
            background: var(--line-green);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            border: none;
        }
        
        .btn-line:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 195, 0, 0.4);
            color: white;
        }
        
        .suggestions {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .suggestions-title {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }
        
        .suggestion-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .suggestion-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .suggestion-link:hover {
            color: var(--primary);
        }
        
        .suggestion-link i {
            margin-right: 5px;
        }
        
        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float-up 15s infinite;
        }
        
        @keyframes float-up {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        @media (max-width: 576px) {
            .error-code {
                font-size: 5rem;
            }
            
            .error-icon {
                font-size: 3rem;
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .btn-group-custom {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 4.5s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 1.5s;"></div>
    </div>
    
    <div class="error-container">
        <div class="error-icon">🔍</div>
        <div class="error-code">404</div>
        <h1 class="error-title">ไม่พบหน้าที่ต้องการ</h1>
        <p class="error-message">
            ขออภัย หน้าที่คุณกำลังมองหาอาจถูกย้าย ลบออก หรือไม่เคยมีอยู่<br>
            ลองตรวจสอบ URL อีกครั้ง หรือเลือกจากเมนูด้านล่าง
        </p>
        
        <div class="btn-group-custom">
            <a href="/" class="btn-home">
                <i class="fas fa-home"></i> หน้าแรก
            </a>
            <a href="/marketplace.html" class="btn-market">
                <i class="fas fa-store"></i> ตลาด
            </a>
            <a href="https://lin.ee/ayl8y1H" target="_blank" class="btn-line">
                <i class="fab fa-line"></i> LINE OA
            </a>
        </div>
        
        <div class="suggestions">
            <p class="suggestions-title">หน้ายอดนิยม</p>
            <div class="suggestion-links">
                <a href="/calculator" class="suggestion-link">
                    <i class="fas fa-calculator"></i> เครื่องคิดเลข
                </a>
                <a href="/injection-molding" class="suggestion-link">
                    <i class="fas fa-industry"></i> ฉีดพลาสติก
                </a>
                <a href="/academy" class="suggestion-link">
                    <i class="fas fa-graduation-cap"></i> Academy
                </a>
                <a href="/about.html" class="suggestion-link">
                    <i class="fas fa-info-circle"></i> เกี่ยวกับเรา
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // Auto redirect after 30 seconds (optional)
        // setTimeout(() => { window.location.href = '/'; }, 30000);
        
        // Log 404 errors for analytics
        if (typeof gtag !== 'undefined') {
            gtag('event', '404_error', {
                'page_path': window.location.pathname,
                'page_referrer': document.referrer
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="TukTuk Feed - The ultimate creative video & marketplace experience. Join our community and discover trending content.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TukTuk Feed">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <title>TukTuk Feed | Creative Studio</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0F0F1E;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      background: radial-gradient(circle at center, #1E1B4B 0%, #0F0F1E 100%);
    }

    .logo-glow {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
    }

    .logo-inner {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      border-radius: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
      animation: pulse 2s infinite ease-in-out;
    }

    .logo-inner svg {
      width: 60px;
      height: 60px;
      fill: white;
    }

    .glow-ring {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 2px solid rgba(251, 191, 36, 0.3);
      border-radius: 35px;
      animation: rotate-glow 4s linear infinite;
    }

    .loading-text {
      color: white;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-top: 20px;
      opacity: 0.8;
      text-transform: uppercase;
    }

    .progress-bar {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 15px;
      overflow: hidden;
    }

    .progress-fill {
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, #FBBF24, #F59E0B);
      border-radius: 2px;
      animation: loading-progress 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 50px rgba(139, 92, 246, 0.6);
      }

      100% {
        transform: scale(1);
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
      }
    }

    @keyframes rotate-glow {
      from {
        transform: rotate(0deg);
        border-color: rgba(251, 191, 36, 0.3);
      }

      50% {
        border-color: rgba(99, 102, 241, 0.5);
      }

      to {
        transform: rotate(360deg);
        border-color: rgba(251, 191, 36, 0.3);
      }
    }

    @keyframes loading-progress {
      0% {
        width: 0%;
        transform: translateX(-100%);
      }

      50% {
        width: 70%;
        transform: translateX(20%);
      }

      100% {
        width: 0%;
        transform: translateX(100%);
      }
    }
  </style>
</head>

<body>
  <div id="loading-splash" class="loading-container">
    <div class="logo-glow">
      <div class="glow-ring"></div>
      <div class="logo-inner">
        <!-- TukTuk Rocket Icon -->
        <svg viewBox="0 0 24 24">
          <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
        </svg>
      </div>
    </div>
    <div class="loading-text">TukTuk Feed</div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Remove splash screen when Flutter is ready
    window.addEventListener('load', function () {
      // Small delay to ensure smooth transition
      setTimeout(function () {
        const splash = document.getElementById('loading-splash');
        if (splash) {
          splash.style.opacity = '0';
          splash.style.transition = 'opacity 0.5s ease-out';
          setTimeout(() => splash.remove(), 500);
        }
      }, 2000); // Minimum display time for aesthetic impact
    });
  </script>
</body>

</html>

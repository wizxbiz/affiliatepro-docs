<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TukTuk Intelligent News Engine | WiT 365</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Kanit:wght@200;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            font-family: 'Outfit', 'Kanit', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
        }

        .nav-brand {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .container {
            max-width: 1200px;
            padding: 4rem 1rem;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        .section-title {
            font-weight: 800;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
        }

        .section-title i {
            color: var(--primary);
        }

        .form-label {
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            filter: brightness(1.1);
        }

        .news-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .news-thumb {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: #1e293b;
        }

        .news-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .news-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            line-height: 1.3;
        }

        .news-meta {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .news-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            justify-content: center;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .status-inactive {
            background: rgba(244, 63, 94, 0.2);
            color: #fb7185;
        }

        /* Intelligence Badges */
        .ai-metric {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-score {
            color: #facc15;
            font-weight: 800;
        }

        .ai-sentiment-positive {
            color: #4ade80;
        }

        .ai-sentiment-negative {
            color: #f87171;
        }

        .ai-sentiment-neutral {
            color: #94a3b8;
        }

        .ai-impact-high {
            color: #c084fc;
            border-color: #c084fc;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(192, 132, 252, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(192, 132, 252, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(192, 132, 252, 0);
            }
        }

        .points-list {
            list-style: none;
            padding: 0;
        }

        .point-item {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .point-input {
            flex: 1;
        }

        .remove-point {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner-glow {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--primary);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .cyber-separator {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 2rem 0;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-glow"></div>
    </div>

    <nav class="navbar fixed-top">
        <div class="d-flex align-items-center w-100 justify-content-between">
            <div class="nav-brand">TUKTUK NEWS INTELLIGENCE</div>
            <div class="d-flex gap-3">
                <a href="/index.html" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="fas fa-home me-2"></i> Feed
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- EDITOR COLUMN -->
            <div class="col-lg-6">
                <div class="glass-card">
                    <h4 class="section-title"><i class="fas fa-robot"></i> AI News Editor</h4>
                    <form id="newsForm">
                        <input type="hidden" id="newsId">

                        <!-- Core Info -->
                        <div class="mb-4">
                            <label class="form-label">Headline Title</label>
                            <input type="text" id="title" class="form-control" placeholder="Thai headline text..."
                                required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Source Name</label>
                                <input type="text" id="source" class="form-control" placeholder="e.g. WiT News">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select id="category" class="form-select">
                                    <option value="GOLD_OIL_INVEST">การเงิน/ลงทุน</option>
                                    <option value="LOCAL_PROVINCE">ท้องถิ่น/ภัยพิบัติ</option>
                                    <option value="AGRICULTURE">เกษตรกรรม</option>
                                    <option value="TECH_BIZ">เทคโนโลยี/ธุรกิจ</option>
                                    <option value="CRYPTO_WEB3">Crypto/Web3</option>
                                    <option value="GENERAL">ทั่วไป</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="input-group">
                                <input type="url" id="imageUrl" class="form-control"
                                    placeholder="Image URL (Unsplash/Direct)" required>
                                <button type="button" class="btn btn-dark" onclick="previewImage()">Check</button>
                            </div>
                            <img id="imagePreview" class="mt-3 rounded-4 w-100 shadow-lg"
                                style="display:none; aspect-ratio: 16/9; object-fit: cover;">
                        </div>

                        <div class="cyber-separator"></div>

                        <!-- INTELLIGENCE SECTION -->
                        <h5 class="text-white mb-3"
                            style="font-size: 0.9rem; letter-spacing: 1px; color: var(--accent) !important;">
                            <i class="fas fa-brain me-2"></i>INTELLIGENCE METRICS
                        </h5>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Sentiment</label>
                                <select id="sentiment" class="form-select">
                                    <option value="neutral">Neutral</option>
                                    <option value="positive">Positive</option>
                                    <option value="negative">Negative</option>
                                    <option value="cautious">Cautious</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Impact Level</label>
                                <select id="impactLevel" class="form-select">
                                    <option value="low">Low</option>
                                    <option value="medium">Medium</option>
                                    <option value="high">High (Critical)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Smart Score (0-100)</label>
                                <input type="number" id="smartScore" class="form-control" value="50">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Tags (Comma separated)</label>
                            <input type="text" id="tags" class="form-control" placeholder="e.g. bitcoin, crisis, flood">
                        </div>

                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between">
                                Executive Summary
                                <button type="button" class="btn btn-xs btn-outline-info py-0"
                                    onclick="generateAiSummary()">
                                    <i class="fas fa-magic me-1"></i> Gemini Rewrite
                                </button>
                            </label>
                            <textarea id="summary" class="form-control" rows="3"
                                placeholder="Brief impactful summary..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Key Insights (Bullet Points)</label>
                            <div id="pointsContainer" class="points-list"></div>
                            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addPoint()">
                                <i class="fas fa-plus me-1"></i> Add Insight
                            </button>
                        </div>

                        <div class="mb-4 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="isBreaking">
                            <label class="form-check-label text-warning fw-bold" for="isBreaking">🚨 BREAKING NEWS
                                (Urgent)</label>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-primary flex-grow-1">
                                <i class="fas fa-save me-2"></i> PUBLISH UPDATE
                            </button>
                            <button type="button" id="resetBtn" class="btn btn-outline-light" onclick="resetForm()">
                                RESET
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- FEED COLUMN -->
            <div class="col-lg-6">
                <div class="glass-card">
                    <h4 class="section-title">
                        <i class="fas fa-satellite-dish"></i> Live Intelligence Feed
                        <span class="badge bg-danger ms-auto" id="liveCount">0</span>
                    </h4>
                    <div class="mb-3">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search Filter..."
                            onkeyup="filterNews()">
                    </div>
                    <div id="newsList" style="max-height: 800px; overflow-y: auto; padding-right: 5px;">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKL6HBLEndDX4LYo7APFNQ0IVICLJtaIE",
            authDomain: "appinjproject.firebaseapp.com",
            projectId: "appinjproject",
            storageBucket: "appinjproject.firebasestorage.app",
            messagingSenderId: "408718656984",
            appId: "1:408718656984:web:08bd8f084769d428251ead"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allNews = [];

        // Load News List
        function loadNewsList() {
            const list = document.getElementById('newsList');
            db.collection('news_feed')
                .orderBy('createdAt', 'desc')
                .limit(50)
                .onSnapshot(snapshot => {
                    allNews = [];
                    list.innerHTML = '';
                    document.getElementById('liveCount').innerText = snapshot.size;

                    if (snapshot.empty) {
                        list.innerHTML = '<div class="text-center py-5 text-muted">No intelligence items found.</div>';
                        return;
                    }

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        allNews.push({ id: doc.id, ...data });

                        // Intelligence Colors
                        const scoreColor = data.smartScore > 80 ? '#4ade80' : (data.smartScore > 50 ? '#facc15' : '#94a3b8');
                        const isHighImpact = data.impactLevel === 'high';

                        const item = document.createElement('div');
                        item.className = 'news-item';
                        item.style.borderLeft = isHighImpact ? '4px solid #c084fc' : '1px solid var(--glass-border)';

                        item.innerHTML = `
                            <img src="${data.imageUrl}" class="news-thumb" onerror="this.src='https://placehold.co/80x80/1e293b/fff?text=No+Image'">
                            
                            <div class="news-info">
                                <div class="news-title">
                                    ${data.isBreaking ? '<i class="fas fa-bolt text-warning me-1"></i>' : ''}
                                    ${data.title}
                                </div>
                                <div class="news-meta">
                                    <span class="ai-metric" style="color:${scoreColor}">
                                        <i class="fas fa-chart-line"></i> ${data.smartScore || 50}
                                    </span>
                                    <span class="ai-metric ai-sentiment-${data.sentiment || 'neutral'}">
                                        ${data.sentiment || 'neutral'}
                                    </span>
                                    ${isHighImpact ? '<span class="ai-metric ai-impact-high">HIGH IMPACT</span>' : ''}
                                    <span style="opacity:0.6; font-size:0.75rem;">${new Date(data.createdAt?.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                </div>
                            </div>

                            <div class="news-actions">
                                <button class="btn btn-sm btn-outline-primary" onclick="editNews('${doc.id}')"><i class="fas fa-pen"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteNews('${doc.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        `;
                        list.appendChild(item);
                    });
                });
        }

        // Filter News
        function filterNews() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.news-item');
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(query) ? 'grid' : 'none';
            });
        }

        // Preview Image
        function previewImage() {
            const url = document.getElementById('imageUrl').value;
            const preview = document.getElementById('imagePreview');
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        // Points Management
        function addPoint(text = '') {
            const container = document.getElementById('pointsContainer');
            const div = document.createElement('div');
            div.className = 'point-item';
            div.innerHTML = `
                <input type="text" class="form-control point-input" value="${text}" placeholder="Insight bullet point...">
                <button type="button" class="remove-point" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(div);
        }

        // Edit News
        function editNews(id) {
            const item = allNews.find(n => n.id === id);
            if (!item) return;

            document.getElementById('newsId').value = item.id;
            document.getElementById('title').value = item.title;
            document.getElementById('source').value = item.source || '';
            document.getElementById('category').value = item.category || 'GENERAL';
            document.getElementById('imageUrl').value = item.imageUrl || '';
            document.getElementById('summary').value = item.summary || '';

            // Intelligence Fields
            document.getElementById('sentiment').value = item.sentiment || 'neutral';
            document.getElementById('impactLevel').value = item.impactLevel || 'low';
            document.getElementById('smartScore').value = item.smartScore || 50;
            document.getElementById('tags').value = (item.tags || []).join(', ');
            document.getElementById('isBreaking').checked = item.isBreaking || false;

            // Points
            const container = document.getElementById('pointsContainer');
            container.innerHTML = '';
            if (item.summaryPoints && Array.isArray(item.summaryPoints)) {
                item.summaryPoints.forEach(p => addPoint(p));
            }

            previewImage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Generate AI Summary (Simulation)
        function generateAiSummary() {
            const title = document.getElementById('title').value;
            if (!title) { alert('Please enter a headline first'); return; }
            const summaryField = document.getElementById('summary');
            summaryField.value = "Gemini is connecting dots...";
            setTimeout(() => {
                summaryField.value = `Analysis: "${title}" indicates a significant shift in market dynamics. Investors should watch for volatility in the short term.`;
                addPoint("Key Driver: Global supply chain disruption");
                addPoint("Hidden Impact: Local small businesses may face higher costs");
            }, 1000);
        }

        // Delete News
        async function deleteNews(id) {
            if (!confirm('Disconnect this intelligence node?')) return;
            try {
                await db.collection('news_feed').doc(id).delete();
            } catch (e) { alert('Delete failed: ' + e.message); }
        }

        // Reset Form
        function resetForm() {
            document.getElementById('newsForm').reset();
            document.getElementById('newsId').value = '';
            document.getElementById('pointsContainer').innerHTML = '';
            document.getElementById('imagePreview').style.display = 'none';
        }

        // Handle Save
        document.getElementById('newsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('newsId').value;

            // Gather points
            const points = [];
            document.querySelectorAll('.point-input').forEach(input => {
                if (input.value.trim()) points.push(input.value.trim());
            });

            // Gather Tags
            const tagStr = document.getElementById('tags').value;
            const tags = tagStr ? tagStr.split(',').map(t => t.trim()) : [];

            const data = {
                title: document.getElementById('title').value.trim(),
                source: document.getElementById('source').value.trim(),
                category: document.getElementById('category').value,
                imageUrl: document.getElementById('imageUrl').value.trim(),
                summary: document.getElementById('summary').value.trim(),
                summaryPoints: points,

                // Intelligence Data
                sentiment: document.getElementById('sentiment').value,
                impactLevel: document.getElementById('impactLevel').value,
                smartScore: parseInt(document.getElementById('smartScore').value) || 50,
                tags: tags,
                isBreaking: document.getElementById('isBreaking').checked,

                status: 'active',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (id) {
                    await db.collection('news_feed').doc(id).update(data);
                    alert('Intelligence Updated');
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('news_feed').add(data);
                    alert('News Node Created');
                }
                resetForm();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        // Init
        window.addEventListener('load', () => {
            loadNewsList();
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 500);
            }, 1000);
        });
    </script>
</body>

</html>

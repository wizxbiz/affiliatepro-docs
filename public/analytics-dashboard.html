<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Analytics Dashboard - Wizmobiz</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/persistent-ui.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d9ff, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #aaa;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .stat-card.views i {
            color: #00d9ff;
        }

        .stat-card.visitors i {
            color: #ff6b6b;
        }

        .stat-card.pages i {
            color: #ffd93d;
        }

        .stat-card.time i {
            color: #6bcb77;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            color: #aaa;
            font-size: 0.9em;
        }

        .charts-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .chart-card h3 {
            margin-bottom: 20px;
            color: #fff;
        }

        .top-pages {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .top-pages h3 {
            margin-bottom: 20px;
        }

        .page-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: background 0.3s ease;
        }

        .page-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .page-item .page-name {
            color: #00d9ff;
            font-weight: 500;
        }

        .page-item .page-views {
            background: linear-gradient(135deg, #00d9ff, #0066ff);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .date-filter {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .date-filter button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .date-filter button:hover,
        .date-filter button.active {
            background: linear-gradient(135deg, #00d9ff, #0066ff);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #aaa;
        }

        .loading i {
            font-size: 3em;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .realtime-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 0, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .realtime-indicator .dot {
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #00d9ff;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* AI Insights Panel */
        .ai-insights-panel {
            margin-top: 30px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1));
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 15px;
            padding: 25px;
        }
        .ai-insights-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .ai-insights-header h3 {
            font-size: 1.1rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-ai-analyze {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 25px;
            padding: 8px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: opacity 0.2s;
        }
        .btn-ai-analyze:hover { opacity: 0.85; }
        .btn-ai-analyze:disabled { opacity: 0.5; cursor: default; }
        .ai-insights-body {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #d1d5db;
            white-space: pre-wrap;
        }
        .ai-insights-body.loading {
            color: #818cf8;
            animation: pulse 1.5s infinite;
        }
        .ai-insight-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-top: 12px;
            border-left: 3px solid #6366f1;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>

        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Analytics Dashboard</h1>
            <p>ข้อมูลผู้เยี่ยมชมเว็บไซต์ Wizmobiz</p>
            <div class="realtime-indicator" style="margin-top: 15px;">
                <span class="dot"></span>
                <span>อัปเดตล่าสุด: <span id="lastUpdate">-</span></span>
            </div>
        </div>

        <div class="date-filter">
            <button class="active" data-days="7">7 วัน</button>
            <button data-days="14">14 วัน</button>
            <button data-days="30">30 วัน</button>
            <button data-days="90">90 วัน</button>
        </div>

        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

    <script src="/js/auth-service.js"></script>
    <script src="/js/tuktuk-api.js"></script>
    <script src="/js/cloudflare-client.js"></script>

    <script>
        const API_URL = 'https://us-central1-appinjproject.cloudfunctions.net/getAnalyticsStats';
        let currentDays = 7;
        let chart = null;

        // Date filter buttons
        document.querySelectorAll('.date-filter button').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.date-filter button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDays = parseInt(this.dataset.days);
                loadAnalytics();
            });
        });

        async function loadAnalytics() {
            const content = document.getElementById('content');

            // Auth Check
            if (window.AuthService && !window.AuthService.isAuthenticated()) {
                content.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-lock"></i>
                        <p>กรุณาเข้าสู่ระบบเพื่อดูข้อมูลส่วนนี้</p>
                        <button onclick="WizmobizAuth.redirectToLogin()" style="margin-top: 15px; padding: 10px 25px; background: #00d9ff; border: none; border-radius: 25px; color: #fff; cursor: pointer;">
                            เข้าสู่ระบบ
                        </button>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>กำลังรวบรวมข้อมูลจาก Cloud และ Relational Engine...</p>
                </div>
            `;

            try {
                // 1. Fetch Standard Analytics (Firebase)
                const response = await fetch(`${API_URL}?days=${currentDays}`);
                const result = await response.json();

                // 2. Fetch Relational Analytics (PostgreSQL via Fly.io)
                let relationalData = null;
                try {
                    if (window.TuktukAPI) {
                        relationalData = await window.TuktukAPI.getCommunityAnalytics("all");
                    }
                } catch (e) {
                    console.warn('Relational Analytics fetch failed:', e);
                }

                if (result.success) {
                    renderDashboard(result.data, relationalData);
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleString('th-TH');
                } else {
                    throw new Error('Failed to load standard analytics');
                }
            } catch (error) {
                console.error('Error loading analytics:', error);
                content.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-exclamation-triangle" style="color: #ff6b6b;"></i>
                        <p>ไม่สามารถโหลดข้อมูลได้</p>
                        <button onclick="loadAnalytics()" style="margin-top: 15px; padding: 10px 25px; background: #00d9ff; border: none; border-radius: 25px; color: #fff; cursor: pointer;">
                            ลองใหม่
                        </button>
                    </div>
                `;
            }
        }

        function renderDashboard(data, relationalData) {
            const { summary, dailyStats, topPages } = data;

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card views">
                        <i class="fas fa-eye"></i>
                        <div class="value">${formatNumber(summary.totalPageViews)}</div>
                        <div class="label">การเข้าชมทั้งหมด</div>
                    </div>
                    <div class="stat-card visitors">
                        <i class="fas fa-users"></i>
                        <div class="value">${formatNumber(summary.uniqueVisitors)}</div>
                        <div class="label">ผู้เยี่ยมชมที่ไม่ซ้ำ</div>
                    </div>
                    <div class="stat-card pages">
                        <i class="fas fa-file-alt"></i>
                        <div class="value">${summary.avgPagesPerVisitor}</div>
                        <div class="label">หน้าต่อคน (เฉลี่ย)</div>
                    </div>
                    <div class="stat-card time">
                        <i class="fas fa-microchip"></i>
                        <div class="value">${relationalData ? 'SQL' : 'MOCK'}</div>
                        <div class="label">Backend State</div>
                    </div>
                </div>
                
                <div class="charts-section">
                    <div class="chart-card">
                        <h3><i class="fas fa-chart-area"></i> กราฟการเข้าชมรายวัน</h3>
                        <canvas id="viewsChart"></canvas>
                    </div>
                    
                    <div class="top-pages">
                        <h3><i class="fas fa-trophy"></i> หน้าที่เข้าชมมากที่สุด</h3>
                        ${topPages.length > 0 ? topPages.map((page, index) => `
                            <div class="page-item">
                                <span class="page-name">${index + 1}. ${page.page || '/'}</span>
                                <span class="page-views">${formatNumber(page.views)}</span>
                            </div>
                        `).join('') : '<p style="color: #aaa; text-align: center;">ยังไม่มีข้อมูล</p>'}
                    </div>
                </div>

                ${relationalData && relationalData.status === 'success' ? `
                <div class="chart-card" style="margin-top: 30px;">
                    <h3><i class="fas fa-chart-pie"></i> แนวโน้มเศรษฐกิจชุมชน (Relational DB)</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
                        ${relationalData.trends.map(trend => `
                        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                <strong>${trend.province}</strong>
                                <span style="color: ${trend.growthIndex >= 0 ? '#6bcb77' : '#ff6b6b'}">${trend.growthIndex}% Growth</span>
                            </div>
                            <div style="color: #aaa; font-size: 0.9em;">Category: ${trend.category}</div>
                            <div style="margin-top: 10px; font-weight: bold;">Volume: ฿${formatNumber(trend.transactionVolume)}</div>
                        </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
            `;

            // Render chart
            renderChart(dailyStats);

            // Inject AI Insights panel (reuse `content` var already declared above)
            const aiPanel = document.createElement('div');
            aiPanel.className = 'ai-insights-panel';
            aiPanel.innerHTML = `
                <div class="ai-insights-header">
                    <h3><i class="fas fa-robot" style="margin-right:8px;"></i>AI วิเคราะห์ข้อมูล Analytics</h3>
                    <button class="btn-ai-analyze" id="btnAiAnalyze" onclick="aiAnalyze()">
                        <i class="fas fa-wand-magic-sparkles"></i> วิเคราะห์ด้วย AI
                    </button>
                </div>
                <div class="ai-insights-body" id="aiInsightsBody" style="color:rgba(255,255,255,0.4); font-style:italic;">
                    กด "วิเคราะห์ด้วย AI" เพื่อให้ AI สรุปผลและแนะนำแนวทางพัฒนา
                </div>
            `;
            content.appendChild(aiPanel);

            // Store for AI analysis
            window._lastAnalyticsData = { summary, dailyStats, topPages };
        }

        function renderChart(dailyStats) {
            const ctx = document.getElementById('viewsChart').getContext('2d');

            // Sort by date
            const sortedStats = [...dailyStats].sort((a, b) => new Date(a.date) - new Date(b.date));

            const labels = sortedStats.map(s => formatDate(s.date));
            const pageViews = sortedStats.map(s => s.pageViews || 0);
            const visitors = sortedStats.map(s => (s.uniqueVisitors || []).length);

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Page Views',
                            data: pageViews,
                            borderColor: '#00d9ff',
                            backgroundColor: 'rgba(0, 217, 255, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Unique Visitors',
                            data: visitors,
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#aaa' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            ticks: { color: '#aaa' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
        }

        // Initial load
        loadAnalytics();

        // Auto refresh every 5 minutes
        setInterval(loadAnalytics, 5 * 60 * 1000);

        // ── AI Analytics Insights ─────────────────────────────────
        async function aiAnalyze() {
            const btn = document.getElementById('btnAiAnalyze');
            const body = document.getElementById('aiInsightsBody');
            if (!btn || !body) return;

            const data = window._lastAnalyticsData;
            if (!data) return;

            btn.disabled = true;
            body.className = 'ai-insights-body loading';
            body.textContent = '🤖 AI กำลังวิเคราะห์ข้อมูล...';

            const { summary, dailyStats, topPages } = data;
            const trend = dailyStats.length > 1
                ? (dailyStats[dailyStats.length - 1]?.pageViews || 0) - (dailyStats[0]?.pageViews || 0)
                : 0;
            const topPage = topPages?.[0]?.page || '/';

            const prompt = `วิเคราะห์ข้อมูล Analytics ของ TukTuk Thailand Platform:\n` +
                `- เข้าชมทั้งหมด: ${summary.totalPageViews} ครั้ง\n` +
                `- ผู้เยี่ยมชมที่ไม่ซ้ำ: ${summary.uniqueVisitors} คน\n` +
                `- หน้าต่อคน (เฉลี่ย): ${summary.avgPagesPerVisitor}\n` +
                `- แนวโน้ม (ช่วงที่เลือก): ${trend >= 0 ? '+' : ''}${trend} views\n` +
                `- หน้ายอดนิยม: ${topPage}\n` +
                `- Top 3 หน้า: ${topPages.slice(0, 3).map(p => p.page).join(', ')}\n\n` +
                `ตอบเป็น JSON: {"summary":"สรุป2-3ประโยค","insights":["insight1","insight2","insight3"],"recommendations":["แนะนำ1","แนะนำ2"]}`;

            try {
                const WORKER = location.hostname === 'tuktukthailand.com'
                    ? 'https://tuktukfeed-api.imtthailand2019.workers.dev' : '';
                const resp = await fetch(`${WORKER}/api/v1/ai/write-post`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: prompt, mode: 'post' }),
                });
                const result = await resp.json();
                const raw = result.content || result.headline || '';
                let parsed;
                try {
                    parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
                } catch {
                    // If not JSON, show as plain text
                    body.className = 'ai-insights-body';
                    body.innerHTML = `<div class="ai-insight-card">${raw}</div>`;
                    btn.disabled = false;
                    return;
                }

                body.className = 'ai-insights-body';
                body.innerHTML = `
                    <div class="ai-insight-card" style="border-left-color:#10b981;">
                        <strong style="color:#10b981;">📊 สรุป</strong><br>
                        <span>${parsed.summary || ''}</span>
                    </div>
                    ${(parsed.insights || []).map(ins => `
                        <div class="ai-insight-card">
                            <span>💡 ${ins}</span>
                        </div>
                    `).join('')}
                    <div class="ai-insight-card" style="border-left-color:#f59e0b; margin-top:8px;">
                        <strong style="color:#f59e0b;">🎯 แนะนำ</strong>
                        <ul style="margin:8px 0 0 16px; padding:0;">
                            ${(parsed.recommendations || []).map(r => `<li style="margin-bottom:4px;">${r}</li>`).join('')}
                        </ul>
                    </div>
                `;
            } catch (e) {
                body.className = 'ai-insights-body';
                body.innerHTML = `<span style="color:#ef4444;">❌ วิเคราะห์ไม่ได้: ${e.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
    <script src="js/persistent-ui.js"></script>
</body>

</html>

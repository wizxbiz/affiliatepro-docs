<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Analytics Dashboard - Wizmobiz</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/persistent-ui.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d9ff, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #aaa;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .stat-card.views i {
            color: #00d9ff;
        }

        .stat-card.visitors i {
            color: #ff6b6b;
        }

        .stat-card.pages i {
            color: #ffd93d;
        }

        .stat-card.time i {
            color: #6bcb77;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            color: #aaa;
            font-size: 0.9em;
        }

        .charts-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .chart-card h3 {
            margin-bottom: 20px;
            color: #fff;
        }

        .top-pages {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .top-pages h3 {
            margin-bottom: 20px;
        }

        .page-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: background 0.3s ease;
        }

        .page-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .page-item .page-name {
            color: #00d9ff;
            font-weight: 500;
        }

        .page-item .page-views {
            background: linear-gradient(135deg, #00d9ff, #0066ff);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .date-filter {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .date-filter button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .date-filter button:hover,
        .date-filter button.active {
            background: linear-gradient(135deg, #00d9ff, #0066ff);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #aaa;
        }

        .loading i {
            font-size: 3em;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .realtime-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 0, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .realtime-indicator .dot {
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #00d9ff;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>

        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Analytics Dashboard</h1>
            <p>ข้อมูลผู้เยี่ยมชมเว็บไซต์ Wizmobiz</p>
            <div class="realtime-indicator" style="margin-top: 15px;">
                <span class="dot"></span>
                <span>อัปเดตล่าสุด: <span id="lastUpdate">-</span></span>
            </div>
        </div>

        <div class="date-filter">
            <button class="active" data-days="7">7 วัน</button>
            <button data-days="14">14 วัน</button>
            <button data-days="30">30 วัน</button>
            <button data-days="90">90 วัน</button>
        </div>

        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

    <script src="/firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="/js/auth-service.js"></script>
    <script src="/js/tuktuk-api.js"></script>

    <script>
        const API_URL = '/api/analytics/getStats';
        let currentDays = 7;
        let chart = null;

        // Date filter buttons
        document.querySelectorAll('.date-filter button').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.date-filter button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDays = parseInt(this.dataset.days);
                loadAnalytics();
            });
        });

        async function loadAnalytics() {
            const content = document.getElementById('content');

            // Auth Check
            if (window.AuthService && !window.AuthService.isAuthenticated()) {
                content.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-lock"></i>
                        <p>กรุณาเข้าสู่ระบบเพื่อดูข้อมูลส่วนนี้</p>
                        <button onclick="WizmobizAuth.redirectToLogin()" style="margin-top: 15px; padding: 10px 25px; background: #00d9ff; border: none; border-radius: 25px; color: #fff; cursor: pointer;">
                            เข้าสู่ระบบ
                        </button>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>กำลังรวบรวมข้อมูลจาก Cloud และ Relational Engine...</p>
                </div>
            `;

            try {
                // 1. Fetch Standard Analytics (Firebase)
                const response = await fetch(`${API_URL}?days=${currentDays}`);
                const result = await response.json();

                // 2. Fetch Relational Analytics (PostgreSQL via Fly.io)
                let relationalData = null;
                try {
                    if (window.TuktukAPI) {
                        relationalData = await window.TuktukAPI.getCommunityAnalytics("all");
                    }
                } catch (e) {
                    console.warn('Relational Analytics fetch failed:', e);
                }

                if (result.success) {
                    renderDashboard(result.data, relationalData);
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleString('th-TH');
                } else {
                    throw new Error('Failed to load standard analytics');
                }
            } catch (error) {
                console.error('Error loading analytics:', error);
                content.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-exclamation-triangle" style="color: #ff6b6b;"></i>
                        <p>ไม่สามารถโหลดข้อมูลได้</p>
                        <button onclick="loadAnalytics()" style="margin-top: 15px; padding: 10px 25px; background: #00d9ff; border: none; border-radius: 25px; color: #fff; cursor: pointer;">
                            ลองใหม่
                        </button>
                    </div>
                `;
            }
        }

        function renderDashboard(data, relationalData) {
            const { summary, dailyStats, topPages } = data;

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card views">
                        <i class="fas fa-eye"></i>
                        <div class="value">${formatNumber(summary.totalPageViews)}</div>
                        <div class="label">การเข้าชมทั้งหมด</div>
                    </div>
                    <div class="stat-card visitors">
                        <i class="fas fa-users"></i>
                        <div class="value">${formatNumber(summary.uniqueVisitors)}</div>
                        <div class="label">ผู้เยี่ยมชมที่ไม่ซ้ำ</div>
                    </div>
                    <div class="stat-card pages">
                        <i class="fas fa-file-alt"></i>
                        <div class="value">${summary.avgPagesPerVisitor}</div>
                        <div class="label">หน้าต่อคน (เฉลี่ย)</div>
                    </div>
                    <div class="stat-card time">
                        <i class="fas fa-microchip"></i>
                        <div class="value">${relationalData ? 'SQL' : 'MOCK'}</div>
                        <div class="label">Backend State</div>
                    </div>
                </div>
                
                <div class="charts-section">
                    <div class="chart-card">
                        <h3><i class="fas fa-chart-area"></i> กราฟการเข้าชมรายวัน</h3>
                        <canvas id="viewsChart"></canvas>
                    </div>
                    
                    <div class="top-pages">
                        <h3><i class="fas fa-trophy"></i> หน้าที่เข้าชมมากที่สุด</h3>
                        ${topPages.length > 0 ? topPages.map((page, index) => `
                            <div class="page-item">
                                <span class="page-name">${index + 1}. ${page.page || '/'}</span>
                                <span class="page-views">${formatNumber(page.views)}</span>
                            </div>
                        `).join('') : '<p style="color: #aaa; text-align: center;">ยังไม่มีข้อมูล</p>'}
                    </div>
                </div>

                ${relationalData && relationalData.status === 'success' ? `
                <div class="chart-card" style="margin-top: 30px;">
                    <h3><i class="fas fa-chart-pie"></i> แนวโน้มเศรษฐกิจชุมชน (Relational DB)</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
                        ${relationalData.trends.map(trend => `
                        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                <strong>${trend.province}</strong>
                                <span style="color: ${trend.growthIndex >= 0 ? '#6bcb77' : '#ff6b6b'}">${trend.growthIndex}% Growth</span>
                            </div>
                            <div style="color: #aaa; font-size: 0.9em;">Category: ${trend.category}</div>
                            <div style="margin-top: 10px; font-weight: bold;">Volume: ฿${formatNumber(trend.transactionVolume)}</div>
                        </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
            `;

            // Render chart
            renderChart(dailyStats);
        }

        function renderChart(dailyStats) {
            const ctx = document.getElementById('viewsChart').getContext('2d');

            // Sort by date
            const sortedStats = [...dailyStats].sort((a, b) => new Date(a.date) - new Date(b.date));

            const labels = sortedStats.map(s => formatDate(s.date));
            const pageViews = sortedStats.map(s => s.pageViews || 0);
            const visitors = sortedStats.map(s => (s.uniqueVisitors || []).length);

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Page Views',
                            data: pageViews,
                            borderColor: '#00d9ff',
                            backgroundColor: 'rgba(0, 217, 255, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Unique Visitors',
                            data: visitors,
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#aaa' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            ticks: { color: '#aaa' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
        }

        // Initial load
        loadAnalytics();

        // Auto refresh every 5 minutes
        setInterval(loadAnalytics, 5 * 60 * 1000);
    </script>
    <script src="js/persistent-ui.js"></script>
</body>

</html>

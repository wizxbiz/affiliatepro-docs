<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ออฟไลน์ - TukTuk Thailand</title>

    <!-- Inline CSS for offline -->
    <style>
        /* Kanit font embedded inline — no external requests when offline */
        
        :root {
            --primary: #667eea;
            --dark: #1a1a2e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Kanit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .offline-container {
            max-width: 500px;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .offline-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .offline-message {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            line-height: 1.8;
        }
        
        .btn-retry {
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }
        
        .btn-retry:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .tips {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .tips-title {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 15px;
        }
        
        .tips-list {
            list-style: none;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            line-height: 2;
        }
        
        .online-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .online-indicator.online {
            background: #22c55e;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="online-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span id="statusText">ออฟไลน์</span>
    </div>
    
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1 class="offline-title">คุณกำลังออฟไลน์</h1>
        <p class="offline-message">
            ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้<br>
            กรุณาตรวจสอบการเชื่อมต่อและลองใหม่อีกครั้ง
        </p>
        
        <button class="btn-retry" onclick="tryReconnect()">
            🔄 ลองใหม่อีกครั้ง
        </button>
        
        <div class="tips">
            <p class="tips-title">💡 คำแนะนำ</p>
            <ul class="tips-list">
                <li>✓ ตรวจสอบการเชื่อมต่อ WiFi หรือมือถือ</li>
                <li>✓ ลองเปิด-ปิดโหมดเครื่องบิน</li>
                <li>✓ รีสตาร์ท Router หรืออุปกรณ์</li>
            </ul>
        </div>
    </div>
    
    <script>
        // Check online status
        function updateOnlineStatus() {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (navigator.onLine) {
                indicator.classList.add('online');
                statusText.textContent = 'ออนไลน์แล้ว!';
                // Reload after short delay
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            } else {
                indicator.classList.remove('online');
                statusText.textContent = 'ออฟไลน์';
            }
        }
        
        // Try to reconnect
        function tryReconnect() {
            const btn = document.querySelector('.btn-retry');
            btn.innerHTML = '⏳ กำลังตรวจสอบ...';
            btn.disabled = true;
            
            // Try to fetch the main page
            fetch('/', { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    window.location.reload();
                })
                .catch(() => {
                    btn.innerHTML = '🔄 ลองใหม่อีกครั้ง';
                    btn.disabled = false;
                    alert('ยังไม่สามารถเชื่อมต่อได้ กรุณาตรวจสอบอินเทอร์เน็ต');
                });
        }
        
        // Listen for online/offline events
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        
        // Check on load
        updateOnlineStatus();
    </script>
</body>
</html>

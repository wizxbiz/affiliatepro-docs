<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>TukTuk Thailand — กำลังเชื่อมต่อ...</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00D2FF;
      --primary-dark: #0088CC;
      --secondary: #FF6B2B;
      --bg: #0A0E21;
      --surface: rgba(18, 25, 45, 0.95);
      --text: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      --success: #00E676;
      --warning: #FFD600;
      --error: #FF3B3B;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(255, 107, 43, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating Particles */
    .particle {
      position: absolute;
      background: rgba(0, 210, 255, 0.1);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-20px) translateX(10px); }
      50% { transform: translateY(0) translateX(20px); }
      75% { transform: translateY(20px) translateX(10px); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 40px 32px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      animation: cardAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardAppear {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .emoji-container {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, rgba(0, 210, 255, 0.2), rgba(255, 107, 43, 0.2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(0, 210, 255, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4);
      }
      50% {
        box-shadow: 0 0 20px 10px rgba(0, 210, 255, 0.2);
      }
    }

    .emoji {
      font-size: 56px;
      filter: drop-shadow(0 0 10px var(--primary));
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .feature-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(0, 210, 255, 0.1);
      border: 1px solid rgba(0, 210, 255, 0.3);
      border-radius: 30px;
      font-size: 13px;
      color: var(--primary);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .feature-badge i {
      margin-right: 6px;
      font-size: 12px;
    }

    p {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      margin: 20px 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      width: 0%;
      border-radius: 3px;
      animation: progress 1.8s ease-out forwards;
    }

    @keyframes progress {
      0% { width: 0%; }
      20% { width: 30%; }
      40% { width: 50%; }
      60% { width: 70%; }
      80% { width: 85%; }
      100% { width: 100%; }
    }

    /* Spinner */
    .spinner-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary);
      border-right-color: var(--secondary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Buttons */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      border: none;
      font-family: 'Kanit', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--bg);
      box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 210, 255, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .btn i {
      font-size: 18px;
    }

    .hidden {
      display: none !important;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 20px;
      opacity: 0.6;
    }

    /* Remember Choice Checkbox */
    .remember-choice {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 16px 0;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .remember-choice input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Floating Particles (Dynamic) -->
  <div id="particles"></div>

  <div class="card">
    <!-- Emoji Container -->
    <div class="emoji-container">
      <div class="emoji" id="featureEmoji">🛺</div>
    </div>

    <!-- Title -->
    <h1 id="featureTitle">กำลังเชื่อมต่อ...</h1>

    <!-- Feature Badge -->
    <div class="feature-badge" id="featureBadge">
      <i class="fas fa-rocket"></i>
      <span id="featureName">TukTuk</span>
    </div>

    <!-- Description -->
    <p id="featureDesc">กำลังพยายามเปิดในแอป TukTuk...</p>

    <!-- Progress Bar -->
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Spinner + Text -->
    <div class="spinner-container" id="loadingState">
      <div class="spinner"></div>
      <span class="spinner-text" id="loadingText">กำลังเปิดแอป...</span>
    </div>

    <!-- Button Group (shown on fallback) -->
    <div class="button-group hidden" id="buttonGroup">
      <a class="btn btn-primary" id="webBtn" href="#">
        <i class="fas fa-globe"></i> เปิดในเว็บไซต์
      </a>
      <button class="btn btn-secondary" id="retryBtn" onclick="tryApp()">
        <i class="fas fa-redo-alt"></i> ลองอีกครั้ง
      </button>
    </div>

    <!-- Remember Choice -->
    <label class="remember-choice" id="rememberChoice">
      <input type="checkbox" id="alwaysWeb"> จำการเลือกของฉัน (เปิดเว็บเสมอ)
    </label>

    <!-- Hint -->
    <div class="hint" id="hint"></div>
  </div>

  <script>
    // ============================================
    // CONFIGURATION
    // ============================================
    const FEATURES = {
      feed: { 
        emoji: "📱", 
        name: "ฟีด", 
        title: "ฟีดดูเพลิน", 
        desc: "ข่าวสารชุมชนและสินค้าใหม่", 
        app: "tuktukfeed://feed", 
        web: "/" 
      },
      nearby: { 
        emoji: "📍", 
        name: "ใกล้ฉัน", 
        title: "สินค้าใกล้ฉัน", 
        desc: "สินค้าและร้านค้าในพื้นที่ใกล้คุณ", 
        app: "tuktukfeed://nearby", 
        web: "/marketplace" 
      },
      marketplace: { 
        emoji: "🛒", 
        name: "ตลาด", 
        title: "ตลาดซื้อขาย", 
        desc: "SME & OTOP ราคาดีจากทั่วประเทศ", 
        app: "tuktukfeed://marketplace", 
        web: "/marketplace" 
      },
      win: { 
        emoji: "🛺", 
        name: "วิน", 
        title: "เรียกวิน", 
        desc: "วินมอเตอร์ไซค์ใกล้บ้านคุณ", 
        app: "tuktukfeed://win", 
        web: "/win-service" 
      },
      register: { 
        emoji: "🏍️", 
        name: "สมัครวิน", 
        title: "สมัครวิน", 
        desc: "เป็นวินดิจิทัล รายได้ดีขึ้น", 
        app: "tuktukfeed://register", 
        web: "/win-rider-register" 
      },
      delivery: { 
        emoji: "📦", 
        name: "ส่งสินค้า", 
        title: "ส่งสินค้า", 
        desc: "วินรับส่งสินค้าถึงบ้านคุณ", 
        app: "tuktukfeed://delivery", 
        web: "/win-service" 
      },
      login: { 
        emoji: "🔐", 
        name: "เข้าสู่ระบบ", 
        title: "เข้าสู่ระบบ", 
        desc: "เข้าสู่บัญชี TukTuk ของคุณ", 
        app: "tuktukfeed://login", 
        web: "/auth" 
      },
      seller: { 
        emoji: "🏪", 
        name: "ร้านค้า", 
        title: "จัดการร้านค้า", 
        desc: "แดชบอร์ดร้านและสินค้าของคุณ", 
        app: "tuktukfeed://seller", 
        web: "/seller-dashboard" 
      },
      otop: { 
        emoji: "🎁", 
        name: "OTOP", 
        title: "สินค้า OTOP", 
        desc: "ของดีภูมิปัญญาท้องถิ่นไทย", 
        app: "tuktukfeed://otop", 
        web: "/marketplace" 
      },
      community: { 
        emoji: "🏘️", 
        name: "ชุมชน", 
        title: "ชุมชน", 
        desc: "โพสต์ข่าวสารในชุมชนของคุณ", 
        app: "tuktukfeed://community", 
        web: "/community" 
      },
      go: { 
        emoji: "⚡", 
        name: "GO", 
        title: "TukTuk GO", 
        desc: "บริการพิเศษสำหรับคุณ", 
        app: "tuktukfeed://go", 
        web: "/go" 
      },
      chat: { 
        emoji: "💬", 
        name: "แชท", 
        title: "ข้อความ", 
        desc: "แชทกับร้านค้าและเพื่อน", 
        app: "tuktukfeed://chat", 
        web: "/chat" 
      },
      notification: { 
        emoji: "🔔", 
        name: "แจ้งเตือน", 
        title: "การแจ้งเตือน", 
        desc: "อัปเดตข่าวสารและข้อความ", 
        app: "tuktukfeed://notification", 
        web: "/notifications" 
      },
      profile: { 
        emoji: "👤", 
        name: "โปรไฟล์", 
        title: "โปรไฟล์ของฉัน", 
        desc: "ดูและแก้ไขข้อมูลส่วนตัว", 
        app: "tuktukfeed://profile", 
        web: "/profile" 
      },
      cart: { 
        emoji: "🛍️", 
        name: "ตะกร้า", 
        title: "ตะกร้าสินค้า", 
        desc: "สินค้าที่คุณเลือกไว้", 
        app: "tuktukfeed://cart", 
        web: "/cart" 
      },
      order: { 
        emoji: "📋", 
        name: "คำสั่งซื้อ", 
        title: "คำสั่งซื้อของฉัน", 
        desc: "ติดตามสถานะการจัดส่ง", 
        app: "tuktukfeed://order", 
        web: "/orders" 
      },
      promo: { 
        emoji: "🎟️", 
        name: "โปรโมชั่น", 
        title: "โปรโมชั่นพิเศษ", 
        desc: "ส่วนลดและข้อเสนอสุดพิเศษ", 
        app: "tuktukfeed://promo", 
        web: "/promotions" 
      },
      help: { 
        emoji: "❓", 
        name: "ช่วยเหลือ", 
        title: "ศูนย์ช่วยเหลือ", 
        desc: "คำถามที่พบบ่อยและติดต่อเรา", 
        app: "tuktukfeed://help", 
        web: "/help" 
      },
      settings: { 
        emoji: "⚙️", 
        name: "ตั้งค่า", 
        title: "ตั้งค่าแอป", 
        desc: "ปรับแต่งการใช้งานของคุณ", 
        app: "tuktukfeed://settings", 
        web: "/settings" 
      }
    };

    // Default feature (fallback)
    const DEFAULT_FEATURE = "marketplace";
    const APP_OPEN_TIMEOUT = 1500; // ms (faster than before)
    const AUTO_REDIRECT_DELAY = 1200; // ms

    // ============================================
    // INITIALIZATION
    // ============================================
    const params = new URLSearchParams(window.location.search);
    let feature = params.get("f") || DEFAULT_FEATURE;
    
    // Validate feature
    if (!FEATURES[feature]) {
      console.warn(`Unknown feature: ${feature}, falling back to ${DEFAULT_FEATURE}`);
      feature = DEFAULT_FEATURE;
    }

    const info = FEATURES[feature];
    const webUrl = info.web.startsWith("http") ? info.web : ("https://tuktukfeed.com" + info.web);

    // ============================================
    // UI UPDATE
    // ============================================
    document.getElementById("featureEmoji").textContent = info.emoji;
    document.getElementById("featureTitle").textContent = info.title;
    document.getElementById("featureName").textContent = info.name;
    document.getElementById("featureDesc").textContent = info.desc;
    document.getElementById("webBtn").href = webUrl;

    // ============================================
    // ANIMATED BACKGROUND PARTICLES
    // ============================================
    function createParticles() {
      const container = document.getElementById("particles");
      const count = 20;
      
      for (let i = 0; i < count; i++) {
        const particle = document.createElement("div");
        particle.className = "particle";
        
        const size = Math.random() * 100 + 50;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.animationDelay = `${Math.random() * 5}s`;
        particle.style.animationDuration = `${Math.random() * 5 + 5}s`;
        
        container.appendChild(particle);
      }
    }
    createParticles();

    // ============================================
    // DEEP LINK LOGIC
    // ============================================
    let appOpened = false;
    let fallbackTimer = null;
    let autoRedirectTimer = null;

    // Check if user wants to always use web
    function shouldAlwaysUseWeb() {
      try {
        return localStorage.getItem("tuktuk_always_web") === "true";
      } catch (e) {
        return false;
      }
    }

    // Save preference
    document.getElementById("alwaysWeb").addEventListener("change", function(e) {
      try {
        localStorage.setItem("tuktuk_always_web", e.target.checked);
      } catch (e) {
        // Ignore if localStorage not available
      }
    });

    // Load preference
    try {
      document.getElementById("alwaysWeb").checked = localStorage.getItem("tuktuk_always_web") === "true";
    } catch (e) {
      // Ignore
    }

    // Main function to try opening app
    function tryApp() {
      // Clear any existing timers
      if (fallbackTimer) clearTimeout(fallbackTimer);
      if (autoRedirectTimer) clearTimeout(autoRedirectTimer);

      // Reset UI
      document.getElementById("loadingState").classList.remove("hidden");
      document.getElementById("buttonGroup").classList.add("hidden");
      document.getElementById("hint").textContent = "";
      document.getElementById("progressBar").style.animation = "progress 1.5s ease-out forwards";
      
      appOpened = false;

      // If user chose to always use web, skip app attempt
      if (shouldAlwaysUseWeb()) {
        console.log("User prefers web, redirecting directly");
        window.location.href = webUrl;
        return;
      }

      // Create invisible iframe (helps with some browsers)
      const iframe = document.createElement("iframe");
      iframe.style.display = "none";
      document.body.appendChild(iframe);

      // Try to open app via iframe (works on more browsers)
      try {
        iframe.src = info.app;
      } catch (e) {
        console.warn("Iframe redirect failed, trying location redirect");
      }

      // Also try direct location redirect (primary method)
      try {
        window.location.href = info.app;
      } catch (e) {
        console.error("Location redirect failed", e);
      }

      // Set fallback timer
      fallbackTimer = setTimeout(function() {
        if (!appOpened) {
          // App didn't open, show web option
          document.getElementById("loadingState").classList.add("hidden");
          document.getElementById("buttonGroup").classList.remove("hidden");
          document.getElementById("hint").textContent = "หากไม่เปิดอัตโนมัติ กรุณาแตะปุ่มด้านบน";
          
          // Auto redirect after extra delay
          autoRedirectTimer = setTimeout(function() {
            window.location.href = webUrl;
          }, AUTO_REDIRECT_DELAY);
        }
        
        // Clean up iframe
        if (iframe && iframe.parentNode) {
          iframe.parentNode.removeChild(iframe);
        }
      }, APP_OPEN_TIMEOUT);
    }

    // Detect if app opened successfully
    document.addEventListener("visibilitychange", function() {
      if (document.hidden) {
        appOpened = true;
        // App opened, clean up timers
        if (fallbackTimer) clearTimeout(fallbackTimer);
        if (autoRedirectTimer) clearTimeout(autoRedirectTimer);
      }
    });

    window.addEventListener("blur", function() { 
      appOpened = true;
      if (fallbackTimer) clearTimeout(fallbackTimer);
      if (autoRedirectTimer) clearTimeout(autoRedirectTimer);
    });

    window.addEventListener("pagehide", function() { 
      appOpened = true;
      if (fallbackTimer) clearTimeout(fallbackTimer);
      if (autoRedirectTimer) clearTimeout(autoRedirectTimer);
    });

    // Start the attempt after a short delay
    setTimeout(tryApp, 400);

    // ============================================
    // ADDITIONAL FEATURES
    // ============================================
    
    // 1. Detect if app is installed (via navigator.install?)
    // Not fully reliable, but we can try
    if (navigator.userAgent.match(/(Android|iPhone|iPad)/i)) {
      // Mobile device, good chance app exists
      console.log("Mobile device detected");
    }

    // 2. Handle back button
    window.addEventListener("popstate", function() {
      // If user presses back, redirect to home
      window.location.href = "https://tuktukfeed.com";
    });

    // 3. Add to homescreen prompt (for PWA)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Show install button (optional)
      const installBtn = document.createElement('button');
      installBtn.className = 'btn btn-secondary';
      installBtn.innerHTML = '<i class="fas fa-download"></i> ติดตั้งแอป';
      installBtn.style.marginTop = '10px';
      installBtn.onclick = async () => {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        deferredPrompt = null;
      };
      
      document.querySelector('.button-group').appendChild(installBtn);
    });

    // 4. Track with analytics (if needed)
    function trackEvent(category, action, label) {
      console.log(`[Analytics] ${category} - ${action} - ${label}`);
      // You can integrate with Google Analytics here
    }
    
    trackEvent('DeepLink', 'Attempt', feature);
  </script>
</body>
</html>

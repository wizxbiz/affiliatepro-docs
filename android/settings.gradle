pluginManagement {
    // ดึง path Flutter SDK
    def flutterSdkPath = {
        def props = new Properties()
        file("local.properties").withInputStream { props.load(it) }
        assert props.getProperty("flutter.sdk") != null : "flutter.sdk not set"
        return props.getProperty("flutter.sdk")
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
        id "dev.flutter.flutter-plugin-loader" version "1.0.0"
        id "com.android.application" version "8.7.0" apply false   // ⬅ AGP 8.7
        id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ":app"
